            [215, 1],
            [305, -1],
          ].forEach(([angleDeg, direction]) => {
            const arrow = new THREE.Mesh(
              createRotationArrowGeometry(
                (angleDeg * Math.PI) / 180.0,
                direction,
              ),
              arrowMaterial,
            );
            arrow.renderOrder = 14;
            group.add(arrow);
          });

          const pickMaterial = new THREE.MeshBasicMaterial({
            color: "#ffffff",
            transparent: true,
            opacity: 0.0,
            side: THREE.DoubleSide,
            depthTest: false,
            depthWrite: false,
          });
          pickMaterial.colorWrite = false;
          const pickMesh = new THREE.Mesh(
            new THREE.RingGeometry(0.90, 1.12, 128),
            pickMaterial,
          );
          pickMesh.userData.editRotationWellIndex = wellIndex;
          pickMesh.renderOrder = 15;
          group.add(pickMesh);
          scene.add(group);
          editRotationPickMeshes.push(pickMesh);
          return {
            group: group,
            ring: ring,
            arrows: group.children.filter((child) => child !== ring && child !== pickMesh),
            pickMesh: pickMesh,
          };
        }

        function updateEditRotationControl(wellIndex) {
          const control = editRotationControls[wellIndex];
          if (!control) {
            return;
          }
          const visible =
            editRotationModeEnabled() &&
            Number.isInteger(selectedEditWellIndex) &&
            wellIndex === selectedEditWellIndex &&
            horizontalT1T3Length(wellIndex) > EDIT_DELTA_EPS_M;
          control.group.visible = visible;
          if (!visible) {
            return;
          }
          const radius = Math.max(horizontalT1T3Length(wellIndex), EDIT_DELTA_EPS_M);
          control.group.position.copy(editRotationCenterDisplay(wellIndex));
          control.group.scale.set(radius, radius, 1.0);
          const isDragging = editRotateWellIndex === wellIndex;
          if (control.ring.material) {
            control.ring.material.opacity = isDragging ? 0.78 : 0.52;
            control.ring.material.needsUpdate = true;
          }
          control.arrows.forEach((arrow) => {
            if (arrow.material) {
              arrow.material.opacity = isDragging ? 0.86 : 0.68;
              arrow.material.needsUpdate = true;
            }
          });
        }

        function syncEditRotationControls() {
          editRotationControls.forEach((_, index) => updateEditRotationControl(index));
        }

        function createEditDeltaLine(color, opacity) {
          const material = new THREE.LineDashedMaterial({
            color: color,
            transparent: true,
            opacity: opacity,
            dashSize: Math.max(maxSpan * 0.005, 6.0),
            gapSize: Math.max(maxSpan * 0.0035, 4.0),
            depthTest: false,
            depthWrite: false,
          });
          const lineObject = new THREE.LineSegments(new THREE.BufferGeometry(), material);
          lineObject.visible = false;
          lineObject.renderOrder = 12;
          scene.add(lineObject);
          return lineObject;
        }

        function initEditDeltaLabelDrag(labelItem) {
          if (!labelItem || !labelItem.element) {
            return;
          }
          let dragging = false;
          let startX = 0;
          let startY = 0;
          let startOffsetX = 0;
          let startOffsetY = 0;
          const element = labelItem.element;
          element.title = "Перетащите, чтобы сместить плашку от точки";
          element.addEventListener("pointerdown", function (event) {
            dragging = true;
            interactionActive = true;
            hideTooltip();
            startX = Number(event.clientX || 0);
            startY = Number(event.clientY || 0);
            startOffsetX = Number(labelItem.offsetX || 0);
            startOffsetY = Number(labelItem.offsetY || 0);
            element.classList.add("is-dragging");
            try {
              element.setPointerCapture(event.pointerId);
            } catch (e) { /* ignore */ }
            event.preventDefault();
            event.stopPropagation();
          });
          element.addEventListener("pointermove", function (event) {
            if (!dragging) {
              return;
            }
            const dx = Number(event.clientX || 0) - startX;
            const dy = Number(event.clientY || 0) - startY;
            labelItem.offsetX = startOffsetX + dx;
            labelItem.offsetY = startOffsetY - dy;
            event.preventDefault();
            event.stopPropagation();
            requestRender();
          });
          const endDrag = function (event) {
            if (!dragging) {
              return;
            }
            dragging = false;
            interactionActive = false;
            element.classList.remove("is-dragging");
            try {
              element.releasePointerCapture(event.pointerId);
            } catch (e) { /* ignore */ }
            event.preventDefault();
            event.stopPropagation();
            requestRender();
          };
          element.addEventListener("pointerup", endDrag);
          element.addEventListener("pointercancel", endDrag);
        }

        function createEditDeltaGuide(pointType, color) {
          const label = addSceneLabel(
            "",
            new THREE.Vector3(0, 0, 0),
            color,
            "edit-delta-label",
            { offsetX: 14, offsetY: 18, role: "edit_delta_label" },
          );
          label.visible = false;
          initEditDeltaLabelDrag(label);
          return {
            pointType: pointType,
            lines: {
              x: createEditDeltaLine(EDIT_DELTA_AXIS_COLORS.x, 0.42),
              y: createEditDeltaLine(EDIT_DELTA_AXIS_COLORS.y, 0.42),
              z: createEditDeltaLine(EDIT_DELTA_AXIS_COLORS.z, 0.42),
              total: createEditDeltaLine(EDIT_DELTA_AXIS_COLORS.total, 0.32),
            },
            label: label,
          };
        }

        function updateDashedLineSegments(lineObject, segments, visible) {
          const positions = [];
          if (visible && Array.isArray(segments)) {
            segments.forEach((segment) => {
              if (!Array.isArray(segment) || segment.length !== 2) {
                return;
              }
              const start = displayPoint(segment[0]);
              const end = displayPoint(segment[1]);
              positions.push(start.x, start.y, start.z, end.x, end.y, end.z);
            });
          }
          lineObject.geometry.setAttribute(
            "position",
            new THREE.Float32BufferAttribute(new Float32Array(positions), 3),
          );
          if (typeof lineObject.computeLineDistances === "function") {
            lineObject.computeLineDistances();
          }
          lineObject.visible = Boolean(visible && positions.length > 0);
        }

        function hideEditDeltaGuide(guide) {
          if (!guide) {
            return;
          }
          guide.label.visible = false;
          Object.values(guide.lines).forEach((lineObject) => {
            lineObject.visible = false;
          });
        }

        function updateEditDeltaGuide(handle) {
          if (!handle || !handle.guide) {
            return;
          }
          const wellIndex = handle.wellIndex;
          const originalEntry = (editOriginalPoints[wellIndex] || [])[handle.pointIndex];
          const original = originalEntry
            ? originalEntry.position
            : handle.pointRole === "t1"
            ? editOriginalT1[wellIndex]
            : editOriginalT3[wellIndex];
          const current = handle.dataPos;
          const dx = current[0] - original[0];
          const dy = current[1] - original[1];
          const dz = current[2] - original[2];
          const total = Math.sqrt(dx * dx + dy * dy + dz * dz);
          const originalSidetrackMd = Number(
            originalEntry && originalEntry.sidetrackWindow
              ? originalEntry.sidetrackWindow.valueM
              : NaN,
          );
          const currentSidetrackMd = Number(
            handle.sidetrackWindow ? handle.sidetrackWindow.valueM : NaN,
          );
          const sidetrackMdDelta =
            handle.pointRole === "sidetrack_window" &&
            Number.isFinite(originalSidetrackMd) &&
            Number.isFinite(currentSidetrackMd)
              ? currentSidetrackMd - originalSidetrackMd
              : 0.0;
          const sidetrackMdDeltaRow =
            handle.pointRole === "sidetrack_window" &&
            Number.isFinite(originalSidetrackMd) &&
            Number.isFinite(currentSidetrackMd)
              ? `<span class="edit-delta-row"><span>ΔMD</span><span>${formatDeltaMeters(sidetrackMdDelta)}</span></span>`
              : "";
          const selected =
            editModeActive &&
            wellIndex === selectedEditWellIndex &&
            (total > EDIT_DELTA_EPS_M ||
              Math.abs(sidetrackMdDelta) > EDIT_DELTA_EPS_M);
          const guide = handle.guide;
          if (!selected) {
            hideEditDeltaGuide(guide);
            return;
          }
          const viaX = [current[0], original[1], original[2]];
          const viaY = [current[0], current[1], original[2]];

          updateDashedLineSegments(
            guide.lines.x,
            [[original, viaX]],
            selected && Math.abs(dx) > EDIT_DELTA_EPS_M,
          );
          updateDashedLineSegments(
            guide.lines.y,
            [[viaX, viaY]],
            selected && Math.abs(dy) > EDIT_DELTA_EPS_M,
          );
          updateDashedLineSegments(
            guide.lines.z,
            [[viaY, current]],
            selected && Math.abs(dz) > EDIT_DELTA_EPS_M,
          );
          updateDashedLineSegments(
            guide.lines.total,
            [[original, current]],
            selected,
          );

          guide.label.visible = selected;
          guide.label.position.copy(displayPoint(current));
          if (selected) {
            guide.label.element.innerHTML =
              `<span class="edit-delta-head">${escapeHtml(handle.pointType)}</span>` +
              `<span class="edit-delta-row"><span>ΔX</span><span>${formatDeltaMeters(dx)}</span></span>` +
              `<span class="edit-delta-row"><span>ΔY</span><span>${formatDeltaMeters(dy)}</span></span>` +
              `<span class="edit-delta-row"><span>ΔZ</span><span>${formatDeltaMeters(dz)}</span></span>` +
              sidetrackMdDeltaRow +
              `<span class="edit-delta-row edit-delta-total"><span>Итого</span><span>${formatDeltaMeters(total, false)}</span></span>`;
          }
        }

        function syncEditDeltaGuides() {
          editHandles.forEach(updateEditDeltaGuide);
        }

        function horizontalT1T3Length(wellIndex) {
          const t1 = editCurrentT1[wellIndex];
          const t3 = editCurrentT3[wellIndex];
          if (!t1 || !t3) {
            return 0.0;
          }
          return Math.hypot(t3[0] - t1[0], t3[1] - t1[1]);
        }

        function t1T3Length(wellIndex) {
          const t1 = editCurrentT1[wellIndex];
          const t3 = editCurrentT3[wellIndex];
          if (!t1 || !t3) {
            return 0.0;
          }
          return Math.hypot(t3[0] - t1[0], t3[1] - t1[1], t3[2] - t1[2]);
        }

        function t1T3Midpoint(wellIndex) {
          const t1 = editCurrentT1[wellIndex] || [0, 0, 0];
          const t3 = editCurrentT3[wellIndex] || [0, 0, 0];
          return [
            (Number(t1[0]) + Number(t3[0])) * 0.5,
            (Number(t1[1]) + Number(t3[1])) * 0.5,
            (Number(t1[2]) + Number(t3[2])) * 0.5,
          ];
        }

        function createEditLateralLabel(wellIndex) {
          const label = addSceneLabel(
            "",
            displayPoint(t1T3Midpoint(wellIndex)),
            "#1d4ed8",
            "edit-lateral-label",
            { offsetX: 0, offsetY: 0, role: "edit_lateral_label" },
          );
          label.visible = false;
          return label;
        }

        function updateEditLateralLabel(wellIndex) {
          const label = editLateralLabels[wellIndex];
          if (!label) {
            return;
          }
          label.position.copy(displayPoint(t1T3Midpoint(wellIndex)));
          if (editWellHasExplicitPoints(wellIndex)) {
            const pointCount = (editCurrentPoints[wellIndex] || [])
              .filter((entry) => !isSidetrackWindowEntry(entry)).length;
            label.element.textContent = `Точек: ${pointCount}`;
          } else {
            label.element.textContent =
              `Длина ГС ${formatLengthMeters(t1T3Length(wellIndex))}`;
          }
          label.visible =
            editModeActive &&
            Number.isInteger(selectedEditWellIndex) &&
            wellIndex === selectedEditWellIndex;
        }

        function syncEditLateralLabels() {
          editLateralLabels.forEach((_, index) => updateEditLateralLabel(index));
        }

        function handleDeltaLength(handle) {
          if (!handle) {
            return 0.0;
          }
          const originalEntry =
            (editOriginalPoints[handle.wellIndex] || [])[handle.pointIndex];
          const original = originalEntry
            ? originalEntry.position
            : handle.pointRole === "t1"
            ? editOriginalT1[handle.wellIndex]
            : editOriginalT3[handle.wellIndex];
          const current = handle.dataPos;
          if (!original || !current) {
            return 0.0;
          }
          const dx = current[0] - original[0];
          const dy = current[1] - original[1];
          const dz = current[2] - original[2];
          return Math.sqrt(dx * dx + dy * dy + dz * dz);
        }

        function updateHandlePosition(handle, point) {
          const displayPosition = displayPoint(point);
          handle.dataPos = copyEditPoint(point);
          handle.mesh.position.copy(displayPosition);
          if (handle.pickMesh) {
            handle.pickMesh.position.copy(displayPosition);
          }
          if (handle.previewMesh) {
            handle.previewMesh.position.copy(displayPosition);
          }
        }

        function editWellLabelAnchorPoint(wellIndex) {
          const points = editCurrentPoints[wellIndex] || [];
          if (points.length > 0) {
            const targetPoints = points.filter((entry) => !isSidetrackWindowEntry(entry));
            if (targetPoints.length > 0) {
              return targetPoints[targetPoints.length - 1].position;
            }
            return points[points.length - 1].position;
          }
          return editCurrentT3[wellIndex];
        }

        function syncEditWellNameLabelPosition(wellIndex) {
          const well = editWells[wellIndex] || {};
          const wellName = String(well.name || "");
          const anchor = editWellLabelAnchorPoint(wellIndex);
          if (!wellName || !anchor) {
            return;
          }
          const displayPosition = displayPoint(anchor);
          sceneLabels.forEach((item) => {
            if (item.role === "well_label" && item.text === wellName) {
              item.position.copy(displayPosition);
            }
          });
          miniMapLabels.forEach((item) => {
            if (item.text === wellName) {
              item.position.copy(displayPosition);
            }
          });
        }

        function updateWellEditPoints(wellIndex, nextPoints) {
          editCurrentPoints[wellIndex] = copyEditPointEntries(nextPoints);
          syncPrimaryEditTargetsFromPoints(wellIndex);
          editHandles.forEach((handle) => {
            if (handle.wellIndex !== wellIndex) {
              return;
            }
            const pointEntry = editCurrentPoints[wellIndex][handle.pointIndex];
            if (!pointEntry) {
              return;
            }
            handle.sidetrackWindow = pointEntry.sidetrackWindow || null;
            updateHandlePosition(handle, pointEntry.position);
          });
          syncEditWellNameLabelPosition(wellIndex);
        }

        function updateWellEditTargets(wellIndex, t1, t3) {
          editCurrentT1[wellIndex] = copyEditPoint(t1);
          editCurrentT3[wellIndex] = copyEditPoint(t3);
          const currentPoints = editCurrentPoints[wellIndex] || [];
          const nextPoints = copyEditPointEntries(currentPoints);
          let firstT1Updated = false;
          let lastT3Index = -1;
          nextPoints.forEach((entry, index) => {
            if (entry.pointType === "t1" && !firstT1Updated) {
              entry.position = copyEditPoint(t1);
              firstT1Updated = true;
            }
            if (entry.pointType === "t3") {
              lastT3Index = index;
            }
          });
          if (lastT3Index >= 0) {
            nextPoints[lastT3Index].position = copyEditPoint(t3);
          }
          editCurrentPoints[wellIndex] = nextPoints;
          editHandles.forEach((handle) => {
            if (handle.wellIndex !== wellIndex) {
              return;
            }
            const pointEntry = editCurrentPoints[wellIndex][handle.pointIndex];
            if (pointEntry) {
              handle.sidetrackWindow = pointEntry.sidetrackWindow || null;
              updateHandlePosition(handle, pointEntry.position);
            }
          });
          syncEditWellNameLabelPosition(wellIndex);
        }

        function applyEditState(wellIndex, state) {
          if (!Number.isInteger(wellIndex) || !state) {
            return;
          }
          if (Array.isArray(state.points) && state.points.length > 0) {
            updateWellEditPoints(wellIndex, state.points);
          } else {
            updateWellEditTargets(wellIndex, state.t1, state.t3);
          }
          editDirtyFlags[wellIndex] = isEditWellDirty(wellIndex);
          rebuildPreviewTrajectory(wellIndex);
          resetEditSaveButtonState();
          showEditFeedback();
          syncEditToolboxState();
          requestRender();
        }

        function pushEditUndoState(wellIndex, previousState) {
          if (!Number.isInteger(wellIndex) || !previousState) {
            return;
          }
          const currentState = cloneEditState(wellIndex);
          if (editStatesEqual(previousState, currentState)) {
            return;
          }
          const undoStack = editUndoStacks[wellIndex];
          undoStack.push({
            points: copyEditPointEntries(previousState.points),
            t1: copyEditPoint(previousState.t1),
            t3: copyEditPoint(previousState.t3),
          });
          if (undoStack.length > 60) {
            undoStack.shift();
          }
          editRedoStacks[wellIndex] = [];
          syncEditToolboxState();
        }

        function collectEditStates(indices) {
          const states = new Map();
          normalizedEditWellSelection(indices, null).forEach((wellIndex) => {
            states.set(wellIndex, cloneEditState(wellIndex));
          });
          return states;
        }

        function pushEditUndoStates(previousStates) {
          if (!(previousStates instanceof Map)) {
            return;
          }
          previousStates.forEach((previousState, wellIndex) => {
            pushEditUndoState(wellIndex, previousState);
          });
        }

        function pointEntryIndicesForSync(entries, pointLabel, pointRole) {
          const safeEntries = Array.isArray(entries) ? entries : [];
          const normalizedLabel = String(pointLabel || "");
          const normalizedRole = String(pointRole || "");
          const exactMatches = safeEntries
            .map((entry, index) => ({ entry: entry, index: index }))
            .filter(({ entry }) =>
              String(entry && entry.pointType) === normalizedRole &&
              String(entry && entry.label) === normalizedLabel,
            )
            .map(({ index }) => index);
          if (exactMatches.length > 0) {
            return exactMatches;
          }
          if (normalizedRole === "t1") {
            const firstT1Index = safeEntries.findIndex(
              (entry) => String(entry && entry.pointType) === "t1",
            );
            return firstT1Index >= 0 ? [firstT1Index] : [];
          }
          if (normalizedRole === "t3") {
            for (let index = safeEntries.length - 1; index >= 0; index -= 1) {
              if (String(safeEntries[index] && safeEntries[index].pointType) === "t3") {
                return [index];
              }
            }
          }
          return [];
        }

        function applyPairDeltaFromState(wellIndex, baseState, delta) {
          if (!baseState) {
            return false;
          }
          if (Array.isArray(baseState.points) && baseState.points.length > 0) {
            const nextPoints = copyEditPointEntries(baseState.points).map((entry) => ({
              index: entry.index,
              label: entry.label,
              pointType: entry.pointType,
              position: editEntryMovesWithPairScope(entry)
                ? addDeltaToPoint(entry.position, delta)
                : copyEditPoint(entry.position),
              sidetrackWindow: entry.sidetrackWindow || null,
            }));
            updateWellEditPoints(wellIndex, nextPoints);
            return true;
          }
          updateWellEditTargets(
            wellIndex,
            addDeltaToPoint(baseState.t1, delta),
            addDeltaToPoint(baseState.t3, delta),
          );
          return true;
        }

        function applyPointDeltaFromState(wellIndex, baseState, pointLabel, pointRole, delta) {
          if (!baseState) {
            return false;
          }
          const normalizedRole = String(pointRole || "");
          if (normalizedRole !== "t1" && normalizedRole !== "t3") {
            return false;
          }
          if (Array.isArray(baseState.points) && baseState.points.length > 0) {
            const nextPoints = copyEditPointEntries(baseState.points);
            const pointIndices = pointEntryIndicesForSync(
              nextPoints,
              pointLabel,
              normalizedRole,
            );
            if (pointIndices.length === 0) {
              return false;
            }
            pointIndices.forEach((pointIndex) => {
              nextPoints[pointIndex].position = addDeltaToPoint(
                nextPoints[pointIndex].position,
                delta,
              );
            });
            updateWellEditPoints(wellIndex, nextPoints);
            return true;
          }
          const nextT1 = copyEditPoint(baseState.t1);
          const nextT3 = copyEditPoint(baseState.t3);
          if (normalizedRole === "t1") {
            nextT1[0] += Number(delta[0]) || 0.0;
            nextT1[1] += Number(delta[1]) || 0.0;
            nextT1[2] += Number(delta[2]) || 0.0;
          } else {
            nextT3[0] += Number(delta[0]) || 0.0;
            nextT3[1] += Number(delta[1]) || 0.0;
            nextT3[2] += Number(delta[2]) || 0.0;
          }
          updateWellEditTargets(wellIndex, nextT1, nextT3);
          return true;
        }

        function synchronizedEditWellIndices(primaryWellIndex, pointRole, moveScope) {
          if (!isValidEditWellIndex(primaryWellIndex)) {
            return [];
          }
          const normalizedRole = String(pointRole || "");
          const normalizedScope = String(moveScope || "");
          if (
            selectedEditWellIndices.size <= 1 ||
            !selectedEditWellIndices.has(primaryWellIndex) ||
            (
              normalizedScope !== "pair" &&
              normalizedRole !== "t1" &&
              normalizedRole !== "t3"
            )
          ) {
            return [primaryWellIndex];
          }
          return selectedEditWellIndexArray();
        }

        function applySynchronizedDeltaFromStates(baseStates, primaryWellIndex, handle, delta, moveScope) {
          const primaryHandle = handle || {};
          const affectedIndices = synchronizedEditWellIndices(
            primaryWellIndex,
            primaryHandle.pointRole,
            moveScope,
          );
          const normalizedScope = String(moveScope || "");
          const appliedIndices = [];
          affectedIndices.forEach((wellIndex) => {
            const baseState =
              baseStates instanceof Map && baseStates.has(wellIndex)
                ? baseStates.get(wellIndex)
                : cloneEditState(wellIndex);
            const applied =
              normalizedScope === "pair"
                ? applyPairDeltaFromState(wellIndex, baseState, delta)
                : applyPointDeltaFromState(
                    wellIndex,
                    baseState,
                    primaryHandle.pointType,
                    primaryHandle.pointRole,
                    delta,
                  );
            if (applied) {
              appliedIndices.push(wellIndex);
            }
          });
          return appliedIndices;
        }

        function finalizeEditUpdates(wellIndices) {
          const uniqueIndices = normalizedEditWellSelection(wellIndices, null);
          uniqueIndices.forEach((wellIndex) => {
            editDirtyFlags[wellIndex] = isEditWellDirty(wellIndex);
            rebuildPreviewTrajectory(wellIndex);
          });
          resetEditSaveButtonState();
          syncEditVisibility();
          showEditFeedback();
          requestRender();
        }

        function syncEditToolboxState() {
          if (!editUndoBtn || !editRedoBtn || !editResetBtn) {
            return;
          }
          const selectedIndex = Number.isInteger(selectedEditWellIndex)
            ? selectedEditWellIndex
            : null;
          const hasSelection = selectedIndex !== null;
          const selectedSupportsRotation =
            hasSelection && editWellSupportsRotation(selectedIndex);
          editUndoBtn.disabled =
            !editModeActive ||
            !hasSelection ||
            !Array.isArray(editUndoStacks[selectedIndex]) ||
            editUndoStacks[selectedIndex].length === 0;
          editRedoBtn.disabled =
            !editModeActive ||
            !hasSelection ||
            !Array.isArray(editRedoStacks[selectedIndex]) ||
            editRedoStacks[selectedIndex].length === 0;
          editResetBtn.disabled =
            !editModeActive ||
            !hasSelection ||
            !Boolean(editDirtyFlags[selectedIndex]);
          editPlaneSelector.querySelectorAll(".plane-btn").forEach((btn) => {
            btn.disabled = !editModeActive || !hasSelection || editTransformMode === "rotate";
          });
          editScopeSelector.querySelectorAll(".scope-btn").forEach((btn) => {
            btn.disabled = !editModeActive || !hasSelection;
          });
          editOperationSelector.querySelectorAll(".operation-btn").forEach((btn) => {
            btn.disabled =
              !editModeActive ||
              !hasSelection ||
              (btn.dataset.operation === "rotate" &&
                (editMoveScope !== "pair" || !selectedSupportsRotation));
          });
        }

        function undoSelectedEdit() {
          const wellIndex = selectedEditWellIndex;
          const selectedIndices = selectedEditWellIndexArray();
          if (!Number.isInteger(wellIndex) || editUndoStacks[wellIndex].length === 0) {
            return;
          }
          const appliedIndices = [];
          selectedIndices.forEach((selectedIndex) => {
            if (
              !Number.isInteger(selectedIndex) ||
              !Array.isArray(editUndoStacks[selectedIndex]) ||
              editUndoStacks[selectedIndex].length === 0
            ) {
              return;
            }
            const previousState = editUndoStacks[selectedIndex].pop();
            editRedoStacks[selectedIndex].push(cloneEditState(selectedIndex));
            if (editRedoStacks[selectedIndex].length > 60) {
              editRedoStacks[selectedIndex].shift();
            }
            if (previousState) {
              applyEditState(selectedIndex, previousState);
              appliedIndices.push(selectedIndex);
            }
          });
          if (appliedIndices.length > 1) {
            syncEditVisibility();
            showEditFeedback();
            requestRender();
          }
        }

        function redoSelectedEdit() {
          const wellIndex = selectedEditWellIndex;
          const selectedIndices = selectedEditWellIndexArray();
          if (!Number.isInteger(wellIndex) || editRedoStacks[wellIndex].length === 0) {
            return;
          }
          const appliedIndices = [];
          selectedIndices.forEach((selectedIndex) => {
            if (
              !Number.isInteger(selectedIndex) ||
              !Array.isArray(editRedoStacks[selectedIndex]) ||
              editRedoStacks[selectedIndex].length === 0
            ) {
              return;
            }
            const nextState = editRedoStacks[selectedIndex].pop();
            editUndoStacks[selectedIndex].push(cloneEditState(selectedIndex));
            if (editUndoStacks[selectedIndex].length > 60) {
              editUndoStacks[selectedIndex].shift();
            }
            if (nextState) {
              applyEditState(selectedIndex, nextState);
              appliedIndices.push(selectedIndex);
            }
          });
          if (appliedIndices.length > 1) {
            syncEditVisibility();
            showEditFeedback();
            requestRender();
          }
        }

        function resetSelectedEdit() {
          const wellIndex = selectedEditWellIndex;
          const selectedIndices = selectedEditWellIndexArray();
          if (!Number.isInteger(wellIndex) || !selectedIndices.some((index) => editDirtyFlags[index])) {
            return;
          }
          const appliedIndices = [];
          selectedIndices.forEach((selectedIndex) => {
            if (!editDirtyFlags[selectedIndex]) {
              return;
            }
            const currentState = cloneEditState(selectedIndex);
            const originalState = originalEditState(selectedIndex);
            if (editStatesEqual(currentState, originalState)) {
              return;
            }
            editUndoStacks[selectedIndex].push(currentState);
            if (editUndoStacks[selectedIndex].length > 60) {
              editUndoStacks[selectedIndex].shift();
            }
            editRedoStacks[selectedIndex] = [];
            applyEditState(selectedIndex, originalState);
            appliedIndices.push(selectedIndex);
          });
          if (appliedIndices.length > 1) {
            syncEditVisibility();
            showEditFeedback();
            requestRender();
          }
        }

        function initEditHandles() {
          const handleGeometry = new THREE.SphereGeometry(1.0, 16, 12);
          const pickMaterial = new THREE.MeshBasicMaterial({
            color: "#ffffff",
            transparent: true,
            opacity: 0.0,
            depthTest: false,
            depthWrite: false,
          });
          pickMaterial.colorWrite = false;
          editWells.forEach((well, idx) => {
            const surface = well.surface || [0, 0, 0];
            const color = well.color || "#2563eb";
            const config = well.config || {};
            const pointDefinitions = editPointDefinitionsForWell(well);
            const originalPointEntries = copyEditPointEntries(pointDefinitions);
            const currentPointEntries = copyEditPointEntries(pointDefinitions);
            const firstT1 = editPointByRole(currentPointEntries, "t1", 0) || well.t1 || [0, 0, 0];
            const t3Candidates = currentPointEntries.filter(
              (entry) => String(entry && entry.pointType) === "t3",
            );
            const lastT3 = t3Candidates.length
              ? t3Candidates[t3Candidates.length - 1].position
              : well.t3 || [0, 0, 0];
            const t1 = copyEditPoint(firstT1);
            const t3 = copyEditPoint(lastT3);

            editOriginalPoints.push(originalPointEntries);
            editCurrentPoints.push(currentPointEntries);
            editOriginalT1.push(t1.slice());
            editOriginalT3.push(t3.slice());
            editCurrentT1.push(t1.slice());
            editCurrentT3.push(t3.slice());
            editDirtyFlags.push(false);
            editUndoStacks.push([]);
            editRedoStacks.push([]);
            editLateralLabels.push(createEditLateralLabel(idx));
            editRotationControls.push(createEditRotationControl(idx, color));

            // Create FastReplan instance
            editReplanners.push(new FastReplan({
              surface: surface,
              config: {
                entryIncTargetDeg: config.entry_inc_target_deg || 86,
                maxIncDeg: config.max_inc_deg || 95,
                dlsBuildMaxDegPer30m: config.dls_build_max_deg_per_30m || 2.4,
                dlsBuild2MaxDegPer30m: config.dls_build2_max_deg_per_30m || null,
                dlsHorizontalMaxDegPer30m: config.dls_horizontal_max_deg_per_30m || config.dls_build_max_deg_per_30m || 1.5,
                kopMinVerticalM: config.kop_min_vertical_m || 550,
                mdStepM: 30,
                basePoints: Array.isArray(well.base_points) ? well.base_points : [],
                originalT1: t1,
                originalT3: t3,
              },
            }));

            currentPointEntries.forEach((pointEntry, pointIndex) => {
              const pointLabel = String(pointEntry.label || pointEntry.pointType || `P${pointIndex + 1}`);
              const pointRole = String(pointEntry.pointType || "point");
              const point = copyEditPoint(pointEntry.position);
              const handleIndex = editHandles.length;
              const pointMat = new THREE.MeshBasicMaterial({
                color: color,
                transparent: true,
                opacity: 0.85,
                depthTest: true,
              });
              const pointMesh = new THREE.Mesh(handleGeometry, pointMat);
              pointMesh.position.copy(displayPoint(point));
              pointMesh.userData.lockViewerZGeometryScale = true;
              pointMesh.visible = false;
              pointMesh.renderOrder = 10;
              scene.add(pointMesh);
              const previewMat = new THREE.MeshBasicMaterial({
                color: color,
                transparent: true,
                opacity: 0.42,
                depthTest: false,
                depthWrite: false,
              });
              const previewMesh = new THREE.Mesh(handleGeometry, previewMat);
              previewMesh.position.copy(pointMesh.position);
              previewMesh.userData.lockViewerZGeometryScale = true;
              previewMesh.visible = false;
              previewMesh.renderOrder = 8;
              scene.add(previewMesh);
              const originalMat = new THREE.MeshBasicMaterial({
                color: "#ffffff",
                transparent: true,
                opacity: 0.82,
                depthTest: false,
                depthWrite: false,
              });
              const originalMesh = new THREE.Mesh(handleGeometry, originalMat);
              originalMesh.position.copy(displayPoint(point));
              originalMesh.userData.lockViewerZGeometryScale = true;
              originalMesh.visible = false;
              originalMesh.renderOrder = 12;
              scene.add(originalMesh);
              const pickMesh = new THREE.Mesh(handleGeometry, pickMaterial);
              pickMesh.position.copy(pointMesh.position);
              pickMesh.userData.lockViewerZGeometryScale = true;
              pickMesh.userData.editHandleIndex = handleIndex;
              pickMesh.visible = false;
              pickMesh.renderOrder = 11;
              scene.add(pickMesh);
              hoverTargets.push(pickMesh);
              editHandles.push({
                mesh: pointMesh,
                pickMesh: pickMesh,
                previewMesh: previewMesh,
                originalMesh: originalMesh,
                wellIndex: idx,
                pointType: pointLabel,
                pointRole: pointRole,
                pointIndex: pointIndex,
                dataPos: point.slice(),
                sidetrackWindow: pointEntry.sidetrackWindow || null,
                guide: createEditDeltaGuide(pointLabel, color),
              });
            });

            // Preview line (initially empty, hidden)
            const lineGeometry = new THREE.BufferGeometry();
            const lineMaterial = new THREE.LineBasicMaterial({
              color: color,
              transparent: true,
              opacity: 0.92,
              depthTest: false,
              depthWrite: false,
              linewidth: 1,
            });
            const lineObj = new THREE.LineSegments(lineGeometry, lineMaterial);
            lineObj.visible = false;
            lineObj.renderOrder = 9;
            scene.add(lineObj);
            editLineObjects.push(lineObj);
          });
        }

        function worldUnitsPerPixelAt(displayPosition) {
          const canvasHeight = Math.max(renderer.domElement.clientHeight || 1, 1);
          if (camera && camera.isOrthographicCamera) {
            const zoom = Math.max(Number(camera.zoom) || 1.0, 1e-6);
            return Math.max(
              (Math.abs(Number(camera.top) - Number(camera.bottom)) / zoom) / canvasHeight,
              1e-6,
            );
          }
          const worldPosition =
            displayPosition instanceof THREE.Vector3
              ? displayPosition
              : displayPoint(displayPosition);
          const distance = Math.max(
            camera.position.distanceTo(worldPosition),
            Number(camera.near) || 0.1,
          );
          const fovRad = (Number(camera.fov) || 45) * Math.PI / 180.0;
          return Math.max(
            (2.0 * Math.tan(fovRad * 0.5) * distance) / canvasHeight,
            1e-6,
          );
        }

        function editHandleScale(displayPosition, pixelDiameter) {
          const worldDiameter =
            worldUnitsPerPixelAt(displayPosition) *
            Math.max(Number(pixelDiameter) || 1.0, 1.0);
          return Math.max(worldDiameter * 0.5, 0.25);
        }

        function updateHandleScales() {
          editHandles.forEach((h, handleIndex) => {
            const displayPosition = h.mesh ? h.mesh.position : displayPoint(h.dataPos);
            const selectedHandle =
              editModeActive &&
              editTransformMode === "move" &&
              editMoveScope === "point" &&
              Number.isInteger(selectedEditWellIndex) &&
              h.wellIndex === selectedEditWellIndex &&
              handleIndex === selectedEditHandleIndex;
            const meshScaleMultiplier = selectedHandle ? 1.28 : 1.0;
            h.mesh.scale.setScalar(
              editHandleScale(displayPosition, 16.0) * meshScaleMultiplier
            );
            if (h.pickMesh) {
              h.pickMesh.scale.setScalar(
                editHandleScale(displayPosition, selectedHandle ? 34.0 : 30.0)
              );
            }
            if (h.previewMesh) {
              h.previewMesh.scale.setScalar(editHandleScale(displayPosition, 10.0));
            }
            if (h.originalMesh) {
              h.originalMesh.scale.setScalar(
                editHandleScale(h.originalMesh.position, 11.0)
              );
            }
          });
        }

        function resetEditSaveButtonState() {
          if (!editSaveBtn) {
            return;
          }
          editSaveBtn.disabled = false;
          editSaveBtn.textContent = EDIT_SAVE_DEFAULT_TEXT;
          editSaveBtn.classList.remove("is-pending", "is-error");
          editSaveBtn.style.background = "";
        }

        function initEditToolboxDrag() {
          const header = editToolbox.querySelector(".edit-toolbox-header");
          if (!header) {
            return;
          }
          let dragging = false;
          let startX = 0;
          let startY = 0;
          let panelStartLeft = 0;
          let panelStartTop = 0;

          header.addEventListener("pointerdown", function (e) {
            dragging = true;
            startX = e.clientX;
            startY = e.clientY;
            const rect = editToolbox.getBoundingClientRect();
            const parentRect = editToolbox.offsetParent
              ? editToolbox.offsetParent.getBoundingClientRect()
              : { left: 0, top: 0 };
            panelStartLeft = rect.left - parentRect.left;
            panelStartTop = rect.top - parentRect.top;
            header.setPointerCapture(e.pointerId);
            e.preventDefault();
          });

          header.addEventListener("pointermove", function (e) {
            if (!dragging) return;
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            let newLeft = panelStartLeft + dx;
            let newTop = panelStartTop + dy;
            const parent = editToolbox.offsetParent || document.documentElement;
            const maxLeft = parent.clientWidth - editToolbox.offsetWidth;
            const maxTop = parent.clientHeight - editToolbox.offsetHeight;
            newLeft = Math.max(0, Math.min(newLeft, maxLeft));
            newTop = Math.max(0, Math.min(newTop, maxTop));
            editToolbox.style.left = `${newLeft}px`;
            editToolbox.style.top = `${newTop}px`;
          });

          header.addEventListener("pointerup", function () {
            dragging = false;
          });

          header.addEventListener("pointercancel", function () {
            dragging = false;
          });
        }

        function syncEditVisibility() {
          syncSelectedEditHandle();
          const selectedIndex = Number.isInteger(selectedEditWellIndex)
            ? selectedEditWellIndex
            : null;
          editHandles.forEach((h, handleIndex) => {
            const visible =
              editModeActive &&
              selectedIndex !== null &&
              h.wellIndex === selectedIndex;
            const selectedHandle =
              visible &&
              editTransformMode === "move" &&
              editMoveScope === "point" &&
              handleIndex === selectedEditHandleIndex;
            h.mesh.visible = visible;
            if (h.mesh && h.mesh.material) {
              h.mesh.material.opacity = selectedHandle ? 1.0 : 0.85;
              h.mesh.material.needsUpdate = true;
            }
            if (h.pickMesh) {
              h.pickMesh.visible = visible;
            }
            if (h.previewMesh) {
              h.previewMesh.visible =
                editModeActive &&
                !visible &&
                Boolean(editDirtyFlags[h.wellIndex]) &&
                handleDeltaLength(h) > EDIT_DELTA_EPS_M;
            }
            if (h.originalMesh) {
              h.originalMesh.visible =
                editModeActive &&
                visible &&
                Boolean(editDirtyFlags[h.wellIndex]) &&
                handleDeltaLength(h) > EDIT_DELTA_EPS_M;
              if (h.originalMesh.material) {
                h.originalMesh.material.opacity = selectedHandle ? 0.96 : 0.82;
                h.originalMesh.material.needsUpdate = true;
              }
            }
          });
          updateHandleScales();
          setEditableBaseDimmed(editModeActive, selectedIndex);
          editLineObjects.forEach((lineObject, index) => {
            const isSelected = selectedIndex !== null && index === selectedIndex;
            const isDirty = Boolean(editDirtyFlags[index]);
            lineObject.visible = editModeActive && isDirty;
            if (lineObject.material) {
              lineObject.material.opacity = isSelected ? 0.92 : 0.42;
              lineObject.material.depthWrite = false;
              lineObject.material.needsUpdate = true;
            }
            lineObject.renderOrder = isSelected ? 9 : 8;
          });
          syncEditDeltaGuides();
          syncEditLateralLabels();
          syncEditRotationControls();
          syncEditToolboxState();
          syncLegendEditSelection();
        }

        function selectEditWell(index, options) {
          const nextIndex = Number(index);
          if (!Number.isInteger(nextIndex) || nextIndex < 0 || nextIndex >= editWells.length) {
            return;
          }
          if (!selectedEditWellIndices.has(nextIndex)) {
            selectedEditWellIndices = new Set([nextIndex]);
          }
          selectedEditWellIndex = nextIndex;
          if (!isValidEditWellIndex(editLegendSelectionAnchorIndex)) {
            editLegendSelectionAnchorIndex = nextIndex;
          }
          syncSelectedEditHandle();
          if (
            !editWellSupportsRotation(nextIndex) &&
            editTransformMode === "rotate"
          ) {
            setEditTransformMode("move");
          }
          syncEditVisibility();
          syncEditToolboxState();
          if (options && options.focus) {
            if (fitCameraToEditWellTargets(nextIndex)) {
              requestRender();
              return;
            }
            const well = editWells[nextIndex] || {};
            const name = String(well.name || "");
            const targetBounds = focusTargets[`well::${name}`];
            if (targetBounds) {
              fitCameraToRawBounds(targetBounds);
            }
          }
          requestRender();
        }

        function setEditMode(active) {
          editModeActive = active;
          editTargetsBtn.classList.toggle("is-active", active);
          editToolbox.classList.toggle("is-visible", active);
          editTargetsBtn.textContent = active
            ? "Завершить редактирование"
            : "Редактировать точки";
          if (active && selectedEditWellIndex === null && editWells.length > 0) {
            selectedEditWellIndex = 0;
          }
          if (active && selectedEditWellIndices.size === 0 && Number.isInteger(selectedEditWellIndex)) {
            selectedEditWellIndices = new Set([selectedEditWellIndex]);
          }
          syncSelectedEditHandle();
          syncEditVisibility();
          if (!active) {
            editWarningDismissed = false;
            editSaveBtn.classList.remove("is-visible");
            editWarningToast.classList.remove("is-visible");
          } else {
            resetEditSaveButtonState();
            showEditFeedback();
          }
          updateHandleScales();
          syncEditToolboxState();
          requestRender();
        }

        function setEditPlane(plane) {
          if (plane !== "xy" && plane !== "z") {
            return;
          }
          editPlane = plane;
          editPlaneSelector.querySelectorAll(".plane-btn").forEach((btn) => {
            btn.classList.toggle("is-active", btn.dataset.plane === plane);
          });
          syncEditToolboxState();
        }

        function setEditMoveScope(scope) {
          if (scope !== "point" && scope !== "pair") {
            return;
          }
          editMoveScope = scope;
          editScopeSelector.querySelectorAll(".scope-btn").forEach((btn) => {
            btn.classList.toggle("is-active", btn.dataset.scope === scope);
          });
          if (editMoveScope !== "pair" && editTransformMode === "rotate") {
            setEditTransformMode("move");
            return;
          }
          syncSelectedEditHandle();
          syncEditRotationControls();
          syncEditToolboxState();
          requestRender();
        }

        function setEditTransformMode(operation) {
          if (operation !== "move" && operation !== "rotate") {
            return;
          }
          if (
            operation === "rotate" &&
            (editMoveScope !== "pair" ||
              (Number.isInteger(selectedEditWellIndex) &&
                !editWellSupportsRotation(selectedEditWellIndex)))
          ) {
            return;
          }
          editTransformMode = operation;
          if (operation === "rotate") {
            editPlane = "xy";
            editPlaneSelector.querySelectorAll(".plane-btn").forEach((btn) => {
              btn.classList.toggle("is-active", btn.dataset.plane === editPlane);
            });
          }
          editOperationSelector.querySelectorAll(".operation-btn").forEach((btn) => {
            btn.classList.toggle("is-active", btn.dataset.operation === operation);
          });
          syncEditRotationControls();
          syncEditToolboxState();
          requestRender();
        }

        function rebuildPreviewTrajectory(wellIndex) {
          if (editWellHasExplicitPoints(wellIndex)) {
            if (editWellHasComplexExplicitPoints(wellIndex)) {
              const points = targetEditPointEntries(wellIndex)
                .map((entry) => copyEditPoint(entry.position))
                .filter((point) => point.every((value) => Number.isFinite(value)));
              updateLineGeometry(
                editLineObjects[wellIndex],
                points,
                Z_DISPLAY_SIGN,
                sceneOrigin,
                worldAxisZScaleFactor(),
              );
              syncEditVisibility();
              return;
            }
          }
          const replanner = editReplanners[wellIndex];
          const t1 = editCurrentT1[wellIndex];
          const t3 = editCurrentT3[wellIndex];
          const pts = replanner.compute(t1, t3);
          const sidetrackWindowEntry = sidetrackWindowEntryForWell(wellIndex);
          if (
            sidetrackWindowEntry &&
            sidetrackWindowEntry.position &&
            pts.length >= 1
          ) {
            pts[0] = copyEditPoint(sidetrackWindowEntry.position);
          }
          if (pts.length >= 1) {
            pts[pts.length - 1] = t3.slice();
          }
          updateLineGeometry(
            editLineObjects[wellIndex],
            pts,
            Z_DISPLAY_SIGN,
            sceneOrigin,
            worldAxisZScaleFactor(),
          );
          syncEditVisibility();
        }

        function dataPointDistance(left, right) {
          return Math.hypot(
            Number(left[0]) - Number(right[0]),
            Number(left[1]) - Number(right[1]),
            Number(left[2]) - Number(right[2]),
          );
        }

        function nearestPreviewPointIndex(points, target) {
          let bestIndex = 0;
          let bestDistance = Number.POSITIVE_INFINITY;
          points.forEach((point, index) => {
            const distance = dataPointDistance(point, target);
            if (distance < bestDistance) {
              bestDistance = distance;
              bestIndex = index;
            }
          });
          return bestIndex;
        }

        function rotatePointAroundPivotXY(point, pivot, angle) {
          const dx = Number(point[0]) - Number(pivot[0]);
          const dy = Number(point[1]) - Number(pivot[1]);
          const cosA = Math.cos(angle);
          const sinA = Math.sin(angle);
          return [
            Number(pivot[0]) + dx * cosA - dy * sinA,
            Number(pivot[1]) + dx * sinA + dy * cosA,
            Number(point[2]),
          ];
        }

        function rotatedPreviewTrajectoryPoints(wellIndex, deltaAngle, nextT1, nextT3) {
          if (
            !Array.isArray(editRotateStartPreviewPoints) ||
            editRotateStartPreviewPoints.length < 3 ||
            !editRotateHistoryStartState
          ) {
            return null;
          }
          const startT1 = editRotateHistoryStartState.t1;
          const rawT1Index = nearestPreviewPointIndex(
            editRotateStartPreviewPoints,
            startT1,
          );
          const t1Index = Math.min(
            Math.max(rawT1Index, 1),
            editRotateStartPreviewPoints.length - 2,
          );
          const rotated = editRotateStartPreviewPoints.map((point, index) => {
            if (!Array.isArray(point) || point.length < 3) {
              return null;
            }
            if (index < t1Index) {
              return copyEditPoint(point);
            }
            if (index === t1Index) {
              return copyEditPoint(nextT1);
            }
            return rotatePointAroundPivotXY(point, startT1, deltaAngle);
          }).filter(Boolean);
          if (rotated.length < 2) {
            return null;
          }
          rotated[0] = copyEditPoint((editWells[wellIndex] || {}).surface || rotated[0]);
          rotated[rotated.length - 1] = copyEditPoint(nextT3);
          return rotated;
        }

        function rebuildRotatedPreviewTrajectory(wellIndex, deltaAngle, nextT1, nextT3) {
          const rotatedPoints = rotatedPreviewTrajectoryPoints(
            wellIndex,
            deltaAngle,
            nextT1,
            nextT3,
          );
          if (rotatedPoints && rotatedPoints.length >= 2) {
            updateLineGeometry(
              editLineObjects[wellIndex],
              rotatedPoints,
              Z_DISPLAY_SIGN,
              sceneOrigin,
              worldAxisZScaleFactor(),
            );
            syncEditVisibility();
            return;
          }
          rebuildPreviewTrajectory(wellIndex);
        }

        function showEditFeedback() {
          editHasAnyChange = editDirtyFlags.some(Boolean);
          if (!editHasAnyChange) {
            editWarningDismissed = false;
          }
          editSaveBtn.classList.toggle(
            "is-visible",
            editModeActive && editHasAnyChange,
          );
          editWarningToast.classList.toggle(
            "is-visible",
            editModeActive && editHasAnyChange && !editWarningDismissed,
          );
          syncEditToolboxState();
        }

        function editStepBasisVectors(wellIndex) {
          const t1 = editCurrentT1[wellIndex] || editOriginalT1[wellIndex] || [0, 0, 0];
          const t3 = editCurrentT3[wellIndex] || editOriginalT3[wellIndex] || [0, 0, 0];
          let dx = Number(t3[0]) - Number(t1[0]);
          let dy = Number(t3[1]) - Number(t1[1]);
          let dz = Number(t3[2]) - Number(t1[2]);
          let length = Math.hypot(dx, dy, dz);
          if (!(length > EDIT_DELTA_EPS_M)) {
            dx = 1.0;
            dy = 0.0;
            dz = 0.0;
            length = 1.0;
          }
          const forward = [dx / length, dy / length, dz / length];
          const horizontalLength = Math.hypot(dx, dy);
          const perpendicular =
            horizontalLength > EDIT_DELTA_EPS_M
              ? [-dy / horizontalLength, dx / horizontalLength, 0.0]
              : [0.0, 1.0, 0.0];
          return {
            forward: forward,
            backward: [-forward[0], -forward[1], -forward[2]],
            left: perpendicular,
            right: [-perpendicular[0], -perpendicular[1], 0.0],
          };
        }

        function editKeyboardDeltaForKey(key, wellIndex) {
          const basis = editStepBasisVectors(wellIndex);
          let direction = null;
          switch (String(key || "")) {
            case "ArrowUp":
              direction = basis.forward;
              break;
            case "ArrowDown":
              direction = basis.backward;
              break;
            case "ArrowLeft":
              direction = basis.left;
              break;
            case "ArrowRight":
              direction = basis.right;
              break;
            default:
              return null;
          }
          return direction.map((value) => value * EDIT_KEYBOARD_STEP_M);
        }

        function shouldHandleEditKeyboardEvent(event) {
          if (
            !editModeActive ||
            editTransformMode !== "move" ||
            !Number.isInteger(selectedEditWellIndex) ||
            editDragHandle ||
            Number.isInteger(editRotateWellIndex) ||
            event.defaultPrevented ||
            event.altKey ||
            event.ctrlKey ||
            event.metaKey
          ) {
            return false;
          }
          const key = String(event.key || "");
          if (
            key !== "ArrowUp" &&
            key !== "ArrowDown" &&
            key !== "ArrowLeft" &&
            key !== "ArrowRight"
          ) {
            return false;
          }
          const target = event.target;
          if (!target || !(target instanceof Element)) {
            return true;
          }
          if (target.isContentEditable) {
            return false;
          }
          const tagName = String(target.tagName || "").toUpperCase();
          return (
            tagName !== "INPUT" &&
            tagName !== "TEXTAREA" &&
            tagName !== "SELECT" &&
            tagName !== "BUTTON"
          );
        }

        function applyKeyboardEditDelta(wellIndex, delta) {
          if (
            !Number.isInteger(wellIndex) ||
            !Array.isArray(delta) ||
            delta.length < 3
          ) {
            return false;
          }
          const dx = Number(delta[0]) || 0.0;
          const dy = Number(delta[1]) || 0.0;
          const dz = Number(delta[2]) || 0.0;
          if (
            Math.abs(dx) <= EDIT_DELTA_EPS_M &&
            Math.abs(dy) <= EDIT_DELTA_EPS_M &&
            Math.abs(dz) <= EDIT_DELTA_EPS_M
          ) {
            return false;
          }
          syncSelectedEditHandle();
          const activeHandle = selectedEditHandle();
          if (
            editMoveScope !== "pair" &&
            (
              !activeHandle ||
              activeHandle.wellIndex !== wellIndex ||
              activeHandle.pointRole === "sidetrack_window"
            )
          ) {
            return false;
          }
          const previousStates = collectEditStates(
            synchronizedEditWellIndices(
              wellIndex,
              activeHandle ? activeHandle.pointRole : "t3",
              editMoveScope,
            ),
          );
          const appliedIndices = applySynchronizedDeltaFromStates(
            previousStates,
            wellIndex,
            activeHandle || { pointType: "t3", pointRole: "t3" },
            [dx, dy, dz],
            editMoveScope,
          );
          if (appliedIndices.length === 0) {
            return false;
          }
          finalizeEditUpdates(appliedIndices);
          pushEditUndoStates(previousStates);
          return true;
        }

        function onEditKeyDown(event) {
          if (!shouldHandleEditKeyboardEvent(event)) {
            return;
          }
          const delta = editKeyboardDeltaForKey(event.key, selectedEditWellIndex);
          if (!delta || !applyKeyboardEditDelta(selectedEditWellIndex, delta)) {
            return;
          }
          event.preventDefault();
          event.stopPropagation();
        }

        function editAxisDirection() {
          return new THREE.Vector3(0, 0, 1);
        }

        function pointerRay(event) {
          const rect = renderer.domElement.getBoundingClientRect();
          const mouse = new THREE.Vector2(
            ((event.clientX - rect.left) / rect.width) * 2 - 1,
            -((event.clientY - rect.top) / rect.height) * 2 + 1,
          );
          const ray = new THREE.Raycaster();
          ray.setFromCamera(mouse, camera);
          return ray.ray;
        }

        function pointerRayForViewport(event, activeCamera, viewportRect) {
          if (!activeCamera || !viewportRect) {
            return null;
          }
          const width = Math.max(Number(viewportRect.width) || 0, 1);
          const height = Math.max(Number(viewportRect.height) || 0, 1);
          const mouse = new THREE.Vector2(
            ((Number(event.clientX || 0) - Number(viewportRect.left || 0)) / width) * 2 - 1,
            -((Number(event.clientY || 0) - Number(viewportRect.top || 0)) / height) * 2 + 1,
          );
          const raycaster = new THREE.Raycaster();
          raycaster.setFromCamera(mouse, activeCamera);
          return raycaster.ray.clone();
        }

        function miniMapViewportClientRect() {
          const canvasRect = renderer.domElement.getBoundingClientRect();
          const rect = miniMapCanvasRect();
          return {
            left: Number(canvasRect.left || 0) + Number(rect.x || 0),
            top:
              Number(canvasRect.top || 0) +
              Number(rect.canvasHeight || 0) -
              Number(rect.y || 0) -
              Number(rect.height || 0),
            width: Number(rect.width || 0),
            height: Number(rect.height || 0),
          };
        }

        function pointerPlaneIntersection(event, displayZ) {
          const ray = pointerRay(event);
          const plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), -displayZ);
          const hitPoint = new THREE.Vector3();
          return ray.intersectPlane(plane, hitPoint) ? hitPoint : null;
        }

        function nearestSidetrackParentPointFromRawTarget(handle, target) {
          const parentPoints =
            handle && handle.sidetrackWindow
              ? handle.sidetrackWindow.parentPoints
              : [];
          if (!Array.isArray(parentPoints) || parentPoints.length < 2) {
            return null;
          }
          let best = null;
          let bestDistance = Number.POSITIVE_INFINITY;
          for (let index = 0; index < parentPoints.length - 1; index += 1) {
            const start = parentPoints[index];
            const end = parentPoints[index + 1];
            const vx = end[0] - start[0];
            const vy = end[1] - start[1];
            const vz = end[2] - start[2];
            const lengthSq = vx * vx + vy * vy + vz * vz;
            if (lengthSq <= EDIT_DELTA_EPS_M * EDIT_DELTA_EPS_M) {
              continue;
            }
            const rawT =
              ((target[0] - start[0]) * vx +
                (target[1] - start[1]) * vy +
                (target[2] - start[2]) * vz) /
              lengthSq;
            const t = Math.max(0.0, Math.min(1.0, rawT));
            const point = [
              start[0] + vx * t,
              start[1] + vy * t,
              start[2] + vz * t,
            ];
            const distance = dataPointDistance(point, target);
            if (distance < bestDistance) {
              bestDistance = distance;
              best = {
                position: point,
                mdM: start[3] + (end[3] - start[3]) * t,
              };
            }
          }
          return best;
        }

        function nearestSidetrackParentPoint(handle, event, inputMode, fallbackTarget) {
          const parentPoints =
            handle && handle.sidetrackWindow
              ? handle.sidetrackWindow.parentPoints
              : [];
          if (!Array.isArray(parentPoints) || parentPoints.length < 2) {
            return null;
          }
          const viewportRect =
            inputMode === "minimap"
              ? miniMapViewportClientRect()
              : renderer.domElement.getBoundingClientRect();
          const activeCamera = inputMode === "minimap" ? miniMapCamera : camera;
          const ray = pointerRayForViewport(event, activeCamera, viewportRect);
          if (!ray || typeof ray.distanceSqToSegment !== "function") {
            return nearestSidetrackParentPointFromRawTarget(handle, fallbackTarget);
          }
          let best = null;
          let bestDistanceSq = Number.POSITIVE_INFINITY;
          const pointOnRay = new THREE.Vector3();
          const pointOnSegment = new THREE.Vector3();
          for (let index = 0; index < parentPoints.length - 1; index += 1) {
            const start = parentPoints[index];
            const end = parentPoints[index + 1];
            const startDisplay = displayPoint(start);
            const endDisplay = displayPoint(end);
            if (
              !Number.isFinite(startDisplay.x) ||
              !Number.isFinite(startDisplay.y) ||
              !Number.isFinite(startDisplay.z) ||
              !Number.isFinite(endDisplay.x) ||
              !Number.isFinite(endDisplay.y) ||
              !Number.isFinite(endDisplay.z)
            ) {
              continue;
            }
            const distanceSq = ray.distanceSqToSegment(
              startDisplay,
              endDisplay,
              pointOnRay,
              pointOnSegment,
            );
            if (!Number.isFinite(distanceSq) || distanceSq >= bestDistanceSq) {
              continue;
            }
            const displayDx = endDisplay.x - startDisplay.x;
            const displayDy = endDisplay.y - startDisplay.y;
            const displayDz = endDisplay.z - startDisplay.z;
            const displayLengthSq =
              displayDx * displayDx + displayDy * displayDy + displayDz * displayDz;
            const t =
              displayLengthSq > EDIT_DELTA_EPS_M * EDIT_DELTA_EPS_M
                ? clampValue(
                    (
                      (pointOnSegment.x - startDisplay.x) * displayDx +
                      (pointOnSegment.y - startDisplay.y) * displayDy +
                      (pointOnSegment.z - startDisplay.z) * displayDz
                    ) / displayLengthSq,
                    0.0,
                    1.0,
                  )
                : 0.0;
            bestDistanceSq = distanceSq;
            best = {
              position: [
                start[0] + (end[0] - start[0]) * t,
                start[1] + (end[1] - start[1]) * t,
                start[2] + (end[2] - start[2]) * t,
              ],
              mdM: start[3] + (end[3] - start[3]) * t,
            };
          }
          return best || nearestSidetrackParentPointFromRawTarget(handle, fallbackTarget);
        }

        function snappedSidetrackWindowEntry(handle, event, inputMode, rawPosition) {
          const snapped = nearestSidetrackParentPoint(
            handle,
            event,
            inputMode,
            rawPosition,
          );
          if (!snapped) {
            return {
              position: rawPosition,
              sidetrackWindow: handle ? handle.sidetrackWindow : null,
            };
          }
          const nextWindow = {
            kind: "md",
            valueM: snapped.mdM,
            parentName: String((handle.sidetrackWindow || {}).parentName || ""),
            parentPoints: Array.isArray((handle.sidetrackWindow || {}).parentPoints)
              ? handle.sidetrackWindow.parentPoints
              : [],
          };
          return {
            position: snapped.position,
            sidetrackWindow: nextWindow,
          };
        }

        function pointerAngleAroundCenter(event, centerDisplay, planeZ, fallbackAngle) {
          const hitPoint = pointerPlaneIntersection(event, planeZ);
          if (!hitPoint || !centerDisplay) {
            return fallbackAngle;
          }
          const dx = hitPoint.x - centerDisplay.x;
          const dy = hitPoint.y - centerDisplay.y;
          if (Math.hypot(dx, dy) <= EDIT_DELTA_EPS_M) {
            return fallbackAngle;
          }
          return Math.atan2(dy, dx);
        }

        function startEditRotationDrag(wellIndex, event) {
          if (!editRotationModeEnabled()) {
            return false;
          }
          if (!Number.isInteger(wellIndex) || wellIndex !== selectedEditWellIndex) {
            return false;
          }
          const startState = cloneEditState(wellIndex);
          const startVector = {
            x: startState.t3[0] - startState.t1[0],
            y: startState.t3[1] - startState.t1[1],
            z: startState.t3[2],
          };
          if (Math.hypot(startVector.x, startVector.y) <= EDIT_DELTA_EPS_M) {
            return false;
          }
          editRotateWellIndex = wellIndex;
          editRotateHistoryStartState = startState;
          editRotateStartVector = startVector;
          try {
            editRotateStartPreviewPoints = editReplanners[wellIndex].compute(
              startState.t1,
              startState.t3,
            );
          } catch (e) {
            editRotateStartPreviewPoints = null;
          }
          editRotateCenterDisplay = editRotationCenterDisplay(wellIndex);
          editRotatePlaneZ = editRotateCenterDisplay.z;
          editRotateStartAngle = pointerAngleAroundCenter(
            event,
            editRotateCenterDisplay,
            editRotatePlaneZ,
            Math.atan2(startVector.y, startVector.x),
          );
          controls.enabled = false;
          interactionActive = true;
          hideTooltip();
          syncEditRotationControls();
          try {
            renderer.domElement.setPointerCapture(event.pointerId);
          } catch (e) { /* ignore */ }
          event.preventDefault();
          event.stopPropagation();
          requestRender();
          return true;
        }

        function updateEditRotationDrag(event) {
          if (
            !Number.isInteger(editRotateWellIndex) ||
            !editRotateHistoryStartState ||
            !editRotateStartVector ||
            !editRotateCenterDisplay
          ) {
            return;
          }
          const angle = pointerAngleAroundCenter(
            event,
            editRotateCenterDisplay,
            editRotatePlaneZ,
            editRotateStartAngle,
          );
          const deltaAngle = angle - editRotateStartAngle;
          const cosA = Math.cos(deltaAngle);
          const sinA = Math.sin(deltaAngle);
          const rotatedX =
            editRotateStartVector.x * cosA - editRotateStartVector.y * sinA;
          const rotatedY =
            editRotateStartVector.x * sinA + editRotateStartVector.y * cosA;
          const nextT1 = copyEditPoint(editRotateHistoryStartState.t1);
          const nextT3 = copyEditPoint(editRotateHistoryStartState.t3);
          nextT3[0] = nextT1[0] + rotatedX;
          nextT3[1] = nextT1[1] + rotatedY;
          nextT3[2] = editRotateStartVector.z;
          updateWellEditTargets(editRotateWellIndex, nextT1, nextT3);
          editDirtyFlags[editRotateWellIndex] = isEditWellDirty(editRotateWellIndex);
          rebuildRotatedPreviewTrajectory(
            editRotateWellIndex,
            deltaAngle,
            nextT1,
            nextT3,
          );
          resetEditSaveButtonState();
          syncEditVisibility();
          showEditFeedback();
          event.preventDefault();
          event.stopPropagation();
          requestRender();
        }

        function endEditRotationDrag(event) {
          if (!Number.isInteger(editRotateWellIndex)) {
            return false;
          }
          const wellIndex = editRotateWellIndex;
          pushEditUndoState(wellIndex, editRotateHistoryStartState);
          controls.enabled = true;
          editRotateWellIndex = null;
          editRotateStartAngle = 0.0;
          editRotatePlaneZ = 0.0;
          editRotateCenterDisplay = null;
          editRotateHistoryStartState = null;
          editRotateStartVector = null;
          editRotateStartPreviewPoints = null;
          interactionActive = false;
          syncEditRotationControls();
          try {
            renderer.domElement.releasePointerCapture(event.pointerId);
          } catch (e) { /* ignore */ }
          event.preventDefault();
          event.stopPropagation();
          requestRender();
          return true;
        }

        function closestAxisParameter(event, axisOrigin, axisDirection) {
          const ray = pointerRay(event);
          const direction = axisDirection.clone().normalize();
          const w0 = axisOrigin.clone().sub(ray.origin);
          const b = direction.dot(ray.direction);
          const d = direction.dot(w0);
          const e = ray.direction.dot(w0);
          const denominator = 1.0 - b * b;
          if (Math.abs(denominator) < 1e-6) {
            return -d;
          }
          return (b * e - d) / denominator;
        }

        function miniMapEditableHandleAtEvent(event) {
          if (
            !editModeActive ||
            !Number.isInteger(selectedEditWellIndex) ||
            editTransformMode === "rotate"
          ) {
            return null;
          }
          const rect = miniMapCanvasRect();
          const pointerLocal = miniMapLocalAtEvent(event, rect);
          let bestHandle = null;
          let bestDistance = Number.POSITIVE_INFINITY;
          editHandles.forEach((handle) => {
            if (handle.wellIndex !== selectedEditWellIndex || !handle.mesh.visible) {
              return;
            }
            const local = miniMapLocalFromDisplayPoint(handle.mesh.position, rect);
            const distance = Math.hypot(
              local.x - pointerLocal.x,
              local.y - pointerLocal.y,
            );
            if (distance < bestDistance) {
              bestDistance = distance;
              bestHandle = handle;
            }
          });
          const pickRadiusPx = Math.max(
            18.0,
            Math.min(rect.width, rect.height) * 0.045,
          );
          return bestDistance <= pickRadiusPx ? bestHandle : null;
        }

        function startMiniMapEditDrag(event) {
          const handle = miniMapEditableHandleAtEvent(event);
          if (!handle) {
            return false;
          }
          selectedEditHandleIndex = editHandles.indexOf(handle);
          controls.enabled = false;
          interactionActive = true;
          hideTooltip();
          editDragHandle = handle;
          editDragStartPosition = handle.mesh.position.clone();
          editDragHistoryStartState = cloneEditState(handle.wellIndex);
          editDragPlane = "xy";
          editDragMoveScope =
            handle.pointRole === "sidetrack_window" ? "point" : editMoveScope;
          editDragHistoryStatesByWell = collectEditStates(
            synchronizedEditWellIndices(
              handle.wellIndex,
              handle.pointRole,
              editDragMoveScope,
            ),
          );
          editDragInputMode = "minimap";
          editDragPlaneZ = editDragStartPosition.z;
          const planeHit = miniMapWorldAtEvent(event);
          planeHit.z = editDragPlaneZ;
          editDragPointerOffset = editDragStartPosition.clone().sub(planeHit);
          editDragAxisOrigin = null;
          editDragAxisDirection = null;
          editDragStartAxisT = 0.0;
          try {
            renderer.domElement.setPointerCapture(event.pointerId);
          } catch (e) { /* ignore */ }
          syncEditVisibility();
          return true;
        }

        function onEditPointerDown(event) {
          if (!editModeActive) return;
          if (isPointerInMiniMap(event)) return;
          const rect = renderer.domElement.getBoundingClientRect();
          const mouse = new THREE.Vector2(
            ((event.clientX - rect.left) / rect.width) * 2 - 1,
            -((event.clientY - rect.top) / rect.height) * 2 + 1,
          );
          const ray = new THREE.Raycaster();
          ray.setFromCamera(mouse, camera);
          if (editRotationModeEnabled()) {
            const rotateMeshes = editRotationPickMeshes.filter((mesh) => {
              const wellIndex = Number(mesh.userData.editRotationWellIndex);
              const control = editRotationControls[wellIndex];
              return (
                wellIndex === selectedEditWellIndex &&
                control &&
                control.group.visible
              );
            });
            const rotateHits = ray.intersectObjects(rotateMeshes, false);
            if (rotateHits.length) {
              const rotateWellIndex = Number(
                rotateHits[0].object.userData.editRotationWellIndex,
              );
              if (startEditRotationDrag(rotateWellIndex, event)) {
                return;
              }
            }
          }
          const meshes = editHandles
            .filter((h) => h.wellIndex === selectedEditWellIndex)
            .map((h) => h.pickMesh || h.mesh);
          const hits = ray.intersectObjects(meshes, false);
          if (!hits.length) return;
          const hitMesh = hits[0].object;
          const handle = editHandles.find(
            (h) => h.mesh === hitMesh || h.pickMesh === hitMesh,
          );
          if (!handle) return;
          selectedEditHandleIndex = Number(handle.pickMesh && handle.pickMesh.userData
            ? handle.pickMesh.userData.editHandleIndex
            : editHandles.indexOf(handle));
          if (editRotationModeEnabled()) {
            if (handle.pointRole !== "t3") {
              event.preventDefault();
              event.stopPropagation();
              return;
            }
            if (!startEditRotationDrag(handle.wellIndex, event)) {
              event.preventDefault();
              event.stopPropagation();
            }
            syncEditVisibility();
            return;
          }
          event.preventDefault();
          event.stopPropagation();
          controls.enabled = false;
          interactionActive = true;
          hideTooltip();
          editDragHandle = handle;
          editDragStartPosition = handle.mesh.position.clone();
          editDragHistoryStartState = cloneEditState(handle.wellIndex);
          editDragPlane = editPlane;
          editDragMoveScope =
            handle.pointRole === "sidetrack_window" ? "point" : editMoveScope;
          editDragHistoryStatesByWell = collectEditStates(
            synchronizedEditWellIndices(
              handle.wellIndex,
              handle.pointRole,
              editDragMoveScope,
            ),
          );
          editDragInputMode = "scene";
          if (editDragPlane === "xy") {
            const planeHit = pointerPlaneIntersection(event, editDragStartPosition.z);
            editDragPlaneZ = editDragStartPosition.z;
            editDragPointerOffset = editDragStartPosition
              .clone()
              .sub(planeHit || editDragStartPosition);
            editDragAxisOrigin = null;
            editDragAxisDirection = null;
            editDragStartAxisT = 0.0;
          } else {
            editDragAxisOrigin = handle.mesh.position.clone();
            editDragAxisDirection = editAxisDirection();
            editDragPointerOffset = null;
            editDragStartAxisT = closestAxisParameter(
              event,
              editDragAxisOrigin,
              editDragAxisDirection,
            );
          }
          try {
            renderer.domElement.setPointerCapture(event.pointerId);
          } catch (e) { /* ignore */ }
          syncEditVisibility();
        }

        function onEditPointerMove(event) {
          if (Number.isInteger(editRotateWellIndex)) {
            updateEditRotationDrag(event);
            return;
          }
          if (!editDragHandle || !editDragStartPosition) return;
          let newPos = null;
          if (editDragPlane === "xy") {
            const planeHit =
              editDragInputMode === "minimap"
                ? miniMapWorldAtEvent(event)
                : pointerPlaneIntersection(event, editDragPlaneZ);
            if (!planeHit) return;
            planeHit.z = editDragPlaneZ;
            newPos = planeHit.add(editDragPointerOffset || new THREE.Vector3());
            newPos.z = editDragPlaneZ;
          } else {
            if (!editDragAxisOrigin || !editDragAxisDirection) return;
            const axisT = closestAxisParameter(
              event,
              editDragAxisOrigin,
              editDragAxisDirection,
            );
            if (!Number.isFinite(axisT)) return;
            newPos = editDragStartPosition
              .clone()
              .addScaledVector(editDragAxisDirection, axisT - editDragStartAxisT);
          }
          // Convert local display coords back to original data CRS.
