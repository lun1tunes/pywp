        function createWorldAxisLineSegments(positions, color, opacity, renderOrder) {
          const geometry = new THREE.BufferGeometry();
          geometry.setAttribute(
            "position",
            new THREE.Float32BufferAttribute(new Float32Array(positions), 3),
          );
          const material = new THREE.LineBasicMaterial({
            color: color,
            transparent: true,
            opacity: opacity,
            depthTest: false,
            depthWrite: false,
          });
          const lineSegments = new THREE.LineSegments(geometry, material);
          lineSegments.renderOrder = renderOrder;
          return lineSegments;
        }

        function buildWorldAxisLabelSpecs(
          planeRawZ,
          topRawZ,
          xyStep,
          zStep,
          xTickCount,
          yTickCount,
          zMajorRawValues,
          showXyStepLabels,
        ) {
          const xDirection = 1.0;
          const yDirection = 1.0;
          const xMax = xyStep * xTickCount * xDirection;
          const yMax = xyStep * yTickCount * yDirection;
          const zMax = Math.max(Number(planeRawZ) - Number(topRawZ), 0.0);
          const zScaleFactor = worldAxisZScaleFactor();
          const labelSpecs = [];
          for (let xIndex = 0; xIndex <= xTickCount; xIndex += 1) {
            const xValue = xyStep * xIndex * xDirection;
            labelSpecs.push({
              text: formatWorldAxisValue(
                worldAxisOverlay.anchorRaw.x + xValue,
                xyStep,
              ),
              color: "#5b6472",
              localPosition: new THREE.Vector3(xValue, yMax, 0),
              offsetX: 0,
              offsetY: -12,
            });
          }
          labelSpecs.push({
            text: formatWorldAxisValue(
              worldAxisOverlay.anchorRaw.y,
              xyStep,
            ),
            color: "#5b6472",
            localPosition: new THREE.Vector3(0, 0, 0),
            offsetX: -14,
            offsetY: 0,
          });
          labelSpecs.push({
            text: formatWorldAxisValue(
              planeRawZ,
              zStep,
            ),
            color: "#5b6472",
            localPosition: new THREE.Vector3(0, 0, 0),
            offsetX: 12,
            offsetY: 0,
          });
          for (let yIndex = 1; yIndex <= yTickCount; yIndex += 1) {
            const yValue = xyStep * yIndex * yDirection;
            labelSpecs.push({
              text: formatWorldAxisValue(
                worldAxisOverlay.anchorRaw.y + yValue,
                xyStep,
              ),
              color: "#5b6472",
              localPosition: new THREE.Vector3(0, yValue, 0),
              offsetX: -10,
              offsetY: 0,
            });
          }
          if (showXyStepLabels) {
            const xyStepLabel = formatWorldAxisDistance(xyStep);
            for (let xIndex = 0; xIndex < xTickCount; xIndex += 1) {
              const xMid = xyStep * (xIndex + 0.5) * xDirection;
              labelSpecs.push({
                text: xyStepLabel,
                color: "#6b7ea6",
                localPosition: new THREE.Vector3(xMid, yMax, 0),
                offsetX: 0,
                offsetY: 12,
              });
            }
            for (let yIndex = 0; yIndex < yTickCount; yIndex += 1) {
              const yMid = xyStep * (yIndex + 0.5) * yDirection;
              labelSpecs.push({
                text: xyStepLabel,
                color: "#6b7ea6",
                localPosition: new THREE.Vector3(0, yMid, 0),
                offsetX: 12,
                offsetY: 0,
              });
            }
          }
          const zLabelEvery = Math.max(
            1,
            Math.ceil(
              zMajorRawValues.length /
              Math.max(Math.floor(Math.abs(worldAxisDisplayZ(-zMax)) / 54.0), 3),
            ),
          );
          const pushZAxisCoordinateLabels = (
            axisLocalX,
            axisLocalY,
            coordinateOffsetX,
            coordinateOffsetY,
            includeBaseLabel,
          ) => {
            if (includeBaseLabel) {
              labelSpecs.push({
                text: formatWorldAxisValue(
                  planeRawZ,
                  zStep,
                ),
                color: "#5b6472",
                localPosition: new THREE.Vector3(axisLocalX, axisLocalY, 0),
                offsetX: coordinateOffsetX,
                offsetY: coordinateOffsetY,
              });
            }
            zMajorRawValues.forEach((rawZValue, zIndex) => {
              const isTop = worldAxisRawLevelMatches(rawZValue, topRawZ);
              const isZero = worldAxisRawLevelMatches(rawZValue, 0.0);
              if (
                !isTop &&
                !isZero &&
                zIndex !== zMajorRawValues.length - 1 &&
                zIndex % zLabelEvery !== 0
              ) {
                return;
              }
              const distanceFromPlane = Number(planeRawZ) - Number(rawZValue);
              if (distanceFromPlane <= 0.0) {
                return;
              }
              labelSpecs.push({
                text: formatWorldAxisValue(
                  rawZValue,
                  zStep,
                ),
                color: "#5b6472",
                localPosition: new THREE.Vector3(
                  axisLocalX,
                  axisLocalY,
                  worldAxisDisplayZ(-distanceFromPlane),
                ),
                offsetX: coordinateOffsetX,
                offsetY: coordinateOffsetY,
              });
            });
          };
          pushZAxisCoordinateLabels(0, 0, 10, 0, false);
          pushZAxisCoordinateLabels(xMax, yMax, 10, 0, true);
          pushZAxisCoordinateLabels(0, yMax, 14, 0, true);
          const pushZAxisTitleLabel = (axisLocalX, axisLocalY, offsetX, offsetY) => {
            labelSpecs.push({
              text: "Z",
              color: "#6b7280",
              localPosition: new THREE.Vector3(
                axisLocalX,
                axisLocalY,
                worldAxisDisplayZ(-zMax),
              ),
              offsetX: offsetX,
              offsetY: offsetY - 10,
            });
          };
          labelSpecs.push({
            text: "X",
            color: "#6b7280",
            localPosition: new THREE.Vector3(xMax, yMax, 0),
            offsetX: 10,
            offsetY: -2,
          });
          labelSpecs.push({
            text: "Y",
            color: "#6b7280",
            localPosition: new THREE.Vector3(0, yMax, 0),
            offsetX: -2,
            offsetY: 12,
          });
          pushZAxisTitleLabel(0, 0, 8, 0);
          pushZAxisTitleLabel(xMax, yMax, 8, 0);
          pushZAxisTitleLabel(0, yMax, 16, 0);
          return labelSpecs;
        }

        function rebuildWorldAxisGeometry() {
          const metrics = worldAxisViewMetrics();
          const activeBounds = worldAxisCurrentRawBounds();
          const planeRawZ = worldAxisPlaneRawZ(activeBounds);
          const topRawZ = worldAxisTopRawZ(activeBounds);
          const xDirection = 1.0;
          const yDirection = 1.0;
          const xSpanRaw = Math.max(
            dataNumber(activeBounds.max[0], 0) - dataNumber(activeBounds.min[0], 0),
            1.0,
          );
          const ySpanRaw = Math.max(
            dataNumber(activeBounds.max[1], 0) - dataNumber(activeBounds.min[1], 0),
            1.0,
          );
          const xyCoverageStep = worldAxisNiceStep(
            Math.max(xSpanRaw, ySpanRaw, 40.0) / WORLD_AXIS_GRID_SQUARES_PER_SIDE,
          );
          const xyCoverageExtentRaw =
            xyCoverageStep * WORLD_AXIS_GRID_SQUARES_PER_SIDE;
          const xyStep = worldAxisAdaptiveMajorStep(
            metrics.unitsPerPixel,
            xyCoverageStep,
            132.0,
            100.0,
            1.0,
          );
          const xTickCount = Math.max(
            1,
            Math.round(
              xyCoverageExtentRaw /
                Math.max(Number(xyStep) || 0.000001, 0.000001),
            ),
          );
          const yTickCount = Math.max(
            1,
            Math.round(
              xyCoverageExtentRaw /
                Math.max(Number(xyStep) || 0.000001, 0.000001),
            ),
          );
          const zCoverageStep = worldAxisNiceStep(
            Math.max(worldAxisDepthRangeRaw() / 5.0, 1000.0)
          );
          const zStep = worldAxisAdaptiveZMajorStep(
            metrics.unitsPerPixel,
            zCoverageStep,
            132.0,
            50.0,
            worldAxisZScaleFactor(),
          );
          const zLength = Math.max(Number(planeRawZ) - Number(topRawZ), 0.0);
          const zDisplayLength = Math.abs(worldAxisDisplayZ(-zLength));
          const approxZPixelLength =
            zDisplayLength / Math.max(Number(metrics.unitsPerPixel) || 0.000001, 0.000001);
          const xyMajorPixelSpan =
            xyStep / Math.max(Number(metrics.unitsPerPixel) || 0.000001, 0.000001);
          const zMajorPixelSpan =
            Math.abs(worldAxisDisplayZ(-zStep)) /
            Math.max(Number(metrics.unitsPerPixel) || 0.000001, 0.000001);
          const xyMinorSubdivision = worldAxisSubdivisionForPixelSpan(xyMajorPixelSpan);
          const zMinorSubdivision = worldAxisSubdivisionForPixelSpan(zMajorPixelSpan);
          const xyTickStep = xyStep / xyMinorSubdivision;
          const showXyStepLabels = xyMajorPixelSpan >= 86.0;
          const xMin = Math.min(0.0, xyStep * xTickCount * xDirection);
          const xMax = Math.max(0.0, xyStep * xTickCount * xDirection);
          const yMin = Math.min(0.0, xyStep * yTickCount * yDirection);
          const yMax = Math.max(0.0, xyStep * yTickCount * yDirection);
          const zMajorRawValues = worldAxisMajorRawZValues(planeRawZ, topRawZ, zStep);
          const zTickSpecs = worldAxisMinorTickSpecs(
            planeRawZ,
            topRawZ,
            zStep,
            zMinorSubdivision,
          );
          const signature = [
            xyStep.toFixed(6),
            zStep.toFixed(6),
            xTickCount,
            yTickCount,
            zMajorRawValues.map((value) => Number(value).toFixed(3)).join(","),
            zTickSpecs.map((item) => `${Number(item.rawZ).toFixed(3)}:${item.major ? 1 : 0}`).join(","),
            xyMinorSubdivision,
            zMinorSubdivision,
            worldAxisZScaleFactor().toFixed(3),
            planeRawZ.toFixed(3),
            dataNumber(activeBounds.min[0], 0).toFixed(3),
            dataNumber(activeBounds.min[1], 0).toFixed(3),
            dataNumber(activeBounds.min[2], 0).toFixed(3),
            dataNumber(activeBounds.max[0], 0).toFixed(3),
            dataNumber(activeBounds.max[1], 0).toFixed(3),
            dataNumber(activeBounds.max[2], 0).toFixed(3),
          ].join("|");
          const gridAnchorRaw = worldAxisResolvedAnchorRaw(
            xyStep,
            xTickCount,
            yTickCount,
          );
          worldAxisOverlay.anchorRaw = {
            x: Number(gridAnchorRaw.x) || 0,
            y: Number(gridAnchorRaw.y) || 0,
          };
          const labelSpecs = buildWorldAxisLabelSpecs(
            planeRawZ,
            topRawZ,
            xyStep,
            zStep,
            xTickCount,
            yTickCount,
            zMajorRawValues,
            showXyStepLabels,
          );
          if (worldAxisOverlay.signature === signature) {
            worldAxisOverlay.labelSpecs = labelSpecs;
            ensureWorldAxisLabels(labelSpecs.length);
            updateWorldAxisLabelsPosition();
            return;
          }
          worldAxisOverlay.signature = signature;
          clearWorldAxisGeometry();

          const gridPositions = [];
          const minorGridPositions = [];
          for (let xIndex = 0; xIndex <= xTickCount; xIndex += 1) {
            const xValue = xyStep * xIndex * xDirection;
            pushWorldAxisSegment(
              gridPositions,
              [xValue, yMin, 0],
              [xValue, yMax, 0],
            );
          }
          for (let yIndex = 0; yIndex <= yTickCount; yIndex += 1) {
            const yValue = xyStep * yIndex * yDirection;
            pushWorldAxisSegment(
              gridPositions,
              [xMin, yValue, 0],
              [xMax, yValue, 0],
            );
          }
          for (let xIndex = 0; xIndex <= xTickCount; xIndex += 1) {
            const xValue = xyStep * xIndex * xDirection;
            pushWorldAxisSegment(
              gridPositions,
              [xValue, yMax, 0],
              [xValue, yMax, worldAxisDisplayZ(-zLength)],
            );
          }
          for (let yIndex = 0; yIndex <= yTickCount; yIndex += 1) {
            const yValue = xyStep * yIndex * yDirection;
            pushWorldAxisSegment(
              gridPositions,
              [0, yValue, 0],
              [0, yValue, worldAxisDisplayZ(-zLength)],
            );
          }
          zTickSpecs.forEach((tickSpec) => {
            if (tickSpec.major) {
              return;
            }
            if (
              Number(tickSpec.rawZ) < 0.0 &&
              !worldAxisRawLevelMatches(tickSpec.rawZ, 0.0)
            ) {
              return;
            }
            const distanceFromPlane = Number(planeRawZ) - Number(tickSpec.rawZ);
            if (distanceFromPlane <= 0.0) {
              return;
            }
            const zValue = worldAxisDisplayZ(-distanceFromPlane);
            pushWorldAxisSegment(
              minorGridPositions,
              [xMin, yMax, zValue],
              [xMax, yMax, zValue],
            );
            pushWorldAxisSegment(
              minorGridPositions,
              [0, yMin, zValue],
              [0, yMax, zValue],
            );
          });
          zMajorRawValues.forEach((rawZValue) => {
            if (
              Number(rawZValue) < 0.0 &&
              !worldAxisRawLevelMatches(rawZValue, 0.0)
            ) {
              return;
            }
            const distanceFromPlane = Number(planeRawZ) - Number(rawZValue);
            if (distanceFromPlane <= 0.0) {
              return;
            }
            const zValue = worldAxisDisplayZ(-distanceFromPlane);
            pushWorldAxisSegment(
              gridPositions,
              [xMin, yMax, zValue],
              [xMax, yMax, zValue],
            );
            pushWorldAxisSegment(
              gridPositions,
              [0, yMin, zValue],
              [0, yMax, zValue],
            );
          });

          const axisPositions = [];
          pushWorldAxisSegment(axisPositions, [xMin, yMax, 0], [xMax, yMax, 0]);
          pushWorldAxisSegment(axisPositions, [0, yMin, 0], [0, yMax, 0]);
          pushWorldAxisSegment(
            axisPositions,
            [0, 0, 0],
            [0, 0, worldAxisDisplayZ(-zLength)],
          );
          pushWorldAxisSegment(
            axisPositions,
            [xMax, yMax, 0],
            [xMax, yMax, worldAxisDisplayZ(-zLength)],
          );
          pushWorldAxisSegment(
            axisPositions,
            [0, yMax, 0],
            [0, yMax, worldAxisDisplayZ(-zLength)],
          );
          const xyTickMinorHalf = Math.max(Math.min(xyStep * 0.03, 9.0), 3.0);
          const xyTickMajorHalf = xyTickMinorHalf * 1.6;
          for (
            let xTickIndex = 1;
            xTickIndex <= xTickCount * xyMinorSubdivision;
            xTickIndex += 1
          ) {
            const xValue = xyTickStep * xTickIndex * xDirection;
            const tickHalf =
              xTickIndex % xyMinorSubdivision === 0
                ? xyTickMajorHalf
                : xyTickMinorHalf;
            pushWorldAxisSegment(
              axisPositions,
              [xValue, yMax - tickHalf, 0],
              [xValue, yMax + tickHalf, 0],
            );
          }
          for (
            let yTickIndex = 1;
            yTickIndex <= yTickCount * xyMinorSubdivision;
            yTickIndex += 1
          ) {
            const yValue = xyTickStep * yTickIndex * yDirection;
            const tickHalf =
              yTickIndex % xyMinorSubdivision === 0
                ? xyTickMajorHalf
                : xyTickMinorHalf;
            pushWorldAxisSegment(
              axisPositions,
              [-tickHalf, yValue, 0],
              [tickHalf, yValue, 0],
            );
          }
          const zTickMinorHalf = Math.max(Math.min(xyStep * 0.06, 8.0), 2.5);
          const zTickMajorHalf = zTickMinorHalf * 1.6;
          zTickSpecs.forEach((tickSpec) => {
            const distanceFromPlane = Number(planeRawZ) - Number(tickSpec.rawZ);
            if (distanceFromPlane <= 0.0) {
              return;
            }
            const zTickHalf = tickSpec.major ? zTickMajorHalf : zTickMinorHalf;
            pushWorldAxisSegment(
              axisPositions,
              [-zTickHalf, 0, worldAxisDisplayZ(-distanceFromPlane)],
              [zTickHalf, 0, worldAxisDisplayZ(-distanceFromPlane)],
            );
            pushWorldAxisSegment(
              axisPositions,
              [xMax - zTickHalf, yMax, worldAxisDisplayZ(-distanceFromPlane)],
              [xMax + zTickHalf, yMax, worldAxisDisplayZ(-distanceFromPlane)],
            );
            pushWorldAxisSegment(
              axisPositions,
              [0, yMax - zTickHalf, worldAxisDisplayZ(-distanceFromPlane)],
              [0, yMax + zTickHalf, worldAxisDisplayZ(-distanceFromPlane)],
            );
          });

          if (minorGridPositions.length > 0) {
            worldAxisOverlay.group.add(
              createWorldAxisLineSegments(minorGridPositions, "#9aa3af", 0.12, 1.4),
            );
          }
          worldAxisOverlay.group.add(
            createWorldAxisLineSegments(gridPositions, "#9aa3af", 0.24, 2.0),
          );
          worldAxisOverlay.group.add(
            createWorldAxisLineSegments(axisPositions, "#6b7280", 0.58, 2.2),
          );

          worldAxisOverlay.labelSpecs = labelSpecs;
          ensureWorldAxisLabels(labelSpecs.length);
          updateWorldAxisLabelsPosition();
        }

        function updateWorldAxisLabelsPosition() {
          const planeRawZ = worldAxisPlaneRawZ(worldAxisCurrentRawBounds());
          const anchorDisplay = displayPoint([
            worldAxisOverlay.anchorRaw.x,
            worldAxisOverlay.anchorRaw.y,
            planeRawZ,
          ]);
          worldAxisOverlay.group.position.copy(anchorDisplay);
          worldAxisOverlay.labelSpecs.forEach((spec, index) => {
            const label = worldAxisOverlay.labels[index];
            if (!label) {
              return;
            }
            label.position.copy(anchorDisplay).add(spec.localPosition);
            label.element.textContent = String(spec.text || "");
            label.element.style.color = String(spec.color || "#5b6472");
            label.offsetX = Number(spec.offsetX) || 0;
            label.offsetY = Number(spec.offsetY) || 0;
            label.visible = Boolean(worldAxisOverlay.enabled);
          });
          for (let index = worldAxisOverlay.labelSpecs.length; index < worldAxisOverlay.labels.length; index += 1) {
            worldAxisOverlay.labels[index].visible = false;
          }
        }

        function updateWorldAxisDragHandlePosition(
          canvasRect,
          labelRect,
          width,
          height,
          offsetLeft,
          offsetTop,
        ) {
          if (!worldAxisDragHandle || !worldAxisOverlay.enabled) {
            if (worldAxisDragHandle) {
              worldAxisDragHandle.style.display = "none";
              worldAxisDragHandle.classList.remove("is-dragging");
            }
            return;
          }
          const projected = displayPoint([
            worldAxisOverlay.anchorRaw.x,
            worldAxisOverlay.anchorRaw.y,
            0.0,
          ]).project(camera);
          if (
            projected.z < -1.0 ||
            projected.z > 1.0 ||
            projected.x < -1.25 ||
            projected.x > 1.25 ||
            projected.y < -1.25 ||
            projected.y > 1.25
          ) {
            worldAxisDragHandle.style.display = "none";
            worldAxisDragHandle.classList.remove("is-dragging");
            return;
          }
          const screenX = offsetLeft + (((projected.x + 1.0) * 0.5) * width);
          const screenY = offsetTop + (((-projected.y + 1.0) * 0.5) * height);
          worldAxisDragHandle.style.display = "block";
          worldAxisDragHandle.style.left = `${Math.round(screenX)}px`;
          worldAxisDragHandle.style.top = `${Math.round(screenY)}px`;
          worldAxisDragHandle.classList.toggle("is-dragging", Boolean(worldAxisOverlay.dragging));
        }

        function syncWorldAxisVisibility() {
          worldAxisOverlay.group.visible = Boolean(worldAxisOverlay.enabled);
          worldAxisOverlay.labels.forEach((label, index) => {
            label.visible =
              Boolean(worldAxisOverlay.enabled) &&
              index < worldAxisOverlay.labelSpecs.length;
          });
          if (!worldAxisOverlay.enabled && worldAxisDragHandle) {
            worldAxisDragHandle.style.display = "none";
            worldAxisDragHandle.classList.remove("is-dragging");
          }
        }

        function updateWorldAxisOverlay() {
          if (!worldAxisOverlay.enabled) {
            syncWorldAxisVisibility();
            return;
          }
          rebuildWorldAxisGeometry();
          syncWorldAxisVisibility();
        }

        function worldAxisPointerNdcFromEvent(event) {
          const rect = renderer.domElement.getBoundingClientRect();
          return {
            x: ((Number(event.clientX || 0) - rect.left) / Math.max(rect.width, 1.0)) * 2.0 - 1.0,
            y: -(((Number(event.clientY || 0) - rect.top) / Math.max(rect.height, 1.0)) * 2.0 - 1.0),
          };
        }

        function startWorldAxisDrag(event) {
          if (!worldAxisOverlay.enabled) {
            return;
          }
          const planeRawZ = worldAxisPlaneRawZ(worldAxisCurrentRawBounds());
          const ndc = worldAxisPointerNdcFromEvent(event);
          const startRaw = worldAxisPlaneIntersectionRaw(
            ndc.x,
            ndc.y,
            planeRawZ,
          );
          if (!Array.isArray(startRaw)) {
            return;
          }
          worldAxisOverlay.dragging = true;
          worldAxisOverlay.dragStartRaw = {
            x: dataNumber(startRaw[0], 0),
            y: dataNumber(startRaw[1], 0),
          };
          worldAxisOverlay.dragStartOffsetRaw = {
            x: dataNumber(worldAxisOverlay.dragOffsetRaw.x, 0),
            y: dataNumber(worldAxisOverlay.dragOffsetRaw.y, 0),
          };
          interactionActive = true;
          controls.enabled = false;
          hideTooltip();
          if (worldAxisDragHandle) {
            worldAxisDragHandle.classList.add("is-dragging");
            try {
              worldAxisDragHandle.setPointerCapture(event.pointerId);
            } catch (e) { /* ignore */ }
          }
          requestRender();
          event.preventDefault();
          event.stopPropagation();
        }

        function handleWorldAxisDragPointerMove(event) {
          if (!worldAxisOverlay.dragging || !worldAxisOverlay.dragStartRaw) {
            return;
          }
          const planeRawZ = worldAxisPlaneRawZ(worldAxisCurrentRawBounds());
          const ndc = worldAxisPointerNdcFromEvent(event);
          const nextRaw = worldAxisPlaneIntersectionRaw(
            ndc.x,
            ndc.y,
            planeRawZ,
          );
          if (!Array.isArray(nextRaw)) {
            return;
          }
          worldAxisOverlay.dragOffsetRaw = {
            x:
              dataNumber(worldAxisOverlay.dragStartOffsetRaw.x, 0) +
              (dataNumber(nextRaw[0], 0) - dataNumber(worldAxisOverlay.dragStartRaw.x, 0)),
            y:
              dataNumber(worldAxisOverlay.dragStartOffsetRaw.y, 0) +
              (dataNumber(nextRaw[1], 0) - dataNumber(worldAxisOverlay.dragStartRaw.y, 0)),
          };
          worldAxisOverlay.anchorRaw = worldAxisResolvedAnchorRaw();
          requestRender();
          event.preventDefault();
          event.stopPropagation();
        }

        function endWorldAxisDrag(event) {
          if (!worldAxisOverlay.dragging) {
            return;
          }
          worldAxisOverlay.dragging = false;
          worldAxisOverlay.dragStartRaw = null;
          controls.enabled = true;
          interactionActive = false;
          if (worldAxisDragHandle) {
            worldAxisDragHandle.classList.remove("is-dragging");
            try {
              worldAxisDragHandle.releasePointerCapture(event.pointerId);
            } catch (e) { /* ignore */ }
          }
          requestRender();
          event.preventDefault();
          event.stopPropagation();
        }

        function applyViewerZScaleFactor(value) {
          const previousFactor = Math.max(worldAxisZScaleFactor(), 1.0);
          const nextFactor = sanitizeViewerZScaleFactor(value);
          if (Math.abs(nextFactor - previousFactor) < 1e-6) {
            worldAxisOverlay.zScaleFactor = nextFactor;
            syncWorldAxisScaleControls();
            return;
          }
          const zRatio = previousFactor / nextFactor;
          worldAxisOverlay.zScaleFactor = nextFactor;
          storeStringValue(
            WORLD_AXIS_Z_SCALE_STORAGE_KEY,
            String(nextFactor),
          );
          rescaleViewerSceneZ(zRatio);
          camera.position.z *= zRatio;
          controls.target.z *= zRatio;
          if (miniMapState.target && Number.isFinite(miniMapState.target.z)) {
            miniMapState.target.z *= zRatio;
          }
          if (editDragStartPosition && Number.isFinite(editDragStartPosition.z)) {
            editDragStartPosition.z *= zRatio;
          }
          if (editDragAxisOrigin && Number.isFinite(editDragAxisOrigin.z)) {
            editDragAxisOrigin.z *= zRatio;
          }
          if (editDragPointerOffset && Number.isFinite(editDragPointerOffset.z)) {
            editDragPointerOffset.z *= zRatio;
          }
          if (Number.isFinite(editDragPlaneZ)) {
            editDragPlaneZ *= zRatio;
          }
          if (editRotateCenterDisplay && Number.isFinite(editRotateCenterDisplay.z)) {
            editRotateCenterDisplay.z *= zRatio;
          }
          if (editRotateStartVector && Number.isFinite(editRotateStartVector.z)) {
            editRotateStartVector.z *= zRatio;
          }
          if (Number.isFinite(editRotatePlaneZ)) {
            editRotatePlaneZ *= zRatio;
          }
          worldAxisOverlay.signature = "";
          recomputeSceneMetrics({ resetMiniMap: false });
          updateCameraClippingFromBounds();
          updateHandleScales();
          if (worldAxisOverlay.enabled) {
            rebuildWorldAxisGeometry();
          } else {
            syncWorldAxisVisibility();
          }
          syncWorldAxisScaleControls();
          requestRender();
        }

        function syncWorldAxisScaleControls() {
          if (worldAxisZScaleSlider) {
            worldAxisZScaleSlider.value = String(worldAxisZScaleFactor());
          }
          if (worldAxisZScaleValue) {
            worldAxisZScaleValue.textContent = worldAxisZScaleLabel();

        function initWorldAxisControls() {
          if (
            !worldAxisControlWrap ||
            !worldAxisButton ||
            !worldAxisControls ||
            !worldAxisToggle ||
            !referenceLabelsToggle ||
            !worldAxisZScaleSlider ||

          ) {

          }
          if (!worldAxisControlsInitialized) {
            worldAxisToggle.addEventListener("change", () => {
              worldAxisOverlay.enabled = Boolean(worldAxisToggle.checked);
              storeBoolean(WORLD_AXIS_STORAGE_KEY, worldAxisOverlay.enabled);

              }

            referenceLabelsToggle.addEventListener("change", () => {

          referenceLabelsToggle.checked = Boolean(showAllReferenceLabels);

        }

        function resize() {
          const width = Math.max(root.clientWidth || 1, 1);
          const height = Math.max(root.clientHeight || 1, 1);
          camera.aspect = width / height;
          camera.updateProjectionMatrix();
          renderer.setSize(width, height, false);
          updateHandleScales();
          updateMiniMapOverlay();
          requestRender();
        }

        function fitCameraToRawBounds(rawBounds) {
          const localBounds = transformedBounds(rawBounds || payload.bounds || {});
          const localMin = localBounds.min;
          const localMax = localBounds.max;
          const localCenter = new THREE.Vector3()
            .addVectors(localMin, localMax)
            .multiplyScalar(0.5);
          const localSpan = new THREE.Vector3().subVectors(localMax, localMin);
          const localMaxSpan = Math.max(
            localSpan.x,
            localSpan.y,
            localSpan.z,
            1,
          );
          camera.near = Math.max(localMaxSpan / 1200.0, 0.1);
          camera.far = Math.max(localMaxSpan * 40.0, 5000.0);
          camera.up.set(0, 0, 1);
          camera.position.set(
            localCenter.x + localMaxSpan * 1.15,
            localCenter.y - localMaxSpan * 1.05,
            localCenter.z + localMaxSpan * 1.42,
          );
          controls.target.copy(localCenter);
          camera.updateProjectionMatrix();
          controls.update();
          fitMiniMapToRawBounds(rawBounds || payload.bounds || {});
          requestRender();
        }

        const DEFAULT_FIT_LEFT_BIAS_RATIO = 0.12;

        function rawBoundsMatch(leftRawBounds, rightRawBounds) {
          const leftBounds = normalizedRawBounds(leftRawBounds);
          const rightBounds = normalizedRawBounds(rightRawBounds);
          if (!leftBounds || !rightBounds) {
            return false;
          }
          const tolerance = 0.001;
          return (
            Math.abs(dataNumber(leftBounds.min[0], 0) - dataNumber(rightBounds.min[0], 0)) <= tolerance &&
            Math.abs(dataNumber(leftBounds.min[1], 0) - dataNumber(rightBounds.min[1], 0)) <= tolerance &&
            Math.abs(dataNumber(leftBounds.min[2], 0) - dataNumber(rightBounds.min[2], 0)) <= tolerance &&
            Math.abs(dataNumber(leftBounds.max[0], 0) - dataNumber(rightBounds.max[0], 0)) <= tolerance &&
            Math.abs(dataNumber(leftBounds.max[1], 0) - dataNumber(rightBounds.max[1], 0)) <= tolerance &&
            Math.abs(dataNumber(leftBounds.max[2], 0) - dataNumber(rightBounds.max[2], 0)) <= tolerance
          );
        }

        function sharedSinglePadFitBiasRatio(padFocusId, rawBounds) {
          const normalizedPadFocusId = String(padFocusId || "").trim();
          const onlyPadFocusId =
            worldAxisPadFocusIds.length === 1
              ? String(worldAxisPadFocusIds[0] || "").trim()
              : "";
          if (!normalizedPadFocusId || normalizedPadFocusId !== onlyPadFocusId) {
            return null;
          }
          const onlyPadBounds = worldAxisRawBoundsForPadFocusId(onlyPadFocusId);
          if (
            !rawBoundsMatch(rawBounds, payload.bounds || {}) ||
            !rawBoundsMatch(onlyPadBounds, payload.bounds || {})
          ) {
            return null;
          }
          return DEFAULT_FIT_LEFT_BIAS_RATIO * 0.5;
        }

        function resolvedDefaultFitBiasRatio() {
          const onlyPadFocusId =
            worldAxisPadFocusIds.length === 1
              ? String(worldAxisPadFocusIds[0] || "").trim()
              : "";
          const sharedBiasRatio = sharedSinglePadFitBiasRatio(
            onlyPadFocusId,
            worldAxisRawBoundsForPadFocusId(onlyPadFocusId),
          );
          return Number.isFinite(sharedBiasRatio)
            ? sharedBiasRatio
            : DEFAULT_FIT_LEFT_BIAS_RATIO;
        }

        function applyCameraHorizontalBias(horizontalRatio) {
          const ratio = Number(horizontalRatio);
          if (!Number.isFinite(ratio) || Math.abs(ratio) < 1e-6) {
            return;
          }
          const viewDirection = new THREE.Vector3().subVectors(
            controls.target,
            camera.position,
          );
          const distance = viewDirection.length();
          if (!Number.isFinite(distance) || distance <= 1e-6) {
            return;
          }
          viewDirection.normalize();
          const rightDirection = new THREE.Vector3()
            .crossVectors(viewDirection, camera.up)
            .normalize();
          if (rightDirection.lengthSq() <= 1e-12) {
            return;
          }
          const fovRad = THREE.MathUtils.degToRad(camera.fov);
          const viewHeight = 2.0 * Math.tan(fovRad * 0.5) * distance;
          const viewWidth = viewHeight * Math.max(camera.aspect, 0.01);
          const offset = rightDirection.multiplyScalar(viewWidth * ratio);
          camera.position.add(offset);
          controls.target.add(offset);
          controls.update();
          requestRender();
        }

        function fitCamera() {
          fitCameraToRawBounds(payload.bounds || {});
          applyCameraHorizontalBias(resolvedDefaultFitBiasRatio());
        }

        function focusViewerTarget(rawBounds, focusId) {
          const padFocusId = worldAxisPadFocusIdForFocusId(focusId);
          if (padFocusId) {
            setWorldAxisActivePadFocus(padFocusId, { resetOffset: true });
          }
          fitCameraToRawBounds(rawBounds);
          const sharedBiasRatio = sharedSinglePadFitBiasRatio(padFocusId, rawBounds);
          if (Number.isFinite(sharedBiasRatio)) {
            applyCameraHorizontalBias(sharedBiasRatio);
          }
        }

        function editWellTargetFocusBounds(index) {
          const wellIndex = Number(index);
          if (!Number.isInteger(wellIndex) || wellIndex < 0) {
            return null;
          }
          const well = editWells[wellIndex] || {};
          const editPoints = editCurrentPoints[wellIndex] || [];
          if (editPoints.length > 2) {
            const xs = editPoints.map((entry) => Number(entry.position[0]));
            const ys = editPoints.map((entry) => Number(entry.position[1]));
            const zs = editPoints.map((entry) => Number(entry.position[2]));
            const finiteValues = [...xs, ...ys, ...zs].filter(Number.isFinite);
            if (!finiteValues.length) {
              return null;
            }
            const minX = Math.min(...xs.filter(Number.isFinite));
            const maxX = Math.max(...xs.filter(Number.isFinite));
            const minY = Math.min(...ys.filter(Number.isFinite));
            const maxY = Math.max(...ys.filter(Number.isFinite));
            const minZ = Math.min(...zs.filter(Number.isFinite));
            const maxZ = Math.max(...zs.filter(Number.isFinite));
            const radius = Math.max(
              Math.max(maxX - minX, maxY - minY, maxZ - minZ) * 0.12,
              maxSpan * 0.035,
              40.0,
            );
            return {
              min: [minX - radius, minY - radius, minZ - radius],
              max: [maxX + radius, maxY + radius, maxZ + radius],
            };
          }
          const t1 = editCurrentT1[wellIndex] || well.t1;
          const t3 = editCurrentT3[wellIndex] || well.t3;
          if (!Array.isArray(t1) || !Array.isArray(t3)) {
            return null;
          }
          const midpoint = [
            (Number(t1[0]) + Number(t3[0])) * 0.5,
            (Number(t1[1]) + Number(t3[1])) * 0.5,
            (Number(t1[2]) + Number(t3[2])) * 0.5,
          ];
          const targetLength = Math.hypot(
            Number(t3[0]) - Number(t1[0]),
            Number(t3[1]) - Number(t1[1]),
            Number(t3[2]) - Number(t1[2]),
          );
          const radius = Math.max(targetLength * 0.55, maxSpan * 0.035, 40.0);
          return {
            min: [
              midpoint[0] - radius,
              midpoint[1] - radius,
              midpoint[2] - radius,
            ],
            max: [
              midpoint[0] + radius,
              midpoint[1] + radius,
              midpoint[2] + radius,
            ],
          };
        }

        function fitCameraToEditWellTargets(index) {
          const focusBounds = editWellTargetFocusBounds(index);
          if (!focusBounds) {
            return false;
          }
          fitCameraToRawBounds(focusBounds);
          return true;
        }

        function normalizedWellNameKey(value) {
          return String(value || "").trim().toLowerCase();
        }

        function sameStringSet(left, right) {
          if (left.size !== right.size) {
            return false;
          }
          for (const value of left) {
            if (!right.has(value)) {
              return false;
            }
          }
          return true;

            const wellName = normalizedWellNameKey((editWells[editableIndex] || {}).name);
            return wellName ? new Set([wellName]) : new Set();
          }
          const focusId = String((item && item.id) || "").trim();
          if (focusId.startsWith("well::")) {
            const wellName = normalizedWellNameKey(focusId.slice(6));
            return wellName ? new Set([wellName]) : new Set();
          }
          const labelKey = normalizedWellNameKey(item && item.label);
          if (labelKey && legendWellNameKeys.has(labelKey)) {
            return new Set([labelKey]);
          }
          return new Set();

        function collisionItemMatchesSelectedLegendWell(item) {
          const activeKeys = currentCollisionHighlightWellNameKeys();
          if (!item || activeKeys.size === 0) {

          }
          const wellAKey = normalizedWellNameKey(item.dataset.collisionWellA);
          const wellBKey = normalizedWellNameKey(item.dataset.collisionWellB);

        function createLegendSwatch(color, opacity, symbol) {
          const swatch = document.createElement("div");
          swatch.className = "legend-swatch";

        function createFlatLegendRow(item) {

          row.appendChild(
            createLegendSwatch(

        function legendSortLabel(item) {
          return String(
            (item && (item.label || item.name || item.id)) || "",

        function sortedLegendItems(items) {
          return (Array.isArray(items) ? items.slice() : []).sort((left, right) =>

        function renderLegend() {

          const hasContent = hasTreeLegend || (Array.isArray(flatItems) && flatItems.length > 0);

              panelStartLeft = rect.left - parentRect.left;

            header.addEventListener("pointermove", function (e) {
              if (!dragging) return;
              var dx = e.clientX - startX;
              var dy = e.clientY - startY;
              var newLeft = panelStartLeft + dx;
              var newTop = panelStartTop + dy;
              var parent = legendElement.offsetParent || document.documentElement;

              newLeft = Math.max(0, Math.min(newLeft, maxLeft));
