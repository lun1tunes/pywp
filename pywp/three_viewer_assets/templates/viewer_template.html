<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #ffffff;
        font-family:
          Inter,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      #root {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #ffffff;
      }

      #root canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
      }

      #toolbar-left,
      #toolbar-right {
        position: absolute;
        top: 10px;
        display: flex;
        gap: 8px;
        z-index: 4;
      }

      #toolbar-left {
        left: 10px;
      }

      #toolbar-right {
        right: 10px;
      }

      #legend-toggle-wrap {
        display: none;
      }

      #axes-gizmo {
        position: absolute;
        top: 54px;
        left: 10px;
        width: 136px;
        height: 118px;
        pointer-events: none;
        z-index: 3;
      }

      #axes-gizmo svg {
        width: 100%;
        height: 100%;
        overflow: visible;
      }

      .axes-gizmo-line {
        fill: none;
        stroke-linecap: round;
        stroke-width: 2.2;
      }

      .axes-gizmo-label {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.01em;
        dominant-baseline: middle;
      }

      .axes-gizmo-center {
        fill: #ffffff;
        stroke: rgba(15, 23, 42, 0.18);
        stroke-width: 1.2;
      }

      .toolbar-btn {
        border: 1px solid rgba(37, 99, 235, 0.18);
        background: rgba(255, 255, 255, 0.96);
        color: #0f172a;
        border-radius: 10px;
        padding: 6px 10px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
      }

      .toolbar-btn.is-mini {
        min-width: 30px;
        width: 30px;
        height: 30px;
        padding: 0;
        border-radius: 9px;
        font-size: 14px;
        line-height: 1;
      }

      .toolbar-btn:hover {
        background: #ffffff;
      }

      .toolbar-btn:active {
        transform: translateY(1px);
      }

      #legend {
        position: absolute;
        top: 52px;
        right: 10px;
        width: 240px;
        max-height: calc(100% - 62px);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.95);
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.1);
        z-index: 8;
        will-change: transform;
      }

      #legend:empty {
        display: none;
      }

      #legend.is-collapsed .legend-body {
        display: none;
      }

      #legend.is-collapsed {
        max-height: none;
      }

      .legend-header {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 12px;
        cursor: grab;
        user-select: none;
        border-bottom: 1px solid rgba(15, 23, 42, 0.08);
        flex-shrink: 0;
      }

      .legend-header:active {
        cursor: grabbing;
      }

      .legend-header-title {
        font-size: 12px;
        font-weight: 700;
        color: #0f172a;
        flex: 1;
      }

      .legend-collapse-btn {
        background: none;
        border: none;
        cursor: pointer;
        padding: 0 2px;
        font-size: 14px;
        line-height: 1;
        color: #64748b;
        flex-shrink: 0;
        transition: transform 0.2s ease;
      }

      .legend-collapse-btn:hover {
        color: #0f172a;
      }

      .legend-collapse-btn.is-collapsed {
        transform: rotate(-90deg);
      }

      .legend-body {
        overflow-y: auto;
        overflow-x: hidden;
        overscroll-behavior: contain;
        padding: 6px 12px 10px;
        flex: 1;
        min-height: 0;
      }

      #collisions-panel {
        position: absolute;
        top: 52px;
        left: 10px;
        width: 230px;
        max-height: calc(100% - 62px);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.95);
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.1);
        z-index: 8;
        will-change: transform;
      }

      #collisions-panel:empty {
        display: none;
      }

      #collisions-panel.is-collapsed .collisions-body {
        display: none;
      }

      #collisions-panel.is-collapsed {
        max-height: none;
      }

      .collisions-header {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 12px;
        cursor: grab;
        user-select: none;
        border-bottom: 1px solid rgba(15, 23, 42, 0.08);
        flex-shrink: 0;
      }

      .collisions-header:active {
        cursor: grabbing;
      }

      .collisions-title {
        font-size: 12px;
        font-weight: 700;
        color: #0f172a;
        flex: 1;
      }

      .collisions-count {
        font-size: 11px;
        color: #64748b;
        background: rgba(15, 23, 42, 0.06);
        padding: 2px 6px;
        border-radius: 6px;
        flex-shrink: 0;
      }

      .collisions-collapse-btn {
        background: none;
        border: none;
        cursor: pointer;
        padding: 0 2px;
        font-size: 14px;
        line-height: 1;
        color: #64748b;
        flex-shrink: 0;
        transition: transform 0.2s ease;
      }

      .collisions-collapse-btn:hover {
        color: #0f172a;
      }

      .collisions-collapse-btn.is-collapsed {
        transform: rotate(-90deg);
      }

      .collisions-body {
        overflow-y: auto;
        overflow-x: hidden;
        overscroll-behavior: contain;
        padding: 6px 12px 10px;
        flex: 1;
        min-height: 0;
      }

      .collision-item {
        display: flex;
        flex-direction: column;
        gap: 2px;
        margin: 0 0 6px 0;
        padding: 6px 8px;
        border-radius: 8px;
        background: rgba(15, 23, 42, 0.02);
        box-shadow: inset 0 0 0 1px transparent;
        cursor: pointer;
        transition: background 0.15s ease, box-shadow 0.15s ease;
      }

      .collision-item.is-related-legend-well {
        background: rgba(37, 99, 235, 0.06);
        box-shadow:
          inset 0 0 0 2px rgba(37, 99, 235, 0.82),
          0 0 0 1px rgba(37, 99, 235, 0.12);
      }

      .collision-item:hover {
        background: rgba(37, 99, 235, 0.08);
      }

      .collision-item:last-child {
        margin-bottom: 0;
      }

      .collision-label {
        font-size: 11px;
        font-weight: 600;
        color: #0f172a;
        line-height: 1.3;
      }

      .collision-meta {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 10px;
        color: #64748b;
      }

      .collision-class {
        padding: 1px 4px;
        border-radius: 4px;
        background: rgba(239, 68, 68, 0.12);
        color: #dc2626;
        font-weight: 600;
      }

      .collision-sf {
        font-family: "SFMono-Regular", ui-monospace, Menlo, Consolas, monospace;
        font-size: 10px;
        color: #0f172a;
        font-weight: 600;
      }

      .collision-meta-row {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }

      .segment-badge {
        display: inline-flex;
        align-items: center;
        padding: 1px 4px;
        border-radius: 3px;
        font-size: 9px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.3px;
        background: rgba(15, 23, 42, 0.08);
        color: #334155;
        border: 1px solid rgba(15, 23, 42, 0.12);
      }

      .segment-arrow {
        font-size: 10px;
        color: #94a3b8;
        padding: 0 2px;
      }

      .legend-item {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 0 0 6px 0;
        font-size: 12px;
        line-height: 1.25;
        color: #0f172a;
      }

      .legend-item.is-focusable {
        cursor: pointer;
      }

      .legend-item.is-focusable:hover .legend-label {
        color: #334155;
      }

      .legend-group {
        margin: 0 0 10px 0;
      }

      .legend-group:last-child {
        margin-bottom: 0;
      }

      .legend-node-btn {
        width: 100%;
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 0;
        padding: 4px 0;
        border: none;
        background: none;
        cursor: pointer;
        text-align: left;
        color: #0f172a;
        font-size: 12px;
        line-height: 1.25;
      }

      .legend-node-btn:hover {
        color: #1d4ed8;
      }

      .legend-node-btn.is-editable {
        border-radius: 7px;
        padding-right: 6px;
      }

      .legend-node-btn.is-selected-edit {
        background: rgba(37, 99, 235, 0.08);
        color: #1d4ed8;
      }

      .legend-node-pad {
        font-weight: 700;
      }

      .legend-node-well {
        padding-left: 18px;
      }

      .legend-caret {
        width: 10px;
        flex: 0 0 10px;
        color: #64748b;
        font-size: 11px;
      }

      .legend-children {
        margin: 2px 0 0 0;
      }

      .legend-children.is-collapsed {
        display: none;
      }

      .legend-flat-section {
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid rgba(15, 23, 42, 0.08);
      }

      .legend-swatch {
        width: 16px;
        height: 3px;
        border-radius: 999px;
        flex: 0 0 16px;
      }

      .legend-swatch.is-point {
        width: 8px;
        height: 8px;
        flex-basis: 8px;
        margin: 0 4px;
      }

      .legend-label {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      #tooltip {
        position: absolute;
        display: none;
        min-width: 132px;
        max-width: 234px;
        padding: 8px 10px;
        border: 1px solid rgba(37, 99, 235, 0.38);
        border-radius: 12px;
        background: rgba(252, 254, 255, 0.96);
        color: #0f172a;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.1);
        pointer-events: none;
        z-index: 5;
        font-size: 12px;
        line-height: 1.36;
      }

      #label-layer {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
        z-index: 2;
      }

      .scene-label {
        position: absolute;
        display: none;
        box-sizing: border-box;
        max-width: min(240px, calc(100vw - 24px));
        overflow: hidden;
        text-overflow: ellipsis;
        transform: translate(-50%, -100%);
        transform-origin: 50% 100%;
        font-size: 12px;
        font-weight: 600;
        line-height: 1;
        white-space: nowrap;
        color: #0f172a;
        will-change: transform;
        text-shadow:
          0 1px 0 rgba(255, 255, 255, 0.95),
          0 0 8px rgba(255, 255, 255, 0.8);
        contain: layout paint;
      }

      .scene-label.well-name-label,
      .minimap-well-label {
        font-family:
          Inter,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        font-weight: 700;
        letter-spacing: 0;
      }

      .scene-label.well-name-label {
        max-width: min(220px, calc(100vw - 24px));
        font-size: 12px;
        line-height: 1.12;
        overflow: visible;
        overflow-wrap: anywhere;
        text-overflow: clip;
        transform: translate(8px, -50%);
        transform-origin: 0 50%;
        white-space: normal;
      }

      .scene-label.reference-well-label {
        font-size: 9px;
      }

      .scene-label.world-axis-label {
        font-size: 9px;
        font-weight: 500;
        color: #5b6472;
        letter-spacing: 0;
        pointer-events: none;
      }

      .world-axis-handle {
        position: absolute;
        display: none;
        width: 20px;
        height: 20px;
        padding: 0;
        box-sizing: border-box;
        border: 1px solid rgba(71,85,105,0.28);
        border-radius: 999px;
        background: rgba(255,255,255,0.94);
        box-shadow: 0 3px 10px rgba(15,23,42,0.12);
        color: #111827;
        appearance: none;
        -webkit-appearance: none;
        display: flex;
        align-items: center;
        justify-content: center;
        line-height: 0;
        cursor: grab;
        pointer-events: auto;
        transform: translate(-50%, -50%);
        touch-action: none;
        user-select: none;
        z-index: 5;
      }

      .world-axis-handle-icon {
        width: 11px;
        height: 11px;
        display: block;
        position: absolute;
        left: 50%;
        top: 50%;
        margin: 0;
        transform: translate(-50%, -50%);
        pointer-events: none;
      }

      .world-axis-handle:hover {
        background: rgba(255,255,255,0.99);
        color: #1f2937;
      }

      .world-axis-handle.is-dragging {
        cursor: grabbing;
        box-shadow: 0 5px 14px rgba(15,23,42,0.18);
      }

      .scene-axis-label {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .tooltip-head {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 4px;
      }

      .tooltip-swatch {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        flex: 0 0 10px;
        box-shadow: 0 0 0 1px rgba(15, 23, 42, 0.08);
      }

      .tooltip-title {
        color: #163a8a;
        font-weight: 700;
        min-width: 0;
        max-width: 184px;
        overflow-wrap: anywhere;
        white-space: normal;
      }

      .tooltip-kv {
        margin: 2px 0 0 0;
        color: #334155;
      }

      .tooltip-kv strong {
        color: #1f3b74;
        font-weight: 600;
      }

      .tooltip-mono {
        font-family:
          "SFMono-Regular",
          ui-monospace,
          Menlo,
          Consolas,
          monospace;
        color: #111827;
      }

      /* --- Edit mode --- */
      .toolbar-btn.is-active {
        background: #2563eb;
        color: #ffffff;
        border-color: #1d4ed8;
      }

      .toolbar-btn.is-active:hover {
        background: #1d4ed8;
      }

      #anti-collision-control-wrap {
        display: none;
        position: relative;
      }

      #anti-collision-control-wrap.is-visible {
        display: block;
      }

      #world-axis-control-wrap {
        display: block;
        position: relative;
      }

      #anti-collision-controls {
        display: none;
        position: absolute;
        top: calc(100% + 8px);
        left: 0;
        width: 236px;
        z-index: 7;
        padding: 9px 10px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.1);
        backdrop-filter: blur(8px);
      }

      #anti-collision-controls.is-visible {
        display: block;
      }

      #world-axis-controls {
        display: none;
        position: absolute;
        top: calc(100% + 8px);
        left: 0;
        width: 248px;
        z-index: 7;
        padding: 9px 10px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.1);
        backdrop-filter: blur(8px);
      }

      #world-axis-controls.is-visible {
        display: block;
      }

      .anti-collision-option {
        display: flex;
        align-items: center;
        gap: 8px;
        min-height: 24px;
        font-size: 11px;
        font-weight: 600;
        line-height: 1.25;
        color: #334155;
        user-select: none;
        cursor: pointer;
      }

      .anti-collision-option + .anti-collision-option {
        margin-top: 6px;
      }

      .anti-collision-option input {
        width: 14px;
        height: 14px;
        margin: 0;
        accent-color: #dc2626;
        flex: 0 0 auto;
      }

      .world-axis-scale-block {
        display: block;
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid rgba(148,163,184,0.18);
      }

      .world-axis-scale-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 6px;
        color: #334155;
        font-size: 12px;
        font-weight: 600;
      }

      .world-axis-scale-value {
        color: #1d4ed8;
        font-family:
          "SFMono-Regular",
          ui-monospace,
          Menlo,
          Consolas,
          monospace;
        font-size: 11px;
        font-weight: 700;
      }

      .world-axis-scale-slider {
        width: 100%;
        margin: 0;
      }

      #edit-toolbox {
        display: none;
        position: absolute;
        top: 52px;
        left: 156px;
        width: 234px;
        max-width: calc(100% - 20px);
        z-index: 6;
        background: rgba(255,255,255,0.97);
        border-radius: 12px;
        box-shadow: 0 10px 28px rgba(15,23,42,0.12);
        overflow: hidden;
      }

      #edit-toolbox.is-visible {
        display: flex;
        flex-direction: column;
      }

      .edit-toolbox-header {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 12px;
        cursor: grab;
        user-select: none;
        border-bottom: 1px solid rgba(15,23,42,0.08);
      }

      .edit-toolbox-header:active {
        cursor: grabbing;
      }

      .edit-toolbox-title {
        font-size: 12px;
        font-weight: 700;
        color: #0f172a;
      }

      .edit-toolbox-body {
        display: flex;
        flex-direction: column;
        gap: 9px;
        padding: 9px 10px 10px;
      }

      .edit-toolbox-section {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }

      .edit-toolbox-label {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.02em;
        color: #64748b;
        text-transform: uppercase;
      }

      #edit-plane-selector,
      #edit-operation-selector,
      #edit-scope-selector,
      .edit-toolbox-action-row {
        display: flex;
        gap: 4px;
      }

      .plane-btn,
      .operation-btn,
      .scope-btn {
        flex: 1 1 0;
        border: 1px solid transparent;
        background: transparent;
        color: #475569;
        border-radius: 8px;
        padding: 5px 12px;
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s ease;
      }

      .plane-btn:hover,
      .operation-btn:hover,
      .scope-btn:hover {
        background: rgba(37,99,235,0.06);
      }

      .plane-btn.is-active,
      .operation-btn.is-active,
      .scope-btn.is-active {
        background: #2563eb;
        color: #ffffff;
        border-color: #1d4ed8;
      }

      .plane-btn:disabled,
      .operation-btn:disabled,
      .scope-btn:disabled {
        cursor: default;
        opacity: 0.45;
      }

      .edit-tool-btn {
        flex: 1 1 0;
        min-width: 0;
        border: 1px solid rgba(37,99,235,0.16);
        background: rgba(248,250,252,0.96);
        color: #334155;
        border-radius: 8px;
        padding: 6px 8px;
        font-size: 11px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.15s ease;
      }

      .edit-tool-btn:hover:not(:disabled) {
        background: rgba(37,99,235,0.08);
        color: #1d4ed8;
      }

      .edit-tool-btn:disabled {
        cursor: default;
        opacity: 0.42;
      }

      .edit-tool-btn.is-reset {
        border-color: rgba(220,38,38,0.16);
      }

      .edit-tool-btn.is-reset:hover:not(:disabled) {
        background: rgba(220,38,38,0.08);
        color: #b91c1c;
      }

      .edit-delta-label {
        min-width: 118px;
        padding: 3px 5px;
        border: none;
        border-radius: 4px;
        background: rgba(255,255,255,0.18);
        box-shadow: none;
        color: rgba(15,23,42,0.86);
        cursor: grab;
        font-family:
          "SFMono-Regular",
          ui-monospace,
          Menlo,
          Consolas,
          monospace;
        font-size: 10px;
        line-height: 1.35;
        pointer-events: auto;
        text-align: left;
        transform: translate(10px, -100%);
        transform-origin: 0 100%;
        text-shadow:
          0 1px 2px rgba(255,255,255,0.95),
          0 0 7px rgba(255,255,255,0.72);
        backdrop-filter: blur(2px);
      }

      .edit-delta-label:hover {
        background: rgba(255,255,255,0.28);
      }

      .edit-delta-label.is-dragging {
        cursor: grabbing;
        background: rgba(255,255,255,0.34);
      }

      .edit-delta-label .edit-delta-head {
        display: block;
        margin-bottom: 3px;
        color: rgba(15,23,42,0.86);
        font-family:
          Inter,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        font-size: 11px;
        font-weight: 700;
      }

      .edit-delta-label .edit-delta-row {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        white-space: nowrap;
      }

      .edit-delta-label .edit-delta-total {
        margin-top: 3px;
        padding-top: 3px;
        border-top: 1px solid rgba(15,23,42,0.12);
        color: rgba(15,23,42,0.92);
        font-weight: 700;
      }

      .edit-lateral-label {
        padding: 4px 8px;
        border: 1px solid rgba(37,99,235,0.18);
        border-radius: 999px;
        background: rgba(255,255,255,0.70);
        box-shadow: 0 4px 12px rgba(15,23,42,0.06);
        color: #1d4ed8;
        font-family:
          "SFMono-Regular",
          ui-monospace,
          Menlo,
          Consolas,
          monospace;
        font-size: 10px;
        font-weight: 700;
        pointer-events: none;

          }
        }

            return;
          }
          antiCollisionControls
            .querySelectorAll("input[data-ac-layer]")
            .forEach((input) => {
              const layer = String(input.getAttribute("data-ac-layer") || "");
              if (!Object.prototype.hasOwnProperty.call(antiCollisionLayerState, layer)) {
                return;
              }
              const option = input.closest(".anti-collision-option");
              const hasObjects = (antiCollisionVisualObjects[layer] || []).length > 0;
              if (option) {
                option.style.display = hasObjects ? "" : "none";
              }
              input.checked = Boolean(antiCollisionLayerState[layer]);
              input.disabled = !hasObjects;
              input.setAttribute(
                "aria-label",
                antiCollisionLayerLabels[layer] || layer,
              );
            });
        }

        function initAntiCollisionControls() {
          if (!antiCollisionControlWrap || !antiCollisionButton || !antiCollisionControls) {
            return;
          }
          if (!antiCollisionControlsInitialized) {
            antiCollisionControls
              .querySelectorAll("input[data-ac-layer]")
              .forEach((input) => {
                const layer = String(input.getAttribute("data-ac-layer") || "");
                if (!Object.prototype.hasOwnProperty.call(antiCollisionLayerState, layer)) {

                input.addEventListener("change", () => {
                  antiCollisionLayerState[layer] = Boolean(input.checked);
                  applyAntiCollisionLayerVisibility();

        let circleMarkerTexture = null;

        function ensureCircleMarkerTexture() {
          if (circleMarkerTexture) {
            return circleMarkerTexture;
          }
          const size = 96;
          const canvas = document.createElement("canvas");
          canvas.width = size;
          canvas.height = size;
          const context = canvas.getContext("2d");
          if (!context) {
            return null;
          }
          const center = size / 2;
          const outerRadius = size * 0.30;
          const innerRadius = size * 0.24;
          context.clearRect(0, 0, size, size);
          context.fillStyle = "rgba(255, 255, 255, 0.98)";
          context.beginPath();
          context.arc(center, center, outerRadius, 0, Math.PI * 2);
          context.fill();
          context.fillStyle = "#ffffff";
          context.beginPath();
          context.arc(center, center, innerRadius, 0, Math.PI * 2);
          context.fill();
          const texture = new THREE.CanvasTexture(canvas);
          texture.colorSpace = THREE.SRGBColorSpace;
          texture.needsUpdate = true;
          circleMarkerTexture = texture;
          return circleMarkerTexture;
        }

        function transformedBounds(rawBounds) {
          const rawMin = displayPoint((rawBounds && rawBounds.min) || [0, 0, 0]);
          const rawMax = displayPoint((rawBounds && rawBounds.max) || [1000, 1000, 1000]);
          return {
            min: new THREE.Vector3(
              Math.min(rawMin.x, rawMax.x),
              Math.min(rawMin.y, rawMax.y),
              Math.min(rawMin.z, rawMax.z),
            ),
            max: new THREE.Vector3(
              Math.max(rawMin.x, rawMax.x),
              Math.max(rawMin.y, rawMax.y),
              Math.max(rawMin.z, rawMax.z),
            ),
          };
        }

        function clampValue(value, minValue, maxValue) {
          return Math.max(minValue, Math.min(maxValue, value));
        }

        function isWorldAxisOverlayObject(object) {
          let current = object || null;
          while (current) {
            if (current === worldAxisOverlay.group) {
              return true;
            }
            current = current.parent || null;
          }
          return false;
        }

        function scaleGeometryZPositions(geometry, ratio) {
          const positionAttribute =
            geometry && typeof geometry.getAttribute === "function"
              ? geometry.getAttribute("position")
              : null;
          if (
            !positionAttribute ||
            !positionAttribute.array ||
            positionAttribute.itemSize < 3
          ) {
            return;
          }
          for (
            let index = 2;
            index < positionAttribute.array.length;
            index += positionAttribute.itemSize
          ) {
            positionAttribute.array[index] *= ratio;
          }
          positionAttribute.needsUpdate = true;
          if (geometry.boundingSphere) {
            geometry.computeBoundingSphere();
          }
          if (geometry.boundingBox) {
            geometry.computeBoundingBox();
          }
        }

        function objectLocksViewerZGeometryScale(object) {
          return Boolean(
            object &&
            object.userData &&
            object.userData.lockViewerZGeometryScale,
          );
        }

        function rescaleViewerSceneZ(ratio) {
          const safeRatio = Number(ratio);
          if (!Number.isFinite(safeRatio) || Math.abs(safeRatio - 1.0) < 1e-6) {
            return;
          }
          const scaledGeometries = new Set();
          scene.traverse((object) => {
            if (
              !object ||
              object === scene ||
              object.isCamera ||
              object.isLight ||
              isWorldAxisOverlayObject(object)
            ) {
              return;
            }
            if (object.position && Number.isFinite(object.position.z)) {
              object.position.z *= safeRatio;
            }
            const geometry = object.geometry;
            if (!geometry) {
              return;
            }
            const geometryId = String(geometry.uuid || "");
            if (geometryId && scaledGeometries.has(geometryId)) {
              return;
            }
            if (geometryId) {
              scaledGeometries.add(geometryId);
            }
            if (objectLocksViewerZGeometryScale(object)) {
              return;
            }
            scaleGeometryZPositions(geometry, safeRatio);
            if (
              (object.isMesh || object.isSkinnedMesh) &&
              typeof geometry.computeVertexNormals === "function"
            ) {
              geometry.computeVertexNormals();
            }
            if (typeof object.computeLineDistances === "function") {
              try {
                object.computeLineDistances();
              } catch (e) { /* ignore */ }
            }
          });
          sceneLabels.forEach((item) => {
            if (item && item.position && Number.isFinite(item.position.z)) {
              item.position.z *= safeRatio;
            }
          });
          miniMapLabels.forEach((item) => {
            if (item && item.position && Number.isFinite(item.position.z)) {
              item.position.z *= safeRatio;
            }
          });
        }

        function miniMapSizeConfig(canvasWidth, canvasHeight) {
          const margin = 14;
          const aspect = canvasWidth / canvasHeight;
          const targetArea = (canvasWidth * canvasHeight) / 6.0;
          const preferredWidth = Math.sqrt(targetArea * aspect) * 1.2;
          const preferredHeight = preferredWidth / aspect;
          return {
            margin: margin,
            preferredWidth: preferredWidth,
            preferredHeight: preferredHeight,
            minWidth: Math.min(264, Math.max(canvasWidth - margin * 2, 1)),
            minHeight: Math.min(180, Math.max(canvasHeight - margin * 2, 1)),
            maxWidth: Math.max(Math.min(canvasWidth - margin * 2, 900), 1),
            maxHeight: Math.max(Math.min(canvasHeight - margin * 2, 620), 1),
          };
        }

        function miniMapCanvasRect() {
          const canvasWidth = Math.max(renderer.domElement.clientWidth || 1, 1);
          const canvasHeight = Math.max(renderer.domElement.clientHeight || 1, 1);
          const sizeConfig = miniMapSizeConfig(canvasWidth, canvasHeight);
          const requestedWidth =
            miniMapState.customSize && Number.isFinite(miniMapState.customSize.width)
              ? miniMapState.customSize.width
              : sizeConfig.preferredWidth;
          const requestedHeight =
            miniMapState.customSize && Number.isFinite(miniMapState.customSize.height)
              ? miniMapState.customSize.height
              : sizeConfig.preferredHeight;
          const rectWidth = clampValue(
            requestedWidth,
            sizeConfig.minWidth,
            sizeConfig.maxWidth,
          );
          const rectHeight = clampValue(
            requestedHeight,
            sizeConfig.minHeight,
            sizeConfig.maxHeight,
          );
          return {
            x: canvasWidth - rectWidth - sizeConfig.margin,
            y: sizeConfig.margin,
            width: rectWidth,
            height: rectHeight,
            canvasWidth: canvasWidth,
            canvasHeight: canvasHeight,
          };
        }

        function resizedMiniMapSize(startRect, event) {
          const canvasWidth = Math.max(renderer.domElement.clientWidth || 1, 1);
          const canvasHeight = Math.max(renderer.domElement.clientHeight || 1, 1);
          const sizeConfig = miniMapSizeConfig(canvasWidth, canvasHeight);
          const startWidth = Math.max(Number(startRect && startRect.width) || 1, 1);
          const startHeight = Math.max(Number(startRect && startRect.height) || 1, 1);
          const growX = miniMapState.pointerStart.x - Number(event.clientX || 0);
          const growY = miniMapState.pointerStart.y - Number(event.clientY || 0);
          const scale = clampValue(
            1.0 + (growX / startWidth + growY / startHeight) * 0.5,
            Math.max(sizeConfig.minWidth / startWidth, sizeConfig.minHeight / startHeight),
            Math.min(sizeConfig.maxWidth / startWidth, sizeConfig.maxHeight / startHeight),
          );
          return {
            width: clampValue(
              startWidth * scale,
              sizeConfig.minWidth,
              sizeConfig.maxWidth,
            ),
            height: clampValue(
              startHeight * scale,
              sizeConfig.minHeight,
              sizeConfig.maxHeight,
            ),
          };
        }

        function syncMiniMapResizeZoom(rect) {
          const safeRect = rect || miniMapCanvasRect();
          const worldPerPixel = Math.max(
            Number(miniMapState.resizeStartWorldPerPixel) || miniMapWorldPerPixel(),
            0.000001,
          );
          miniMapState.zoom = clampValue(
            miniMapState.baseSpan / (worldPerPixel * Math.max(safeRect.height, 1.0)),
            0.25,
            12.0,
          );
        }

        function updateMiniMapOverlay() {
          if (!miniMapFrame || !miniMapAxes || !miniMapControl || !miniMapToggleBtn || !miniMapLabel) {
            return;
          }
          if (!miniMapState.expanded) {
            miniMapFrame.classList.remove("is-visible");
            miniMapAxes.classList.remove("is-visible");
            if (miniMapLabelLayer) {
              miniMapLabelLayer.classList.remove("is-visible");
              miniMapLabelLayer.style.left = "";
              miniMapLabelLayer.style.top = "";
              miniMapLabelLayer.style.width = "";
              miniMapLabelLayer.style.height = "";
            }
            miniMapLabels.forEach((item) => {
              item.element.style.display = "none";
            });
            miniMapAxes.style.left = "";
            miniMapAxes.style.top = "";
            miniMapControl.classList.remove("is-expanded");
            miniMapLabel.classList.remove("is-expanded");
            miniMapControl.style.right = "14px";
            miniMapControl.style.bottom = "14px";
            miniMapControl.style.left = "";
            miniMapControl.style.top = "";
            miniMapControl.style.width = "";
            miniMapToggleBtn.textContent = "План E-N";
            miniMapToggleBtn.title = "Показать вид сверху";
            return;
          }
          const rect = miniMapCanvasRect();
          miniMapState.rect = rect;
          miniMapFrame.classList.add("is-visible");
          miniMapFrame.style.left = `${Math.round(rect.x)}px`;
          miniMapFrame.style.top = `${Math.round(rect.canvasHeight - rect.y - rect.height)}px`;
          miniMapFrame.style.width = `${Math.round(rect.width)}px`;
          miniMapFrame.style.height = `${Math.round(rect.height)}px`;
          if (miniMapLabelLayer) {
            miniMapLabelLayer.classList.add("is-visible");
            miniMapLabelLayer.style.left = `${Math.round(rect.x)}px`;
            miniMapLabelLayer.style.top = `${Math.round(rect.canvasHeight - rect.y - rect.height)}px`;
            miniMapLabelLayer.style.width = `${Math.round(rect.width)}px`;
            miniMapLabelLayer.style.height = `${Math.round(rect.height)}px`;
          }
          const axesSize = 62;
          miniMapAxes.classList.add("is-visible");
          miniMapAxes.style.left = `${Math.round(
            clampValue(rect.x + rect.width - axesSize - 12, rect.x + 8, rect.x + rect.width - axesSize),
          )}px`;
          miniMapAxes.style.top = `${Math.round(
            clampValue(rect.canvasHeight - rect.y - axesSize - 12, rect.canvasHeight - rect.y - rect.height + 8, rect.canvasHeight - rect.y - axesSize),
          )}px`;
          miniMapControl.classList.add("is-expanded");
          miniMapLabel.classList.add("is-expanded");
          miniMapControl.style.left = `${Math.round(rect.x + 12)}px`;
          miniMapControl.style.top = `${Math.round(rect.canvasHeight - rect.y - rect.height + 10)}px`;
          miniMapControl.style.width = `${Math.round(Math.max(rect.width - 24, 1))}px`;
          miniMapControl.style.right = "";
          miniMapControl.style.bottom = "";
          miniMapToggleBtn.textContent = "";
          miniMapToggleBtn.title = "Потяните, чтобы изменить размер. Клик — скрыть вид сверху";
        }

        function updateMiniMapLabels() {
          if (!miniMapLabelLayer || !miniMapState.expanded) {
            miniMapLabels.forEach((item) => {
              item.element.style.display = "none";
            });
            return;
          }
          const rect = miniMapState.rect.width > 0
            ? miniMapState.rect
            : miniMapCanvasRect();
          const aspect = Math.max(rect.width / Math.max(rect.height, 1), 0.01);
          const viewHeight = Math.max(miniMapState.baseSpan / miniMapState.zoom, 1.0);
          const viewWidth = viewHeight * aspect;
          const leftWorld = miniMapState.target.x - viewWidth * 0.5;
          const topWorld = miniMapState.target.y + viewHeight * 0.5;
          const padding = 8;
          miniMapLabels.forEach((item) => {
            const sourceLabel = item.sourceLabel || null;
            if (sourceLabel) {
              if (item.role === "edit_delta_label") {
                item.element.innerHTML = sourceLabel.element.innerHTML;
              } else {
                item.element.textContent = sourceLabel.element.textContent || "";
              }
              item.element.style.color =
                sourceLabel.element.style.color || item.element.style.color;
              if (sourceLabel.visible === false) {
                item.element.style.display = "none";
                return;
              }
            }
            const localX = ((item.position.x - leftWorld) / viewWidth) * rect.width;
            const localY = ((topWorld - item.position.y) / viewHeight) * rect.height;
            const offsetX = Number(item.offsetX || 0);
            const offsetY = Number(item.offsetY || 0);
            const screenX = localX + offsetX;
            const screenY = localY - offsetY;
            if (
              !Number.isFinite(screenX) ||
              !Number.isFinite(screenY) ||
              screenX < padding ||
              screenX > rect.width - padding ||
              screenY < padding ||
              screenY > rect.height - padding
            ) {
              item.element.style.display = "none";
              return;
            }
            item.element.style.display = "block";
            const labelWidth = Math.min(
              Number(item.element.offsetWidth || 0),
              Math.max(rect.width - padding * 2, 1),
            );
            const labelHeight = Math.min(
              Number(item.element.offsetHeight || 0),
              Math.max(rect.height - padding * 2, 1),
            );
            const labelOffsetX = 6;
            const clampedX = clampValue(
              screenX,
              padding,
              Math.max(rect.width - labelWidth - padding - labelOffsetX, padding),
            );
            const clampedY = clampValue(
              screenY,
              padding + labelHeight * 0.5,
              Math.max(rect.height - padding - labelHeight * 0.5, padding),
            );
            item.element.style.left = `${Math.round(clampedX)}px`;
            item.element.style.top = `${Math.round(clampedY)}px`;
          });
        }

        function fitMiniMapToRawBounds(rawBounds) {
          const localBounds = transformedBounds(rawBounds || payload.bounds || {});
          const localMin = localBounds.min;
          const localMax = localBounds.max;
          const localCenter = new THREE.Vector3()
            .addVectors(localMin, localMax)
            .multiplyScalar(0.5);
          const localSpan = new THREE.Vector3().subVectors(localMax, localMin);
          miniMapState.target.copy(localCenter);
          miniMapState.maxSpan = Math.max(localSpan.x, localSpan.y, localSpan.z, 1.0);
          miniMapState.baseSpan = Math.max(localSpan.x, localSpan.y, 1.0) * 1.18;
          miniMapState.zoom = 1.0;
        }

        function focusMiniMapToDisplayPoint(displayCenter, focusSpan) {
          if (!displayCenter) {
            return;
          }
          const safeSpan = Math.max(Number(focusSpan) || 1.0, 1.0);
          miniMapState.target.copy(displayCenter);
          miniMapState.maxSpan = Math.max(safeSpan, 1.0);
          miniMapState.baseSpan = safeSpan * 1.18;
          miniMapState.zoom = 1.0;
        }

        function updateMiniMapCamera(rect) {
          const safeRect = rect || miniMapCanvasRect();
          const aspect = Math.max(safeRect.width / Math.max(safeRect.height, 1), 0.01);
          const viewHeight = Math.max(miniMapState.baseSpan / miniMapState.zoom, 1.0);
          const viewWidth = viewHeight * aspect;
          miniMapCamera.left = -viewWidth * 0.5;
          miniMapCamera.right = viewWidth * 0.5;
          miniMapCamera.top = viewHeight * 0.5;
          miniMapCamera.bottom = -viewHeight * 0.5;
          miniMapCamera.near = 0.1;
          miniMapCamera.far = Math.max(miniMapState.maxSpan * 24.0, 5000.0);
          miniMapCamera.position.set(
            miniMapState.target.x,
            miniMapState.target.y,
            miniMapState.target.z + Math.max(miniMapState.maxSpan * 8.0, 1000.0),
          );
          miniMapCamera.lookAt(miniMapState.target);
          miniMapCamera.updateProjectionMatrix();
        }

        function isPointerInMiniMap(event) {
          if (!miniMapState.expanded) {
            return false;
          }
          const rect = miniMapCanvasRect();
          const canvasRect = renderer.domElement.getBoundingClientRect();
          const localX = Number(event.clientX || 0) - canvasRect.left;
          const localY = Number(event.clientY || 0) - canvasRect.top;
          const top = rect.canvasHeight - rect.y - rect.height;
          return (
            localX >= rect.x &&
            localX <= rect.x + rect.width &&
            localY >= top &&
            localY <= top + rect.height
          );
        }

        function miniMapWorldPerPixel() {
          const rect = miniMapState.rect.width > 0
            ? miniMapState.rect
            : miniMapCanvasRect();
          const viewHeight = Math.max(miniMapState.baseSpan / miniMapState.zoom, 1.0);
          return viewHeight / Math.max(rect.height, 1.0);
        }

        function miniMapWorldAtEvent(event) {
          const rect = miniMapCanvasRect();
          const canvasRect = renderer.domElement.getBoundingClientRect();
          const localX = Number(event.clientX || 0) - canvasRect.left;
          const localY = Number(event.clientY || 0) - canvasRect.top;
          const top = rect.canvasHeight - rect.y - rect.height;
          const normalizedX = (localX - rect.x) / Math.max(rect.width, 1.0) - 0.5;
          const normalizedY = 0.5 - (localY - top) / Math.max(rect.height, 1.0);
          const viewHeight = Math.max(miniMapState.baseSpan / miniMapState.zoom, 1.0);
          const viewWidth = viewHeight * (rect.width / Math.max(rect.height, 1.0));
          return new THREE.Vector3(
            miniMapState.target.x + normalizedX * viewWidth,
            miniMapState.target.y + normalizedY * viewHeight,
            miniMapState.target.z,
          );
        }

        function miniMapLocalAtEvent(event, rect) {
          const safeRect = rect || miniMapCanvasRect();
          const canvasRect = renderer.domElement.getBoundingClientRect();
          return {
            x: Number(event.clientX || 0) - canvasRect.left - safeRect.x,
            y:
              Number(event.clientY || 0) -
              canvasRect.top -
              (safeRect.canvasHeight - safeRect.y - safeRect.height),
          };
        }

        function miniMapLocalFromDisplayPoint(displayPosition, rect) {
          const safeRect = rect || miniMapCanvasRect();
          const aspect = Math.max(safeRect.width / Math.max(safeRect.height, 1), 0.01);
          const viewHeight = Math.max(miniMapState.baseSpan / miniMapState.zoom, 1.0);
          const viewWidth = viewHeight * aspect;
          const leftWorld = miniMapState.target.x - viewWidth * 0.5;
          const topWorld = miniMapState.target.y + viewHeight * 0.5;
          return {
            x: ((displayPosition.x - leftWorld) / viewWidth) * safeRect.width,
            y: ((topWorld - displayPosition.y) / viewHeight) * safeRect.height,
          };
        }

        function miniMapRulerRawPointAtEvent(event) {
          const worldPoint = miniMapWorldAtEvent(event);
          const rawPoint = dataPointFromDisplay(worldPoint);
          return {
            x: dataNumber(rawPoint[0], 0),
            y: dataNumber(rawPoint[1], 0),
          };
        }

        function miniMapRulerDisplayPoint(rawPoint) {
          return displayPoint([
            dataNumber(rawPoint && rawPoint.x, sceneOrigin.x),
            dataNumber(rawPoint && rawPoint.y, sceneOrigin.y),
            sceneOrigin.z,
          ]);
        }

        function miniMapRulerCurrentEndRaw() {
          if (
            miniMapRulerState.phase === "measuring" &&
            miniMapRulerState.previewRaw
          ) {
            return miniMapRulerState.previewRaw;
          }
          return miniMapRulerState.endRaw;
        }

        function miniMapRulerDistanceMeters(startRaw, endRaw) {
          if (!startRaw || !endRaw) {
            return 0.0;
          }
          return Math.hypot(
            dataNumber(endRaw.x, 0) - dataNumber(startRaw.x, 0),
            dataNumber(endRaw.y, 0) - dataNumber(startRaw.y, 0),
          );
        }

        function formatMiniMapDistanceMeters(distanceMeters) {
          const safeDistance = Math.max(Number(distanceMeters) || 0, 0);
          const rounded =
            safeDistance >= 1000.0
              ? Math.round(safeDistance)
              : Math.round(safeDistance * 10.0) / 10.0;
          const text =
            Math.abs(rounded - Math.round(rounded)) < 0.05
              ? String(Math.round(rounded))
              : rounded.toFixed(1);
          return `${text} м`;
        }

        function resetMiniMapRulerMeasurement() {
          miniMapRulerState.phase = "idle";
          miniMapRulerState.startRaw = null;
          miniMapRulerState.endRaw = null;
          miniMapRulerState.previewRaw = null;
        }

        function syncMiniMapRulerButton() {
          if (!miniMapRulerBtn) {
            return;
          }
          miniMapRulerBtn.classList.toggle("is-active", Boolean(miniMapRulerState.enabled));
          miniMapRulerBtn.setAttribute(
            "aria-pressed",
            miniMapRulerState.enabled ? "true" : "false",
          );
        }

        function setMiniMapRulerEnabled(enabled) {
          miniMapRulerState.enabled = Boolean(enabled);
          if (!miniMapRulerState.enabled) {
            resetMiniMapRulerMeasurement();
          }
          syncMiniMapRulerButton();
        }

        function updateMiniMapRulerOverlay() {
          if (
            !miniMapRulerLayer ||
            !miniMapRulerLine ||
            !miniMapRulerStart ||
            !miniMapRulerEnd ||
            !miniMapRulerLabel
          ) {
            return;
          }
          const overlayVisible =
            miniMapState.expanded && Boolean(miniMapRulerState.enabled);
          miniMapRulerLayer.classList.toggle("is-visible", overlayVisible);
          if (!overlayVisible) {
            miniMapRulerLine.style.display = "none";
            miniMapRulerStart.style.display = "none";
            miniMapRulerEnd.style.display = "none";
            miniMapRulerLabel.style.display = "none";
            miniMapRulerLayer.style.left = "";
            miniMapRulerLayer.style.top = "";
            miniMapRulerLayer.style.width = "";
            miniMapRulerLayer.style.height = "";
            return;
          }
          const rect = miniMapState.rect.width > 0
            ? miniMapState.rect
            : miniMapCanvasRect();
          miniMapRulerLayer.style.left = `${Math.round(rect.x)}px`;
          miniMapRulerLayer.style.top = `${Math.round(rect.canvasHeight - rect.y - rect.height)}px`;
          miniMapRulerLayer.style.width = `${Math.round(rect.width)}px`;
          miniMapRulerLayer.style.height = `${Math.round(rect.height)}px`;
          const startRaw = miniMapRulerState.startRaw;
          const endRaw = miniMapRulerCurrentEndRaw();
          if (!startRaw || !endRaw) {
            miniMapRulerLine.style.display = "none";
            miniMapRulerStart.style.display = "none";
            miniMapRulerEnd.style.display = "none";
            miniMapRulerLabel.style.display = "none";
            return;
          }
          const startLocal = miniMapLocalFromDisplayPoint(
            miniMapRulerDisplayPoint(startRaw),
            rect,
          );
          const endLocal = miniMapLocalFromDisplayPoint(
            miniMapRulerDisplayPoint(endRaw),
            rect,
          );
          if (
            !Number.isFinite(startLocal.x) ||
            !Number.isFinite(startLocal.y) ||
            !Number.isFinite(endLocal.x) ||
            !Number.isFinite(endLocal.y)
          ) {
            miniMapRulerLine.style.display = "none";
            miniMapRulerStart.style.display = "none";
            miniMapRulerEnd.style.display = "none";
            miniMapRulerLabel.style.display = "none";
            return;
          }
          const dx = endLocal.x - startLocal.x;

          miniMapRulerLabel.style.display = "block";
          const normalX = length > 0.000001 ? -dy / length : 0.0;

          const labelWidth = Math.max(Number(miniMapRulerLabel.offsetWidth) || 0, 1);
          const labelHeight = Math.max(Number(miniMapRulerLabel.offsetHeight) || 0, 1);
          const labelCenterX = (startLocal.x + endLocal.x) * 0.5 + normalX * 16.0;
          const labelCenterY = (startLocal.y + endLocal.y) * 0.5 + normalY * 16.0;

        const axisOverlayDefinitions = [

        function updateAxesGizmo() {
          if (!axesGizmoElement) {

          const width = Math.max(axesGizmoElement.clientWidth || 136, 136);
          const height = Math.max(axesGizmoElement.clientHeight || 118, 118);

        const worldAxisRaycaster = new THREE.Raycaster();

        function worldAxisPlaneIntersectionRaw(ndcX, ndcY, rawZ) {
          const planeDisplayZ =
            ((Number(rawZ) - Number(sceneOrigin.z || 0)) * Z_DISPLAY_SIGN) /
            Math.max(worldAxisZScaleFactor(), 1.0);

          worldAxisPointer.set(Number(ndcX) || 0, Number(ndcY) || 0);

          const rawPoint = dataPointFromDisplay(worldAxisHitPoint);
          return [Number(rawPoint[0]) || 0, Number(rawPoint[1]) || 0, Number(rawZ) || 0];

        function worldAxisNiceStep(rawValue) {
          const safeValue = Math.max(Number(rawValue) || 0, 0.000001);
          const exponent = Math.floor(Math.log10(safeValue));
          const base = Math.pow(10, exponent);
          const scaled = safeValue / base;
          if (scaled <= 1.0) {
            return 1.0 * base;
          }
          if (scaled <= 2.0) {
            return 2.0 * base;
          }
          if (scaled <= 5.0) {
            return 5.0 * base;
          }
          return 10.0 * base;
        }

        function worldAxisZScaleLabel() {
          return `1:${formatViewerZScaleFactor(worldAxisZScaleFactor())}`;
        }

        function worldAxisDisplayZ(rawZValue) {
          return (
            (Number(rawZValue) || 0) *
            Z_DISPLAY_SIGN /
            Math.max(worldAxisZScaleFactor(), 1.0)
          );
        }

        function formatWorldAxisValue(value, step) {
          const safeStep = Math.max(Math.abs(Number(step) || 0), 0.000001);
          const decimals =
            safeStep >= 10.0 ? 0 :
            safeStep >= 1.0 ? 1 :
            safeStep >= 0.1 ? 2 :
            3;
          return Number(value || 0).toFixed(decimals);
        }

        function formatWorldAxisDistance(rawDistance) {
          const safeDistance = Math.abs(Number(rawDistance) || 0);
          const decimals =
            safeDistance >= 100.0 ? 0 :
            safeDistance >= 10.0 ? 1 :
            safeDistance >= 1.0 ? 2 :
            3;
          return `${String(Number(safeDistance.toFixed(decimals))).replace(".", ",")} м`;
        }

        function worldAxisSubdivisionForPixelSpan(pixelSpan) {
          const safeSpan = Math.max(Number(pixelSpan) || 0, 0);
          if (safeSpan >= 560.0) {
            return 10;
          }
          if (safeSpan >= 300.0) {
            return 5;
          }
          if (safeSpan >= 150.0) {
            return 2;
          }
          return 1;
        }

        function worldAxisAdaptiveMajorStep(
          unitsPerPixel,
          coverageStep,
          targetPixelSpan,
          minRawStep,
          scaleFactor,
        ) {
          const safeUnitsPerPixel = Math.max(Number(unitsPerPixel) || 0, 0.000001);
          const safeCoverageStep = Math.max(Number(coverageStep) || 0, 0.000001);
          const safePixelSpan = Math.max(Number(targetPixelSpan) || 0, 1.0);
          const safeMinRawStep = Math.max(Number(minRawStep) || 0, 0.000001);
          const safeScaleFactor = Math.max(Number(scaleFactor) || 1.0, 1.0);
          const desiredRawStep = Math.max(
            safeUnitsPerPixel * safePixelSpan * safeScaleFactor,
            safeMinRawStep,
          );
          return Math.min(safeCoverageStep, worldAxisNiceStep(desiredRawStep));
        }

        function worldAxisAdaptiveZMajorStep(
          unitsPerPixel,
          coverageStep,
          targetPixelSpan,
          minRawStep,
          scaleFactor,
        ) {
          const safeUnitsPerPixel = Math.max(Number(unitsPerPixel) || 0, 0.000001);
          const safeCoverageStep = Math.max(Number(coverageStep) || 0, 0.000001);
          const safePixelSpan = Math.max(Number(targetPixelSpan) || 0, 1.0);
          const safeMinRawStep = Math.max(Number(minRawStep) || 0, 0.000001);
          const safeScaleFactor = Math.max(Number(scaleFactor) || 1.0, 1.0);
          const desiredRawStep = Math.max(
            safeUnitsPerPixel * safePixelSpan * safeScaleFactor,
            safeMinRawStep,
          );
          const allowedSteps = [10000.0, 5000.0, 2000.0, 1000.0, 500.0, 100.0, 50.0];
          let coarsestWithinCoverage = 0.0;
          let selectedStep = 0.0;
          allowedSteps.forEach((step) => {
            if (step > safeCoverageStep + 1e-6) {
              return;
            }
            if (coarsestWithinCoverage <= 0.0) {
              coarsestWithinCoverage = step;
            }
            if (step + 1e-6 >= desiredRawStep) {
              selectedStep = step;
            }
          });
          if (selectedStep > 0.0) {
            return selectedStep;
          }
          if (coarsestWithinCoverage > 0.0) {
            return coarsestWithinCoverage;
          }
          return Math.min(safeCoverageStep, worldAxisNiceStep(desiredRawStep));
        }

        function clearWorldAxisGeometry() {
          while (worldAxisOverlay.group.children.length > 0) {
            const child =
              worldAxisOverlay.group.children[worldAxisOverlay.group.children.length - 1];
            if (!child) {
              continue;
            }
            worldAxisOverlay.group.remove(child);
            if (child.geometry && typeof child.geometry.dispose === "function") {
              child.geometry.dispose();
            }
            if (child.material) {
              if (Array.isArray(child.material)) {
                child.material.forEach((material) => {
                  if (material && typeof material.dispose === "function") {
                    material.dispose();
                  }
                });
              } else if (typeof child.material.dispose === "function") {
                child.material.dispose();
              }
            }
          }
        }

        function normalizedRawBounds(rawBounds) {
          if (!rawBounds || typeof rawBounds !== "object") {
            return null;
          }
          const rawMin = Array.isArray(rawBounds.min) ? rawBounds.min : null;
          const rawMax = Array.isArray(rawBounds.max) ? rawBounds.max : null;
          if (!rawMin || !rawMax || rawMin.length < 3 || rawMax.length < 3) {
            return null;
          }
          const minX = dataNumber(rawMin[0], 0);
          const minY = dataNumber(rawMin[1], 0);
          const minZ = dataNumber(rawMin[2], 0);
          const maxX = dataNumber(rawMax[0], minX);
          const maxY = dataNumber(rawMax[1], minY);
          const maxZ = dataNumber(rawMax[2], minZ);
          return {
            min: [
              Math.min(minX, maxX),
              Math.min(minY, maxY),
              Math.min(minZ, maxZ),
            ],
            max: [
              Math.max(minX, maxX),
              Math.max(minY, maxY),
              Math.max(minZ, maxZ),
            ],
          };
        }

        function worldAxisDefaultPadFocusId() {
          return worldAxisPadFocusIds.length > 0
            ? String(worldAxisPadFocusIds[0] || "")
            : "";
        }

        function worldAxisPadFocusIdForFocusId(focusId) {
          const normalizedId = String(focusId || "").trim();
          if (!normalizedId) {
            return "";
          }
          if (worldAxisFocusPadById.has(normalizedId)) {
            return String(worldAxisFocusPadById.get(normalizedId) || "");

          return normalizedId.startsWith("pad::") ? normalizedId : "";

        function worldAxisRawBoundsForPadFocusId(focusId) {
          const normalizedFocusId = String(focusId || "").trim();
          if (!normalizedFocusId) {

        function worldAxisCurrentRawBounds() {
          return (
            worldAxisRawBoundsForPadFocusId(worldAxisOverlay.activePadFocusId) ||
            normalizedRawBounds(payload.bounds) || {
              min: [0.0, 0.0, 0.0],

        }

        function worldAxisPlaneRawZ(rawBounds) {
          const bounds = normalizedRawBounds(rawBounds) || worldAxisCurrentRawBounds();
          const rawMax = Array.isArray(bounds.max) ? bounds.max : [0, 0, 0];
          const deepestRawZ = dataNumber(rawMax[2], 0);
          const roundStep = Math.max(Number(WORLD_AXIS_PLANE_Z_ROUND_STEP) || 100.0, 1.0);
          const roundedRawZ = Math.ceil(deepestRawZ / roundStep) * roundStep;
          if (!Number.isFinite(roundedRawZ)) {
            return 0.0;
          }
          return roundedRawZ <= deepestRawZ + 1e-6
            ? roundedRawZ + roundStep
            : roundedRawZ;

        function worldAxisTopRawZ(rawBounds) {
          const bounds = normalizedRawBounds(rawBounds) || worldAxisCurrentRawBounds();
          const rawMin = Array.isArray(bounds.min) ? bounds.min : [0, 0, 0];
          const shallowestRawZ = dataNumber(rawMin[2], 0);
          const roundStep = Math.max(Number(WORLD_AXIS_PLANE_Z_ROUND_STEP) || 100.0, 1.0);
          const roundedRawZ = Math.floor(shallowestRawZ / roundStep) * roundStep;
          if (!Number.isFinite(roundedRawZ)) {
            return 0.0;
          }
          return Math.min(roundedRawZ, 0.0);
        }

        function worldAxisRawLevelMatches(leftRawZ, rightRawZ) {
          return Math.abs((Number(leftRawZ) || 0) - (Number(rightRawZ) || 0)) <= 1e-6;
        }

        function worldAxisMajorRawZValues(planeRawZ, topRawZ, zStep) {
          const values = [];
          const safeStep = Math.max(Number(zStep) || 0, 0.000001);
          const safeTopRawZ = Math.min(Number(topRawZ) || 0, 0.0);
          const bottomRawZ =
            Math.floor(Math.max(Number(planeRawZ) || 0, 0.0) / safeStep) * safeStep;
          for (let rawZ = bottomRawZ; rawZ >= safeTopRawZ; rawZ -= safeStep) {
            values.push(rawZ);
          }
          if (!values.some((rawZ) => worldAxisRawLevelMatches(rawZ, 0.0))) {
            values.push(0.0);
          }
          if (!values.some((rawZ) => worldAxisRawLevelMatches(rawZ, safeTopRawZ))) {
            values.push(safeTopRawZ);
          }
          values.sort((leftRawZ, rightRawZ) => rightRawZ - leftRawZ);
          return values;
        }

        function worldAxisMinorTickSpecs(planeRawZ, topRawZ, zStep, zMinorSubdivision) {
          const specs = [];
          const safeStep = Math.max(Number(zStep) || 0, 0.000001);
          const safeSubdivision = Math.max(Math.round(Number(zMinorSubdivision) || 1), 1);
          const tickStep = safeStep / safeSubdivision;
          const safeTopRawZ = Math.min(Number(topRawZ) || 0, 0.0);
          const bottomRawZ =
            Math.floor(Math.max(Number(planeRawZ) || 0, 0.0) / tickStep) * tickStep;
          for (let rawZ = bottomRawZ; rawZ >= safeTopRawZ; rawZ -= tickStep) {
            const major =
              Math.abs(
                rawZ - Math.round(rawZ / safeStep) * safeStep,
              ) <= 1e-6;
            specs.push({
              rawZ: rawZ,
              major: major,
            });
          }
          if (!specs.some((item) => worldAxisRawLevelMatches(item.rawZ, 0.0))) {
            specs.push({
              rawZ: 0.0,
              major: true,
            });
          }
          if (!specs.some((item) => worldAxisRawLevelMatches(item.rawZ, safeTopRawZ))) {
            specs.push({
              rawZ: safeTopRawZ,
              major:
                Math.abs(
                  safeTopRawZ - Math.round(safeTopRawZ / safeStep) * safeStep,
                ) <= 1e-6,
            });
          }
          specs.sort((leftItem, rightItem) => rightItem.rawZ - leftItem.rawZ);
          return specs;
        }

        function worldAxisBaseAnchorForBounds(rawBounds) {
          const bounds = normalizedRawBounds(rawBounds) || worldAxisCurrentRawBounds();
          return {
            x: (dataNumber(bounds.min[0], 0) + dataNumber(bounds.max[0], 0)) * 0.5,
            y: (dataNumber(bounds.min[1], 0) + dataNumber(bounds.max[1], 0)) * 0.5,

        function worldAxisResolvedAnchorRaw(xyStep, xTickCount, yTickCount) {
          const centeredX =
            dataNumber(worldAxisOverlay.baseAnchorRaw.x, 0) +
            dataNumber(worldAxisOverlay.dragOffsetRaw.x, 0);
          const centeredY =
            dataNumber(worldAxisOverlay.baseAnchorRaw.y, 0) +
            dataNumber(worldAxisOverlay.dragOffsetRaw.y, 0);
          if (
            !Number.isFinite(Number(xyStep)) ||
            !Number.isFinite(Number(xTickCount)) ||
            !Number.isFinite(Number(yTickCount))
          ) {
            return {
              x: centeredX,
              y: centeredY,
            };
          }
          return {
            x: centeredX - (Number(xyStep) * Number(xTickCount)) * 0.5,
            y: centeredY - (Number(xyStep) * Number(yTickCount)) * 0.5,
          };
        }

        function setWorldAxisActivePadFocus(focusId, options) {
          const padFocusId =
            worldAxisPadFocusIdForFocusId(focusId) || worldAxisDefaultPadFocusId();
          const activeBounds =

          worldAxisOverlay.activeBoundsRaw = activeBounds;

        function syncWorldAxisActivePadFocus(options) {
          const currentBounds = worldAxisRawBoundsForPadFocusId(worldAxisOverlay.activePadFocusId);
          if (currentBounds && (!options || options.resetOffset !== true)) {
            worldAxisOverlay.activeBoundsRaw = currentBounds;
            worldAxisOverlay.baseAnchorRaw = worldAxisBaseAnchorForBounds(currentBounds);
            worldAxisOverlay.anchorRaw = worldAxisResolvedAnchorRaw();
            return;

          setWorldAxisActivePadFocus(worldAxisOverlay.activePadFocusId, options);

        function ensureWorldAxisLabels(count) {
          while (worldAxisOverlay.labels.length < count) {
            worldAxisOverlay.labels.push(
              addSceneLabel(
                "",
                new THREE.Vector3(0, 0, 0),
                "#5b6472",
                "world-axis-label",
                { role: "world_axis_overlay", offsetX: 0, offsetY: 0 },

          while (worldAxisOverlay.labels.length > count) {

            const itemIndex = sceneLabels.indexOf(item);
            if (itemIndex >= 0) {

        function worldAxisDepthRangeRaw() {
          const rawBounds = worldAxisCurrentRawBounds();
          const planeZ = worldAxisPlaneRawZ(rawBounds);
          const topZ = worldAxisTopRawZ(rawBounds);
          return Math.max(planeZ - Math.min(topZ, planeZ), 0.0);
        }

        function worldAxisViewMetrics() {
          syncWorldAxisActivePadFocus({ resetOffset: false });
          const planeRawZ = worldAxisPlaneRawZ(worldAxisCurrentRawBounds());
          const anchorRaw = worldAxisResolvedAnchorRaw();
          worldAxisOverlay.anchorRaw = anchorRaw;
          const anchorDisplay = displayPoint([
            anchorRaw.x,
            anchorRaw.y,
            planeRawZ,
          ]);
          const unitsPerPixel = worldUnitsPerPixelAt(anchorDisplay);
          if (!Number.isFinite(unitsPerPixel) || unitsPerPixel <= 0.0) {
            const fallbackSpan = Math.max(maxSpan * 0.65, 100.0);
            return {
              anchorRaw: {
                x: anchorRaw.x,
                y: anchorRaw.y,
              },
              unitsPerPixel: fallbackSpan / Math.max(renderer.domElement.clientHeight || 1, 1),
            };

          return {
            anchorRaw: {
              x: anchorRaw.x,
              y: anchorRaw.y,
            },
            unitsPerPixel: unitsPerPixel,

        function pushWorldAxisSegment(positions, start, end) {
          positions.push(
            Number(start[0]) || 0,
            Number(start[1]) || 0,
            Number(start[2]) || 0,
            Number(end[0]) || 0,
            Number(end[1]) || 0,
            Number(end[2]) || 0,
