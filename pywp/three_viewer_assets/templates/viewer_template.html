<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #ffffff;
        font-family:
          Inter,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      #root {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #ffffff;
      }

      #toolbar-left,
      #toolbar-right {
        position: absolute;
        top: 10px;
        display: flex;
        gap: 8px;
        z-index: 4;
      }

      #toolbar-left {
        left: 10px;
      }

      #toolbar-right {
        right: 10px;
      }

      #legend-toggle-wrap {
        display: none;
      }

      #axes-gizmo {
        position: absolute;
        top: 54px;
        left: 10px;
        width: 136px;
        height: 118px;
        pointer-events: none;
        z-index: 3;
      }

      #axes-gizmo svg {
        width: 100%;
        height: 100%;
        overflow: visible;
      }

      .axes-gizmo-line {
        fill: none;
        stroke-linecap: round;
        stroke-width: 2.2;
      }

      .axes-gizmo-label {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.01em;
        dominant-baseline: middle;
      }

      .axes-gizmo-center {
        fill: #ffffff;
        stroke: rgba(15, 23, 42, 0.18);
        stroke-width: 1.2;
      }

      .toolbar-btn {
        border: 1px solid rgba(37, 99, 235, 0.18);
        background: rgba(255, 255, 255, 0.96);
        color: #0f172a;
        border-radius: 10px;
        padding: 6px 10px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
      }

      .toolbar-btn:hover {
        background: #ffffff;
      }

      .toolbar-btn:active {
        transform: translateY(1px);
      }

      #legend {
        position: absolute;
        top: 52px;
        right: 10px;
        width: 240px;
        max-height: calc(100% - 62px);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.95);
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.1);
        z-index: 8;
        will-change: transform;
      }

      #legend:empty {
        display: none;
      }

      #legend.is-collapsed .legend-body {
        display: none;
      }

      #legend.is-collapsed {
        max-height: none;
      }

      .legend-header {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 12px;
        cursor: grab;
        user-select: none;
        border-bottom: 1px solid rgba(15, 23, 42, 0.08);
        flex-shrink: 0;
      }

      .legend-header:active {
        cursor: grabbing;
      }

      .legend-header-title {
        font-size: 12px;
        font-weight: 700;
        color: #0f172a;
        flex: 1;
      }

      .legend-collapse-btn {
        background: none;
        border: none;
        cursor: pointer;
        padding: 0 2px;
        font-size: 14px;
        line-height: 1;
        color: #64748b;
        flex-shrink: 0;
        transition: transform 0.2s ease;
      }

      .legend-collapse-btn:hover {
        color: #0f172a;
      }

      .legend-collapse-btn.is-collapsed {
        transform: rotate(-90deg);
      }

      .legend-body {
        overflow-y: auto;
        overflow-x: hidden;
        overscroll-behavior: contain;
        padding: 6px 12px 10px;
        flex: 1;
        min-height: 0;
      }

      #collisions-panel {
        position: absolute;
        top: 52px;
        left: 10px;
        width: 230px;
        max-height: calc(100% - 62px);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.95);
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.1);
        z-index: 8;
        will-change: transform;
      }

      #collisions-panel:empty {
        display: none;
      }

      #collisions-panel.is-collapsed .collisions-body {
        display: none;
      }

      #collisions-panel.is-collapsed {
        max-height: none;
      }

      .collisions-header {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 12px;
        cursor: grab;
        user-select: none;
        border-bottom: 1px solid rgba(15, 23, 42, 0.08);
        flex-shrink: 0;
      }

      .collisions-header:active {
        cursor: grabbing;
      }

      .collisions-title {
        font-size: 12px;
        font-weight: 700;
        color: #0f172a;
        flex: 1;
      }

      .collisions-count {
        font-size: 11px;
        color: #64748b;
        background: rgba(15, 23, 42, 0.06);
        padding: 2px 6px;
        border-radius: 6px;
        flex-shrink: 0;
      }

      .collisions-collapse-btn {
        background: none;
        border: none;
        cursor: pointer;
        padding: 0 2px;
        font-size: 14px;
        line-height: 1;
        color: #64748b;
        flex-shrink: 0;
        transition: transform 0.2s ease;
      }

      .collisions-collapse-btn:hover {
        color: #0f172a;
      }

      .collisions-collapse-btn.is-collapsed {
        transform: rotate(-90deg);
      }

      .collisions-body {
        overflow-y: auto;
        overflow-x: hidden;
        overscroll-behavior: contain;
        padding: 6px 12px 10px;
        flex: 1;
        min-height: 0;
      }

      .collision-item {
        display: flex;
        flex-direction: column;
        gap: 2px;
        margin: 0 0 6px 0;
        padding: 6px 8px;
        border-radius: 8px;
        background: rgba(15, 23, 42, 0.02);
        cursor: pointer;
        transition: background 0.15s ease;
      }

      .collision-item:hover {
        background: rgba(37, 99, 235, 0.08);
      }

      .collision-item:last-child {
        margin-bottom: 0;
      }

      .collision-label {
        font-size: 11px;
        font-weight: 600;
        color: #0f172a;
        line-height: 1.3;
      }

      .collision-meta {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 10px;
        color: #64748b;
      }

      .collision-class {
        padding: 1px 4px;
        border-radius: 4px;
        background: rgba(239, 68, 68, 0.12);
        color: #dc2626;
        font-weight: 600;
      }

      .collision-sf {
        font-family: "SFMono-Regular", ui-monospace, Menlo, Consolas, monospace;
        font-size: 10px;
        color: #0f172a;
        font-weight: 600;
      }

      .collision-meta-row {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }

      .segment-badge {
        display: inline-flex;
        align-items: center;
        padding: 1px 4px;
        border-radius: 3px;
        font-size: 9px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.3px;
        background: rgba(15, 23, 42, 0.08);
        color: #334155;
        border: 1px solid rgba(15, 23, 42, 0.12);
      }

      .segment-arrow {
        font-size: 10px;
        color: #94a3b8;
        padding: 0 2px;
      }

      .legend-item {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 0 0 6px 0;
        font-size: 12px;
        line-height: 1.25;
        color: #0f172a;
      }

      .legend-item.is-focusable {
        cursor: pointer;
      }

      .legend-item.is-focusable:hover .legend-label {
        color: #334155;
      }

      .legend-group {
        margin: 0 0 10px 0;
      }

      .legend-group:last-child {
        margin-bottom: 0;
      }

      .legend-node-btn {
        width: 100%;
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 0;
        padding: 4px 0;
        border: none;
        background: none;
        cursor: pointer;
        text-align: left;
        color: #0f172a;
        font-size: 12px;
        line-height: 1.25;
      }

      .legend-node-btn:hover {
        color: #1d4ed8;
      }

      .legend-node-btn.is-editable {
        border-radius: 7px;
        padding-right: 6px;
      }

      .legend-node-btn.is-selected-edit {
        background: rgba(37, 99, 235, 0.08);
        color: #1d4ed8;
      }

      .legend-node-pad {
        font-weight: 700;
      }

      .legend-node-well {
        padding-left: 18px;
      }

      .legend-caret {
        width: 10px;
        flex: 0 0 10px;
        color: #64748b;
        font-size: 11px;
      }

      .legend-children {
        margin: 2px 0 0 0;
      }

      .legend-children.is-collapsed {
        display: none;
      }

      .legend-flat-section {
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid rgba(15, 23, 42, 0.08);
      }

      .legend-swatch {
        width: 16px;
        height: 3px;
        border-radius: 999px;
        flex: 0 0 16px;
      }

      .legend-label {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      #tooltip {
        position: absolute;
        display: none;
        min-width: 132px;
        max-width: 234px;
        padding: 8px 10px;
        border: 1px solid rgba(37, 99, 235, 0.38);
        border-radius: 12px;
        background: rgba(252, 254, 255, 0.96);
        color: #0f172a;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.1);
        pointer-events: none;
        z-index: 5;
        font-size: 12px;
        line-height: 1.36;
      }

      #label-layer {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
        z-index: 2;
      }

      .scene-label {
        position: absolute;
        display: none;
        transform: translate(-50%, -100%);
        transform-origin: 50% 100%;
        font-size: 12px;
        font-weight: 600;
        line-height: 1;
        white-space: nowrap;
        color: #0f172a;
        will-change: transform;
        text-shadow:
          0 1px 0 rgba(255, 255, 255, 0.95),
          0 0 8px rgba(255, 255, 255, 0.8);
      }

      .scene-label.well-name-label,
      .minimap-well-label {
        font-family:
          Inter,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        font-weight: 700;
        letter-spacing: 0;
      }

      .scene-label.well-name-label {
        font-size: 12px;
      }

      .scene-axis-label {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .tooltip-head {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 4px;
      }

      .tooltip-swatch {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        flex: 0 0 10px;
        box-shadow: 0 0 0 1px rgba(15, 23, 42, 0.08);
      }

      .tooltip-title {
        color: #163a8a;
        font-weight: 700;
      }

      .tooltip-kv {
        margin: 2px 0 0 0;
        color: #334155;
      }

      .tooltip-kv strong {
        color: #1f3b74;
        font-weight: 600;
      }

      .tooltip-mono {
        font-family:
          "SFMono-Regular",
          ui-monospace,
          Menlo,
          Consolas,
          monospace;
        color: #111827;
      }

      /* --- Edit mode --- */
      .toolbar-btn.is-active {
        background: #2563eb;
        color: #ffffff;
        border-color: #1d4ed8;
      }

      .toolbar-btn.is-active:hover {
        background: #1d4ed8;
      }

      #anti-collision-control-wrap {
        display: none;
        position: relative;
      }

      #anti-collision-control-wrap.is-visible {
        display: block;
      }

      #anti-collision-controls {
        display: none;
        position: absolute;
        top: calc(100% + 8px);
        left: 0;
        width: 236px;
        z-index: 7;
        padding: 9px 10px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.1);
        backdrop-filter: blur(8px);
      }

      #anti-collision-controls.is-visible {
        display: block;
      }

      .anti-collision-option {
        display: flex;
        align-items: center;
        gap: 8px;
        min-height: 24px;
        font-size: 11px;
        font-weight: 600;
        line-height: 1.25;
        color: #334155;
        user-select: none;
        cursor: pointer;
      }

      .anti-collision-option + .anti-collision-option {
        margin-top: 6px;
      }

      .anti-collision-option input {
        width: 14px;
        height: 14px;
        margin: 0;
        accent-color: #dc2626;
        flex: 0 0 auto;
      }

      #edit-toolbox {
        display: none;
        position: absolute;
        top: 52px;
        left: 156px;
        width: 234px;
        max-width: calc(100% - 20px);
        z-index: 6;
        background: rgba(255,255,255,0.97);
        border-radius: 12px;
        box-shadow: 0 10px 28px rgba(15,23,42,0.12);
        overflow: hidden;
      }

      #edit-toolbox.is-visible {
        display: flex;
        flex-direction: column;
      }

      .edit-toolbox-header {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 12px;
        cursor: grab;
        user-select: none;
        border-bottom: 1px solid rgba(15,23,42,0.08);
      }

      .edit-toolbox-header:active {
        cursor: grabbing;
      }

      .edit-toolbox-title {
        font-size: 12px;
        font-weight: 700;
        color: #0f172a;
      }

      .edit-toolbox-body {
        display: flex;
        flex-direction: column;
        gap: 9px;
        padding: 9px 10px 10px;
      }

      .edit-toolbox-section {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }

      .edit-toolbox-label {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.02em;
        color: #64748b;
        text-transform: uppercase;
      }

      #edit-plane-selector,
      #edit-operation-selector,
      #edit-scope-selector,
      .edit-toolbox-action-row {
        display: flex;
        gap: 4px;
      }

      .plane-btn,
      .operation-btn,
      .scope-btn {
        flex: 1 1 0;
        border: 1px solid transparent;
        background: transparent;
        color: #475569;
        border-radius: 8px;
        padding: 5px 12px;
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s ease;
      }

      .plane-btn:hover,
      .operation-btn:hover,
      .scope-btn:hover {
        background: rgba(37,99,235,0.06);
      }

      .plane-btn.is-active,
      .operation-btn.is-active,
      .scope-btn.is-active {
        background: #2563eb;
        color: #ffffff;
        border-color: #1d4ed8;
      }

      .plane-btn:disabled,
      .operation-btn:disabled,
      .scope-btn:disabled {
        cursor: default;
        opacity: 0.45;
      }

      .edit-tool-btn {
        flex: 1 1 0;
        min-width: 0;
        border: 1px solid rgba(37,99,235,0.16);
        background: rgba(248,250,252,0.96);
        color: #334155;
        border-radius: 8px;
        padding: 6px 8px;
        font-size: 11px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.15s ease;
      }

      .edit-tool-btn:hover:not(:disabled) {
        background: rgba(37,99,235,0.08);
        color: #1d4ed8;
      }

      .edit-tool-btn:disabled {
        cursor: default;
        opacity: 0.42;
      }

      .edit-tool-btn.is-reset {
        border-color: rgba(220,38,38,0.16);
      }

      .edit-tool-btn.is-reset:hover:not(:disabled) {
        background: rgba(220,38,38,0.08);
        color: #b91c1c;
      }

      .edit-delta-label {
        min-width: 118px;
        padding: 3px 5px;
        border: none;
        border-radius: 4px;
        background: rgba(255,255,255,0.18);
        box-shadow: none;
        color: rgba(15,23,42,0.86);
        cursor: grab;
        font-family:
          "SFMono-Regular",
          ui-monospace,
          Menlo,
          Consolas,
          monospace;
        font-size: 10px;
        line-height: 1.35;
        pointer-events: auto;
        text-align: left;
        transform: translate(10px, -100%);
        transform-origin: 0 100%;
        text-shadow:
          0 1px 2px rgba(255,255,255,0.95),
          0 0 7px rgba(255,255,255,0.72);
        backdrop-filter: blur(2px);
      }

      .edit-delta-label:hover {
        background: rgba(255,255,255,0.28);
      }

      .edit-delta-label.is-dragging {
        cursor: grabbing;
        background: rgba(255,255,255,0.34);
      }

      .edit-delta-label .edit-delta-head {
        display: block;
        margin-bottom: 3px;
        color: rgba(15,23,42,0.86);
        font-family:
          Inter,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        font-size: 11px;
        font-weight: 700;
      }

      .edit-delta-label .edit-delta-row {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        white-space: nowrap;
      }

      .edit-delta-label .edit-delta-total {
        margin-top: 3px;
        padding-top: 3px;
        border-top: 1px solid rgba(15,23,42,0.12);
        color: rgba(15,23,42,0.92);
        font-weight: 700;
      }

      .edit-lateral-label {
        padding: 4px 8px;
        border: 1px solid rgba(37,99,235,0.18);
        border-radius: 999px;
        background: rgba(255,255,255,0.70);
        box-shadow: 0 4px 12px rgba(15,23,42,0.06);
        color: #1d4ed8;
        font-family:
          "SFMono-Regular",
          ui-monospace,
          Menlo,
          Consolas,
          monospace;
        font-size: 10px;
        font-weight: 700;
        pointer-events: none;
        transform: translate(-50%, -50%);
        backdrop-filter: blur(7px);
      }

      #edit-save-btn {
        display: none;
        position: absolute;
        bottom: 14px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 6;
        border: 1px solid #16a34a;
        background: #22c55e;
        color: #ffffff;
        border-radius: 10px;
        padding: 8px 20px;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 6px 18px rgba(22,163,74,0.25);
        transition: all 0.15s ease;
      }

      #edit-save-btn:hover {
        background: #16a34a;
      }

      #edit-save-btn.is-pending,
      #edit-save-btn:disabled {
        cursor: wait;
        opacity: 0.82;
      }

      #edit-save-btn.is-error {
        border-color: #dc2626;
        background: #ef4444;
        box-shadow: 0 6px 18px rgba(220,38,38,0.22);
      }

      #edit-save-btn.is-visible {
        display: block;
      }

      #edit-warning-toast {
        display: none;
        position: absolute;
        bottom: 64px;
        right: 18px;
        z-index: 6;
        max-width: 420px;
        background: rgba(255,255,255,0.97);
        border-left: 5px solid #f59e0b;
        border-radius: 12px;
        box-shadow: 0 9px 24px rgba(15,23,42,0.12);
        padding: 15px 21px 36px;
        font-size: 16.5px;
        line-height: 1.45;
        color: #475569;
        pointer-events: auto;
      }

      #edit-warning-hide-btn {
        position: absolute;
        right: 12px;
        bottom: 8px;
        border: none;
        background: transparent;
        color: #64748b;
        border-radius: 6px;
        padding: 3px 7px;
        font-size: 12px;
        font-weight: 700;
        line-height: 1.2;
        cursor: pointer;
      }

      #edit-warning-hide-btn:hover {
        background: rgba(148,163,184,0.16);
        color: #334155;
      }

      #edit-warning-toast.is-visible {
        display: block;
        animation: fadeInUp 0.3s ease;
      }

      #minimap-frame {
        display: none;
        position: absolute;
        z-index: 3;
        border: 1px solid rgba(15,23,42,0.16);
        border-radius: 12px;
        background: rgba(255,255,255,0.035);
        box-shadow: 0 8px 20px rgba(15,23,42,0.10);
        pointer-events: none;
      }

      #minimap-frame.is-visible {
        display: block;
      }

      #minimap-label-layer {
        display: none;
        position: absolute;
        z-index: 4;
        overflow: hidden;
        pointer-events: none;
      }

      #minimap-label-layer.is-visible {
        display: block;
      }

      .minimap-well-label {
        position: absolute;
        display: none;
        max-width: 120px;
        overflow: hidden;
        text-overflow: ellipsis;
        color: #0f172a;
        font-size: 10px;
        line-height: 1;
        text-shadow:
          0 1px 0 rgba(255,255,255,0.98),
          0 0 7px rgba(255,255,255,0.95),
          0 1px 4px rgba(15,23,42,0.18);
        transform: translate(6px, -50%);
        white-space: nowrap;
      }

      #minimap-axes {
        display: none;
        position: absolute;
        z-index: 4;
        width: 62px;
        height: 62px;
        color: #334155;
        opacity: 0.86;
        pointer-events: none;
      }

      #minimap-axes.is-visible {
        display: block;
      }

      .minimap-axis {
        position: absolute;
        background: currentColor;
        box-shadow: 0 1px 2px rgba(255,255,255,0.9);
      }

      .minimap-axis::after {
        content: "";
        position: absolute;
        width: 0;
        height: 0;
      }

      .minimap-axis-x {
        left: 13px;
        bottom: 14px;
        width: 34px;
        height: 2px;
        color: #16A34A;
      }

      .minimap-axis-x::after {
        right: -1px;
        top: -4px;
        border-left: 7px solid currentColor;

    <script>
      (function () {
        const payloadElement = document.getElementById("scene-payload");
        if (!payloadElement) {
          return;
        }
        const payload = JSON.parse(payloadElement.textContent || "{}");
        const root = document.getElementById("root");
        const labelLayerElement = document.getElementById("label-layer");
        const legendElement = document.getElementById("legend");
        const tooltipElement = document.getElementById("tooltip");
        const miniMapFrame = document.getElementById("minimap-frame");
        const miniMapLabelLayer = document.getElementById("minimap-label-layer");
        const miniMapAxes = document.getElementById("minimap-axes");
        const miniMapControl = document.getElementById("minimap-control");
        const miniMapLabel = document.getElementById("minimap-label");
        const miniMapToggleBtn = document.getElementById("minimap-toggle-btn");
        const fitButton = document.getElementById("fit-camera-btn");
        const fullscreenButton = document.getElementById("fullscreen-btn");
        const axesGizmoElement = document.getElementById("axes-gizmo");
        const collisionsPanelElement = document.getElementById("collisions-panel");
        const antiCollisionControlWrap = document.getElementById("anti-collision-control-wrap");
        const antiCollisionButton = document.getElementById("anti-collision-btn");
        const antiCollisionControls = document.getElementById("anti-collision-controls");
        const Z_DISPLAY_SIGN = -1.0;
        const scene = new THREE.Scene();
        const miniMapOverlayScene = new THREE.Scene();
        const backgroundColor = String(payload.background || "#ffffff");
        scene.background = new THREE.Color(backgroundColor);
        scene.add(new THREE.AmbientLight(0xffffff, 0.72));
        const surfaceShadeLight = new THREE.DirectionalLight(0xffffff, 0.58);
        surfaceShadeLight.position.set(0.35, -0.45, 0.82).normalize();
        scene.add(surfaceShadeLight);

        const sceneComplexity =
          (payload.lines || []).reduce(
            (acc, item) =>
              acc +
              (Array.isArray(item.segments)
                ? item.segments.reduce(
                    (segmentAcc, segment) =>
                      segmentAcc +
                      (Array.isArray(segment) ? Math.max(segment.length - 1, 0) : 0),
                    0,
                  )
                : 0),
            0,
          ) +
          (payload.points || []).reduce(
            (acc, item) => acc + (Array.isArray(item.points) ? item.points.length : 0),
            0,
          ) +
          (payload.labels || []).length * 12 +
          (payload.meshes || []).reduce(
            (acc, item) => {
              const vertexCount = Array.isArray(item.vertices) ? item.vertices.length : 0;
              const ringCount = Array.isArray(item.rings)
                ? item.rings.reduce(
                    (ringAcc, ring) => ringAcc + (Array.isArray(ring) ? ring.length : 0),
                    0,
                  )
                : 0;
              return acc + vertexCount + ringCount;
            },
            0,
          );
        const maxPixelRatio =
          sceneComplexity > 180000 ? 0.95 :
          sceneComplexity > 90000 ? 1.0 :
          sceneComplexity > 30000 ? 1.25 :
          1.65;

        const renderer = new THREE.WebGLRenderer({
          antialias: sceneComplexity <= 25000,
          alpha: false,
          powerPreference: "high-performance",
        });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, maxPixelRatio));
        renderer.setClearColor(backgroundColor, 1.0);
        renderer.domElement.style.background = backgroundColor;
        root.appendChild(renderer.domElement);

        const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000000);
        camera.up.set(0, 0, 1);

        const miniMapCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 1000000);
        miniMapCamera.up.set(0, 1, 0);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.12;
        controls.rotateSpeed = 0.72;
        controls.zoomSpeed = 0.95;
        controls.panSpeed = 0.47;
        controls.screenSpacePanning = true;
        controls.enableRotate = true;
        controls.enableZoom = true;
        controls.enablePan = true;

        const hoverTargets = [];
        const sceneLabels = [];
        const miniMapLabels = [];
        let animationFrameHandle = 0;
        let idleFrameCount = 0;
        let needsRender = true;
        let pointerScreen = { x: 0, y: 0, inside: false };
        let legendTreeExpanded = true;
        let interactionActive = false;
        const miniMapState = {
          expanded: false,
          dragging: false,
          zoom: 1.0,
          baseSpan: 1.0,
          maxSpan: 1.0,
          target: new THREE.Vector3(0, 0, 0),
          pointerStart: { x: 0, y: 0 },
          targetStart: new THREE.Vector3(0, 0, 0),
          customSize: null,
          resizing: false,
          resizeMoved: false,
          resizeStartRect: null,
          resizeStartWorldPerPixel: 1.0,
          rect: { x: 0, y: 0, width: 0, height: 0 },
        };
        const hasTreeLegend =
          Array.isArray(payload.legend_tree) && payload.legend_tree.length > 0;
        const focusTargets =
          payload.focus_targets && typeof payload.focus_targets === "object"
            ? payload.focus_targets
            : {};
        const editWells = Array.isArray(payload.edit_wells) ? payload.edit_wells : [];
        const editChannelName = String(payload.edit_channel || "");
        const editWellIndexByName = new Map();
        editWells.forEach((well, index) => {
          const name = String((well && well.name) || "").trim();
          if (!name) {
            return;
          }
          editWellIndexByName.set(name, index);
          editWellIndexByName.set(`well::${name}`, index);
        });
        const editableWellColors = new Set(
          editWells
            .map((well) => String((well && well.color) || "").trim().toLowerCase())
            .filter(Boolean),
        );
        const editableBaseMaterials = [];
        const antiCollisionVisualObjects = {
          cones: [],
          overlaps: [],
          segments: [],
        };
        const miniMapHiddenContourObjects = [];
        const antiCollisionLayerLabels = {
          cones: "Конусы неопределенности",
          overlaps: "Зоны пересечений",
          segments: "Конфликтные участки ствола",
        };
        const antiCollisionLayerState = {
          cones: true,
          overlaps: true,
          segments: true,
        };

        const hoverSphereGeometry = new THREE.SphereGeometry(1.0, 6, 6);
        const hoverSphereMaterial = new THREE.MeshBasicMaterial({
          color: "#64748b",
          transparent: true,
          opacity: 0.0,
          depthWrite: false,
          depthTest: false,
        });
        hoverSphereMaterial.colorWrite = false;

        function requestRender() {
          needsRender = true;
          startAnimationLoop();
        }

        function displayPoint(value) {
          return new THREE.Vector3(
            Number(value[0] || 0),
            Number(value[1] || 0),
            Number(value[2] || 0) * Z_DISPLAY_SIGN,
          );
        }

        function displayXYZ(xValue, yValue, zValue) {
          return [
            Number(xValue || 0),
            Number(yValue || 0),
            Number(zValue || 0) * Z_DISPLAY_SIGN,
          ];
        }

        function hexOrDefault(colorValue, fallback) {
          if (typeof colorValue !== "string" || colorValue.trim() === "") {
            return fallback;
          }
          return colorValue;
        }

        function numberOrDefault(value, fallback) {
          const result = Number(value);
          return Number.isFinite(result) ? result : fallback;
        }

        function editableIndexForBaseName(nameValue) {
          const rawName = String(nameValue || "").trim();
          if (!rawName) {
            return null;
          }
          if (editWellIndexByName.has(rawName)) {
            return editWellIndexByName.get(rawName);
          }
          const baseName = rawName.split(":")[0].trim();
          if (baseName && editWellIndexByName.has(baseName)) {
            return editWellIndexByName.get(baseName);
          }
          return null;
        }

        function registerEditableBaseMaterial(material, colorValue, nameValue) {
          const colorKey = String(colorValue || "").trim().toLowerCase();
          const wellIndex = editableIndexForBaseName(nameValue);
          if (
            !material ||
            (
              !Number.isInteger(wellIndex) &&
              (!colorKey || !editableWellColors.has(colorKey))
            )
          ) {
            return;
          }
          editableBaseMaterials.push({
            material: material,
            colorKey: colorKey,
            wellIndex: wellIndex,
            opacity: Number.isFinite(Number(material.opacity))
              ? Number(material.opacity)
              : 1.0,
            transparent: Boolean(material.transparent),
            depthWrite: Boolean(material.depthWrite),
          });
        }

        function setEditableBaseDimmed(dimmed, selectedWellIndex) {
          const selectedWell = editWells[selectedWellIndex] || null;
          const selectedColorKey = String((selectedWell && selectedWell.color) || "")
            .trim()
            .toLowerCase();
          editableBaseMaterials.forEach((item) => {
            const material = item.material;
            const baseOpacity = Number.isFinite(Number(item.opacity))
              ? Number(item.opacity)
              : 1.0;
            const itemWellIndex = Number(item.wellIndex);
            const applies =
              dimmed &&
              (
                (Number.isInteger(itemWellIndex) && itemWellIndex === selectedWellIndex) ||
                (
                  !Number.isInteger(itemWellIndex) &&
                  (!selectedColorKey || String(item.colorKey) === selectedColorKey)
                )
              );
            material.transparent = applies || item.transparent || baseOpacity < 0.999;
            material.opacity = applies ? Math.min(baseOpacity, 0.18) : baseOpacity;
            material.depthWrite = applies ? false : item.depthWrite;
            material.needsUpdate = true;
          });
        }

        function antiCollisionLayerForRole(roleValue) {
          const role = String(roleValue || "");
          if (role === "cone" || role === "cone_tip") {
            return "cones";
          }
          if (role === "overlap" || role === "overlap_volume") {
            return "overlaps";
          }
          if (role === "conflict_segment" || role === "conflict_hover") {
            return "segments";
          }
          return "";
        }

        function antiCollisionLayerForItem(itemOrRole) {
          if (typeof itemOrRole === "string") {
            return antiCollisionLayerForRole(itemOrRole);
          }
          const item = itemOrRole || {};
          const roleLayer = antiCollisionLayerForRole(item.role);
          if (roleLayer) {
            return roleLayer;
          }
          const name = String(item.name || "").toLowerCase();
          if (name.includes("конфликт") || name.includes("conflict")) {
            return "segments";
          }
          if (name.includes("зоны пересеч") || name.includes("overlap")) {
            return "overlaps";
          }
          if (name.includes("конус") || name.includes("cone")) {
            return "cones";
          }
          return "";
        }

        function hasAntiCollisionVisualPayload() {
          const lineItems = Array.isArray(payload.lines) ? payload.lines : [];
          const meshItems = Array.isArray(payload.meshes) ? payload.meshes : [];
          const pointItems = Array.isArray(payload.points) ? payload.points : [];
          return [...lineItems, ...meshItems, ...pointItems].some((item) =>
            antiCollisionLayerForItem(item),
          );
        }

        function registerAntiCollisionVisualObject(object, itemOrRole) {
          const layer = antiCollisionLayerForItem(itemOrRole);
          if (!object || !layer) {
            return;
          }
          antiCollisionVisualObjects[layer].push(object);
          object.visible = Boolean(antiCollisionLayerState[layer]);
        }

        function registerMiniMapHiddenContourObject(object) {
          if (object) {
            miniMapHiddenContourObjects.push(object);
          }
        }

        function renderMiniMapScene() {
          const previousVisibility = miniMapHiddenContourObjects.map((object) => ({
            object,
            visible: Boolean(object.visible),
          }));
          previousVisibility.forEach((item) => {
            item.object.visible = false;
          });
          renderer.render(scene, miniMapCamera);
          renderer.clearDepth();
          renderer.render(miniMapOverlayScene, miniMapCamera);
          previousVisibility.forEach((item) => {
            item.object.visible = item.visible;
          });
        }

        function applyAntiCollisionLayerVisibility() {
          Object.keys(antiCollisionVisualObjects).forEach((layer) => {
            const visible = Boolean(antiCollisionLayerState[layer]);
            antiCollisionVisualObjects[layer].forEach((object) => {
              if (object) {
                object.visible = visible;
              }
            });
          });
          if (tooltipElement) {
            hideTooltip();
          }
          requestRender();
        }

        function initAntiCollisionControls() {
          if (!antiCollisionControlWrap || !antiCollisionButton || !antiCollisionControls) {
            return;
          }
          if (!hasAntiCollisionVisualPayload()) {
            return;
          }
          antiCollisionControlWrap.classList.add("is-visible");
          antiCollisionControls
            .querySelectorAll("input[data-ac-layer]")
            .forEach((input) => {
              const layer = String(input.getAttribute("data-ac-layer") || "");
              if (!Object.prototype.hasOwnProperty.call(antiCollisionLayerState, layer)) {
                return;
              }
              input.checked = Boolean(antiCollisionLayerState[layer]);
              input.setAttribute(
                "aria-label",
                antiCollisionLayerLabels[layer] || layer,
              );
              input.addEventListener("change", () => {
                antiCollisionLayerState[layer] = Boolean(input.checked);
                applyAntiCollisionLayerVisibility();
              });
            });
          antiCollisionButton.addEventListener("click", () => {
            const expanded = !antiCollisionControls.classList.contains("is-visible");
            antiCollisionControls.classList.toggle("is-visible", expanded);
            antiCollisionButton.classList.toggle("is-active", expanded);
            antiCollisionButton.setAttribute("aria-expanded", expanded ? "true" : "false");
          });
          antiCollisionButton.setAttribute("aria-expanded", "false");
        }

        let circleMarkerTexture = null;

        function ensureCircleMarkerTexture() {
          if (circleMarkerTexture) {
            return circleMarkerTexture;
          }
          const size = 96;
          const canvas = document.createElement("canvas");
          canvas.width = size;
          canvas.height = size;
          const context = canvas.getContext("2d");
          if (!context) {
            return null;
          }
          const center = size / 2;
          const outerRadius = size * 0.30;
          const innerRadius = size * 0.24;
          context.clearRect(0, 0, size, size);
          context.fillStyle = "rgba(255, 255, 255, 0.98)";
          context.beginPath();
          context.arc(center, center, outerRadius, 0, Math.PI * 2);
          context.fill();
          context.fillStyle = "#ffffff";
          context.beginPath();
          context.arc(center, center, innerRadius, 0, Math.PI * 2);
          context.fill();
          const texture = new THREE.CanvasTexture(canvas);
          texture.colorSpace = THREE.SRGBColorSpace;
          texture.needsUpdate = true;
          circleMarkerTexture = texture;
          return circleMarkerTexture;
        }

        function transformedBounds(rawBounds) {
          const rawMin = displayPoint((rawBounds && rawBounds.min) || [0, 0, 0]);
          const rawMax = displayPoint((rawBounds && rawBounds.max) || [1000, 1000, 1000]);
          return {
            min: new THREE.Vector3(
              Math.min(rawMin.x, rawMax.x),
              Math.min(rawMin.y, rawMax.y),
              Math.min(rawMin.z, rawMax.z),
            ),
            max: new THREE.Vector3(
              Math.max(rawMin.x, rawMax.x),
              Math.max(rawMin.y, rawMax.y),
              Math.max(rawMin.z, rawMax.z),
            ),
          };
        }

        function clampValue(value, minValue, maxValue) {
          return Math.max(minValue, Math.min(maxValue, value));
        }

        function miniMapSizeConfig(canvasWidth, canvasHeight) {
          const margin = 14;
          const aspect = canvasWidth / canvasHeight;
          const targetArea = (canvasWidth * canvasHeight) / 6.0;
          const preferredWidth = Math.sqrt(targetArea * aspect) * 1.2;
          const preferredHeight = preferredWidth / aspect;
          return {
            margin: margin,
            preferredWidth: preferredWidth,
            preferredHeight: preferredHeight,
            minWidth: Math.min(264, Math.max(canvasWidth - margin * 2, 1)),
            minHeight: Math.min(180, Math.max(canvasHeight - margin * 2, 1)),
            maxWidth: Math.max(Math.min(canvasWidth - margin * 2, 900), 1),
            maxHeight: Math.max(Math.min(canvasHeight - margin * 2, 620), 1),
          };
        }

        function miniMapCanvasRect() {
          const canvasWidth = Math.max(renderer.domElement.clientWidth || 1, 1);
          const canvasHeight = Math.max(renderer.domElement.clientHeight || 1, 1);
          const sizeConfig = miniMapSizeConfig(canvasWidth, canvasHeight);
          const requestedWidth =
            miniMapState.customSize && Number.isFinite(miniMapState.customSize.width)
              ? miniMapState.customSize.width
              : sizeConfig.preferredWidth;
          const requestedHeight =
            miniMapState.customSize && Number.isFinite(miniMapState.customSize.height)
              ? miniMapState.customSize.height
              : sizeConfig.preferredHeight;
          const rectWidth = clampValue(
            requestedWidth,
            sizeConfig.minWidth,
            sizeConfig.maxWidth,
          );
          const rectHeight = clampValue(
            requestedHeight,
            sizeConfig.minHeight,
            sizeConfig.maxHeight,
          );
          return {
            x: canvasWidth - rectWidth - sizeConfig.margin,
            y: sizeConfig.margin,
            width: rectWidth,
            height: rectHeight,
            canvasWidth: canvasWidth,
            canvasHeight: canvasHeight,
          };
        }

        function resizedMiniMapSize(startRect, event) {
          const canvasWidth = Math.max(renderer.domElement.clientWidth || 1, 1);
          const canvasHeight = Math.max(renderer.domElement.clientHeight || 1, 1);
          const sizeConfig = miniMapSizeConfig(canvasWidth, canvasHeight);
          const startWidth = Math.max(Number(startRect && startRect.width) || 1, 1);
          const startHeight = Math.max(Number(startRect && startRect.height) || 1, 1);
          const growX = miniMapState.pointerStart.x - Number(event.clientX || 0);
          const growY = miniMapState.pointerStart.y - Number(event.clientY || 0);
          const scale = clampValue(
            1.0 + (growX / startWidth + growY / startHeight) * 0.5,
            Math.max(sizeConfig.minWidth / startWidth, sizeConfig.minHeight / startHeight),
            Math.min(sizeConfig.maxWidth / startWidth, sizeConfig.maxHeight / startHeight),
          );
          return {
            width: clampValue(
              startWidth * scale,
              sizeConfig.minWidth,
              sizeConfig.maxWidth,
            ),
            height: clampValue(
              startHeight * scale,
              sizeConfig.minHeight,
              sizeConfig.maxHeight,
            ),
          };
        }

        function syncMiniMapResizeZoom(rect) {
          const safeRect = rect || miniMapCanvasRect();
          const worldPerPixel = Math.max(
            Number(miniMapState.resizeStartWorldPerPixel) || miniMapWorldPerPixel(),
            0.000001,
          );
          miniMapState.zoom = clampValue(
            miniMapState.baseSpan / (worldPerPixel * Math.max(safeRect.height, 1.0)),
            0.25,
            12.0,
          );
        }

        }

        function updateMiniMapLabels() {
          if (!miniMapLabelLayer || !miniMapState.expanded) {
            miniMapLabels.forEach((item) => {
              item.element.style.display = "none";
            });
            return;
          }
          const rect = miniMapState.rect.width > 0
            ? miniMapState.rect
            : miniMapCanvasRect();
          const aspect = Math.max(rect.width / Math.max(rect.height, 1), 0.01);
          const viewHeight = Math.max(miniMapState.baseSpan / miniMapState.zoom, 1.0);
          const viewWidth = viewHeight * aspect;
          const leftWorld = miniMapState.target.x - viewWidth * 0.5;
          const topWorld = miniMapState.target.y + viewHeight * 0.5;
          const padding = 8;
          miniMapLabels.forEach((item) => {
            const localX = ((item.position.x - leftWorld) / viewWidth) * rect.width;
            const localY = ((topWorld - item.position.y) / viewHeight) * rect.height;
            if (
              !Number.isFinite(localX) ||
              !Number.isFinite(localY) ||
              localX < padding ||
              localX > rect.width - padding ||
              localY < padding ||
              localY > rect.height - padding
            ) {
              item.element.style.display = "none";
              return;
            }
            item.element.style.display = "block";
            item.element.style.left = `${Math.round(localX)}px`;
            item.element.style.top = `${Math.round(localY)}px`;
          });
        }

        function fitMiniMapToRawBounds(rawBounds) {
          const localBounds = transformedBounds(rawBounds || payload.bounds || {});
          const localMin = localBounds.min;
          const localMax = localBounds.max;
          const localCenter = new THREE.Vector3()
            .addVectors(localMin, localMax)
            .multiplyScalar(0.5);
          const localSpan = new THREE.Vector3().subVectors(localMax, localMin);
          miniMapState.target.copy(localCenter);
          miniMapState.maxSpan = Math.max(localSpan.x, localSpan.y, localSpan.z, 1.0);
          miniMapState.baseSpan = Math.max(localSpan.x, localSpan.y, 1.0) * 1.18;
          miniMapState.zoom = 1.0;
        }

        function focusMiniMapToDisplayPoint(displayCenter, focusSpan) {
          if (!displayCenter) {
            return;
          }
          const safeSpan = Math.max(Number(focusSpan) || 1.0, 1.0);
          miniMapState.target.copy(displayCenter);
          miniMapState.maxSpan = Math.max(safeSpan, 1.0);
          miniMapState.baseSpan = safeSpan * 1.18;
          miniMapState.zoom = 1.0;
        }

        function updateMiniMapCamera(rect) {
          const safeRect = rect || miniMapCanvasRect();
          const aspect = Math.max(safeRect.width / Math.max(safeRect.height, 1), 0.01);
          const viewHeight = Math.max(miniMapState.baseSpan / miniMapState.zoom, 1.0);
          const viewWidth = viewHeight * aspect;
          miniMapCamera.left = -viewWidth * 0.5;
          miniMapCamera.right = viewWidth * 0.5;
          miniMapCamera.top = viewHeight * 0.5;
          miniMapCamera.bottom = -viewHeight * 0.5;
          miniMapCamera.near = 0.1;
          miniMapCamera.far = Math.max(miniMapState.maxSpan * 24.0, 5000.0);
          miniMapCamera.position.set(
            miniMapState.target.x,
            miniMapState.target.y,
            miniMapState.target.z + Math.max(miniMapState.maxSpan * 8.0, 1000.0),
          );
          miniMapCamera.lookAt(miniMapState.target);
          miniMapCamera.updateProjectionMatrix();
        }

        function isPointerInMiniMap(event) {
          if (!miniMapState.expanded) {
            return false;
          }
          const rect = miniMapCanvasRect();
          const canvasRect = renderer.domElement.getBoundingClientRect();
          const localX = Number(event.clientX || 0) - canvasRect.left;
          const localY = Number(event.clientY || 0) - canvasRect.top;
          const top = rect.canvasHeight - rect.y - rect.height;
          return (
            localX >= rect.x &&
            localX <= rect.x + rect.width &&
            localY >= top &&
            localY <= top + rect.height
          );
        }

        function miniMapWorldPerPixel() {
          const rect = miniMapState.rect.width > 0
            ? miniMapState.rect
            : miniMapCanvasRect();
          const viewHeight = Math.max(miniMapState.baseSpan / miniMapState.zoom, 1.0);
          return viewHeight / Math.max(rect.height, 1.0);
        }

        function miniMapWorldAtEvent(event) {
          const rect = miniMapCanvasRect();
          const canvasRect = renderer.domElement.getBoundingClientRect();
          const localX = Number(event.clientX || 0) - canvasRect.left;
          const localY = Number(event.clientY || 0) - canvasRect.top;
          const top = rect.canvasHeight - rect.y - rect.height;
          const normalizedX = (localX - rect.x) / Math.max(rect.width, 1.0) - 0.5;
          const normalizedY = 0.5 - (localY - top) / Math.max(rect.height, 1.0);
          const viewHeight = Math.max(miniMapState.baseSpan / miniMapState.zoom, 1.0);
          const viewWidth = viewHeight * (rect.width / Math.max(rect.height, 1.0));
          return new THREE.Vector3(
            miniMapState.target.x + normalizedX * viewWidth,
            miniMapState.target.y + normalizedY * viewHeight,
            miniMapState.target.z,
          );
        }

        function miniMapLocalAtEvent(event, rect) {
          const safeRect = rect || miniMapCanvasRect();
          const canvasRect = renderer.domElement.getBoundingClientRect();
          return {
            x: Number(event.clientX || 0) - canvasRect.left - safeRect.x,
            y:
              Number(event.clientY || 0) -
              canvasRect.top -
              (safeRect.canvasHeight - safeRect.y - safeRect.height),
          };
        }

        function miniMapLocalFromDisplayPoint(displayPosition, rect) {
          const safeRect = rect || miniMapCanvasRect();
          const aspect = Math.max(safeRect.width / Math.max(safeRect.height, 1), 0.01);
          const viewHeight = Math.max(miniMapState.baseSpan / miniMapState.zoom, 1.0);
          const viewWidth = viewHeight * aspect;
          const leftWorld = miniMapState.target.x - viewWidth * 0.5;
          const topWorld = miniMapState.target.y + viewHeight * 0.5;
          return {
            x: ((displayPosition.x - leftWorld) / viewWidth) * safeRect.width,
            y: ((topWorld - displayPosition.y) / viewHeight) * safeRect.height,
          };
        }

        const bounds = transformedBounds(payload.bounds || {});
        const minBound = bounds.min;
        const maxBound = bounds.max;
        const center = new THREE.Vector3()
          .addVectors(minBound, maxBound)
          .multiplyScalar(0.5);
        const span = new THREE.Vector3().subVectors(maxBound, minBound);
        const maxSpan = Math.max(span.x, span.y, span.z, 1);
        const worldMarkerSize = Math.max(maxSpan * 0.008, 9.0);
        const axisLength = Math.max(maxSpan * 0.18, 40.0);
        fitMiniMapToRawBounds(payload.bounds || {});

        const axisOverlayDefinitions = [

        function updateAxesGizmo() {
          if (!axesGizmoElement) {
            return;
          }
          const width = Math.max(axesGizmoElement.clientWidth || 136, 136);
          const height = Math.max(axesGizmoElement.clientHeight || 118, 118);
          const centerX = 58;
          const centerY = 42;
          const radius = Math.min(width, height) * 0.34;
          const inverseCameraQuaternion = camera.quaternion.clone().invert();
          const axisItems = axisOverlayDefinitions.map((item) => {
            const projected = item.vector
              .clone()
              .applyQuaternion(inverseCameraQuaternion)
              .normalize();
            return {
              label: item.label,
              color: item.color,
              x: centerX + projected.x * radius,
              y: centerY - projected.y * radius,
              z: projected.z,
            };
          });
          axisItems.sort((left, right) => left.z - right.z);
          const lines = axisItems
            .map(
              (item) =>
                `<line class="axes-gizmo-line" x1="${centerX.toFixed(1)}" y1="${centerY.toFixed(1)}" x2="${item.x.toFixed(1)}" y2="${item.y.toFixed(1)}" stroke="${item.color}" opacity="${(item.z > 0 ? 1.0 : 0.72).toFixed(2)}"></line>`,
            )
            .join("");
          const labels = axisItems
            .map((item) => {
              const dx = item.x - centerX;
              const dy = item.y - centerY;
              const labelX = item.x + (Math.abs(dx) < 4 ? 0 : Math.sign(dx) * 7);
              const labelY = item.y + (Math.abs(dy) < 4 ? 0 : Math.sign(dy) * 7);
              const textAnchor =

              return `<text class="axes-gizmo-label" x="${labelX.toFixed(1)}" y="${labelY.toFixed(1)}" fill="${item.color}" text-anchor="${textAnchor}">${item.label}</text>`;
            })
            .join("");
          axesGizmoElement.innerHTML =

            `<circle class="axes-gizmo-center" cx="${centerX.toFixed(1)}" cy="${centerY.toFixed(1)}" r="3.2"></circle>` +
            lines +
            labels +
            `</svg>`;

        function resize() {
          const width = Math.max(root.clientWidth || 1, 1);

        function fitCameraToRawBounds(rawBounds) {
          const localBounds = transformedBounds(rawBounds || payload.bounds || {});

          const localCenter = new THREE.Vector3()
            .addVectors(localMin, localMax)
            .multiplyScalar(0.5);
          const localSpan = new THREE.Vector3().subVectors(localMax, localMin);
          const localMaxSpan = Math.max(
            localSpan.x,
            localSpan.y,
            localSpan.z,
            1,
          );
          camera.near = Math.max(localMaxSpan / 1200.0, 0.1);
          camera.far = Math.max(localMaxSpan * 40.0, 5000.0);
          camera.up.set(0, 0, 1);
          camera.position.set(
            localCenter.x + localMaxSpan * 1.15,
            localCenter.y - localMaxSpan * 1.05,
            localCenter.z + localMaxSpan * 1.42,
          );
          controls.target.copy(localCenter);
          camera.updateProjectionMatrix();
          controls.update();
          fitMiniMapToRawBounds(rawBounds || payload.bounds || {});
          requestRender();
        }

        function editWellTargetFocusBounds(index) {
          const wellIndex = Number(index);
          if (!Number.isInteger(wellIndex) || wellIndex < 0) {
            return null;
          }
          const well = editWells[wellIndex] || {};
          const t1 = editCurrentT1[wellIndex] || well.t1;
          const t3 = editCurrentT3[wellIndex] || well.t3;
          if (!Array.isArray(t1) || !Array.isArray(t3)) {
            return null;
          }
          const midpoint = [
            (Number(t1[0]) + Number(t3[0])) * 0.5,
            (Number(t1[1]) + Number(t3[1])) * 0.5,
            (Number(t1[2]) + Number(t3[2])) * 0.5,
          ];
          const targetLength = Math.hypot(
            Number(t3[0]) - Number(t1[0]),
            Number(t3[1]) - Number(t1[1]),
            Number(t3[2]) - Number(t1[2]),
          );
          const radius = Math.max(targetLength * 0.55, maxSpan * 0.035, 40.0);
          return {
            min: [
              midpoint[0] - radius,
              midpoint[1] - radius,
              midpoint[2] - radius,
            ],
            max: [
              midpoint[0] + radius,
              midpoint[1] + radius,
              midpoint[2] + radius,
            ],
          };
        }

            // Parse multiple segments (comma-separated)
            const segA = String(collision.segment_a || "—");
            const segB = String(collision.segment_b || "—");

            // Create badge for segment A (handle multiple segments)
            segA.split(",").forEach((s, i) => {
