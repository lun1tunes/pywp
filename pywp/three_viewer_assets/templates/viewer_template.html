              return badge;
            }

            // Parse multiple segments (comma-separated)
            const segA = String(collision.segment_a || "—");
            const segB = String(collision.segment_b || "—");

            // Create badge for segment A (handle multiple segments)
            segA.split(",").forEach((s, i) => {
              if (i > 0) {
                const plus = document.createElement("span");
                plus.style.cssText = "font-size:8px;color:#94a3b8;";
                plus.textContent = "+";
                metaRow.appendChild(plus);
              }
              metaRow.appendChild(createBadge(s.trim()));
            });

            // Arrow
            const arrow = document.createElement("span");
            arrow.className = "segment-arrow";
            arrow.textContent = "↔";
            metaRow.appendChild(arrow);

            // Create badge for segment B (handle multiple segments)
            segB.split(",").forEach((s, i) => {
              if (i > 0) {
                const plus = document.createElement("span");
                plus.style.cssText = "font-size:8px;color:#94a3b8;";
                plus.textContent = "+";
                metaRow.appendChild(plus);
              }
              metaRow.appendChild(createBadge(s.trim()));
            });

            item.appendChild(metaRow);
            item.addEventListener("click", () => {
              const hotspot = collision.hotspot;
              if (Array.isArray(hotspot) && hotspot.length >= 3) {
                const targetCenter = displayPoint(hotspot);
                const offsetDistance = Math.max(
                  Number(payload.focus_collision_distance_m || 750),
                  100,
                );
                camera.position.set(
                  targetCenter.x + offsetDistance * 0.8,
                  targetCenter.y + offsetDistance * 0.6,
                  targetCenter.z +
                    (offsetDistance * 0.4) / Math.max(worldAxisZScaleFactor(), 1.0),
                );
                controls.target.copy(targetCenter);
                camera.updateProjectionMatrix();
                controls.update();
                focusMiniMapToDisplayPoint(targetCenter, offsetDistance * 2.0);
                requestRender();
              }
            });
            body.appendChild(item);
          });
          collisionsPanelElement.appendChild(body);
          syncSelectedCollisionHighlights();
        }

        function addLine(item) {
          const segments = Array.isArray(item.segments) ? item.segments : [];
          const role = String(item.role || "line");
          const isConflictSegment = role === "conflict_segment";
          const isConeTip =
            role === "cone_tip" || role === "sidetrack_relative_cone_tip";
          addMiniMapTrajectoryOverlay(item);
          const materialOptions = {
            color: hexOrDefault(item.color, "#0f172a"),
            transparent: Number(item.opacity || 1.0) < 0.999,
            opacity:
              isConeTip
                ? Math.min(Number(item.opacity || 1.0), 0.46)
                : Number(item.opacity || 1.0),
            depthTest: !isConflictSegment,
            depthWrite: !isConeTip && !isConflictSegment,
          };
          function addPolylineTube() {
            if (
              !(role === "line" || isConflictSegment) ||
              String(item.dash || "solid") !== "solid"
            ) {
              return;
            }
            const pointCount = segments.reduce(
              (acc, segment) => acc + (Array.isArray(segment) ? segment.length : 0),
              0,
            );
            if (!isConflictSegment && (sceneComplexity > 90000 || pointCount > 2200)) {
              return;
            }
            if (isConflictSegment && pointCount > 8000) {
              return;
            }
            const baseRadius = Math.min(Math.max(maxSpan * 0.00032, 0.9), 3.2);
            const radius = isConflictSegment ? baseRadius * 1.25 : baseRadius;
            const radialSegments = 6;
            const MaterialClass = isConflictSegment
              ? THREE.MeshBasicMaterial
              : THREE.MeshLambertMaterial;
            const material = new MaterialClass({
              color: materialOptions.color,
              transparent: true,
              opacity: isConflictSegment
                ? Math.min(Number(materialOptions.opacity || 1.0), 0.96)
                : Math.min(Number(materialOptions.opacity || 1.0), 0.72),
              side: THREE.DoubleSide,
              depthWrite: false,
              depthTest: !isConflictSegment,
            });
            material.forceSinglePass = true;
            const depthMaterial = isConflictSegment
              ? null
              : new THREE.MeshBasicMaterial({
                  color: materialOptions.color,
                  side: THREE.DoubleSide,
                  depthWrite: true,
                  depthTest: true,
                  colorWrite: false,
                });
            if (depthMaterial) {
              depthMaterial.forceSinglePass = true;
            }
            if (!isConflictSegment) {
              registerEditableBaseMaterial(material, materialOptions.color, item.name);
            }
            segments.forEach((segment) => {
              if (!Array.isArray(segment) || segment.length < 2) {
                return;
              }
              const points = [];
              segment.forEach((rawPoint) => {
                const point = displayPoint(rawPoint);
                if (
                  !Number.isFinite(point.x) ||
                  !Number.isFinite(point.y) ||
                  !Number.isFinite(point.z)
                ) {
                  return;
                }
                const previous = points[points.length - 1];
                if (!previous || previous.distanceTo(point) > 1e-6) {
                  points.push(point);
                }
              });
              if (points.length < 2) {
                return;
              }
              const positions = [];
              const indices = [];
              let carriedNormal = null;
              for (let pointIndex = 0; pointIndex < points.length; pointIndex += 1) {
                const previous = points[Math.max(pointIndex - 1, 0)];
                const next = points[Math.min(pointIndex + 1, points.length - 1)];
                const tangent = new THREE.Vector3().subVectors(next, previous);
                if (tangent.lengthSq() <= 1e-12) {
                  tangent.set(0, 1, 0);
                } else {
                  tangent.normalize();
                }
                if (!carriedNormal) {
                  const seed =
                    Math.abs(tangent.z) < 0.92
                      ? new THREE.Vector3(0, 0, 1)
                      : new THREE.Vector3(0, 1, 0);
                  carriedNormal = new THREE.Vector3()
                    .crossVectors(tangent, seed)
                    .normalize();
                }
                let binormal = new THREE.Vector3()
                  .crossVectors(tangent, carriedNormal)
                  .normalize();
                if (binormal.lengthSq() <= 1e-12) {
                  binormal = new THREE.Vector3(1, 0, 0);
                }
                carriedNormal = new THREE.Vector3()
                  .crossVectors(binormal, tangent)
                  .normalize();
                for (let sideIndex = 0; sideIndex < radialSegments; sideIndex += 1) {
                  const angle = (sideIndex / radialSegments) * Math.PI * 2.0;
                  const ringPoint = points[pointIndex]
                    .clone()
                    .addScaledVector(carriedNormal, Math.cos(angle) * radius)
                    .addScaledVector(binormal, Math.sin(angle) * radius);
                  positions.push(ringPoint.x, ringPoint.y, ringPoint.z);
                }
              }
              for (let pointIndex = 0; pointIndex < points.length - 1; pointIndex += 1) {
                const ringStart = pointIndex * radialSegments;
                const nextRingStart = (pointIndex + 1) * radialSegments;
                for (let sideIndex = 0; sideIndex < radialSegments; sideIndex += 1) {
                  const nextSideIndex = (sideIndex + 1) % radialSegments;
                  indices.push(
                    ringStart + sideIndex,
                    nextRingStart + sideIndex,
                    nextRingStart + nextSideIndex,
                    ringStart + sideIndex,
                    nextRingStart + nextSideIndex,
                    ringStart + nextSideIndex,
                  );
                }
              }
              const geometry = new THREE.BufferGeometry();
              geometry.setAttribute(
                "position",
                new THREE.Float32BufferAttribute(new Float32Array(positions), 3),
              );
              geometry.setIndex(new THREE.BufferAttribute(new Uint32Array(indices), 1));
              geometry.computeVertexNormals();
              if (!isConflictSegment) {
                const depthMesh = new THREE.Mesh(geometry, depthMaterial);
                depthMesh.renderOrder = -1;
                scene.add(depthMesh);
              }
              const mesh = new THREE.Mesh(geometry, material);
              mesh.renderOrder = isConflictSegment ? 8 : 0;
              registerAntiCollisionVisualObject(mesh, item);
              scene.add(mesh);
            });
          }
          if (String(item.dash || "solid") !== "solid") {
            const dashPattern = lineDashPattern(item);
            segments.forEach((segment) => {
              if (!Array.isArray(segment) || segment.length < 2) {
                return;
              }
              const points = segment.map(displayPoint);
              const geometry = new THREE.BufferGeometry().setFromPoints(points);
              const material = new THREE.LineDashedMaterial({
                ...materialOptions,
                dashSize: dashPattern.dashSize,
                gapSize: dashPattern.gapSize,
              });
              registerEditableBaseMaterial(material, materialOptions.color, item.name);
              const line = new THREE.Line(geometry, material);
              line.computeLineDistances();
              registerAntiCollisionVisualObject(line, item);
              if (role === "cone_tip") {
                registerMiniMapHiddenContourObject(line);
              }
              scene.add(line);
            });
            return;
          }
          const positions = [];
          segments.forEach((segment) => {
            if (!Array.isArray(segment) || segment.length < 2) {
              return;
            }
            for (let index = 1; index < segment.length; index += 1) {
              const previousPoint = displayPoint(segment[index - 1]);
              const currentPoint = displayPoint(segment[index]);
              positions.push(
                previousPoint.x,
                previousPoint.y,
                previousPoint.z,
                currentPoint.x,
                currentPoint.y,
                currentPoint.z,
              );
            }
          });
          if (positions.length === 0) {
            return;
          }
          const geometry = new THREE.BufferGeometry();
          geometry.setAttribute(
            "position",
            new THREE.Float32BufferAttribute(positions, 3),
          );
          const material = new THREE.LineBasicMaterial(materialOptions);
          registerEditableBaseMaterial(material, materialOptions.color, item.name);
          const lineSegments = new THREE.LineSegments(geometry, material);
          lineSegments.renderOrder = isConflictSegment ? 9 : 0;
          registerAntiCollisionVisualObject(lineSegments, item);
          if (role === "cone_tip") {
            registerMiniMapHiddenContourObject(lineSegments);
          }
          addPolylineTube();
          scene.add(lineSegments);
        }

        function lineDashPattern(item) {
          const dashKind = String((item && item.dash) || "solid").toLowerCase();
          if (dashKind === "dot") {
            return {
              dashSize: Math.max(maxSpan * 0.004, 5.0),
              gapSize: Math.max(maxSpan * 0.003, 3.0),
            };
          }
          return {
            dashSize: Math.max(maxSpan * 0.006, 6.0),
            gapSize: Math.max(maxSpan * 0.0012, 1.6),
          };
        }

        function resampledRingPoint(ring, sampleIndex, sampleCount) {
          const count = Array.isArray(ring) ? ring.length : 0;
          if (count <= 0) {
            return new THREE.Vector3();
          }
          if (count === sampleCount) {
            return ring[sampleIndex].clone();
          }
          const position = (sampleIndex / sampleCount) * count;
          const leftIndex = Math.floor(position) % count;
          const rightIndex = (leftIndex + 1) % count;
          const fraction = position - Math.floor(position);
          return ring[leftIndex].clone().lerp(ring[rightIndex], fraction);
        }

        function addOverlapVolumeMesh(item) {
          const rawRings = Array.isArray(item.rings) ? item.rings : [];
          const rings = rawRings
            .map((ring) =>
              (Array.isArray(ring) ? ring : [])
                .map(displayPoint)
                .filter(
                  (point) =>
                    Number.isFinite(point.x) &&
                    Number.isFinite(point.y) &&
                    Number.isFinite(point.z),
                ),
            )
            .filter((ring) => ring.length >= 3);
          if (rings.length < 2) {
            return;
          }
          const ringSize = Math.max(
            8,
            ...rings.map((ring) => ring.length),
          );
          const positions = [];
          rings.forEach((ring) => {
            for (let pointIndex = 0; pointIndex < ringSize; pointIndex += 1) {
              const point = resampledRingPoint(ring, pointIndex, ringSize);
              positions.push(point.x, point.y, point.z);
            }
          });

          const indices = [];
          for (let ringIndex = 0; ringIndex < rings.length - 1; ringIndex += 1) {
            const currentStart = ringIndex * ringSize;
            const nextStart = (ringIndex + 1) * ringSize;
            for (let pointIndex = 0; pointIndex < ringSize; pointIndex += 1) {
              const nextPointIndex = (pointIndex + 1) % ringSize;
              const a = currentStart + pointIndex;
              const b = currentStart + nextPointIndex;
              const c = nextStart + pointIndex;
              const d = nextStart + nextPointIndex;
              indices.push(a, c, b, b, c, d);
            }
          }

          const firstCenterIndex = positions.length / 3;
          const firstCenter = new THREE.Vector3();
          for (let pointIndex = 0; pointIndex < ringSize; pointIndex += 1) {
            firstCenter.add(resampledRingPoint(rings[0], pointIndex, ringSize));
          }
          firstCenter.multiplyScalar(1 / ringSize);
          positions.push(firstCenter.x, firstCenter.y, firstCenter.z);

          const lastCenterIndex = positions.length / 3;
          const lastRing = rings[rings.length - 1];
          const lastCenter = new THREE.Vector3();
          for (let pointIndex = 0; pointIndex < ringSize; pointIndex += 1) {
            lastCenter.add(resampledRingPoint(lastRing, pointIndex, ringSize));
          }
          lastCenter.multiplyScalar(1 / ringSize);
          positions.push(lastCenter.x, lastCenter.y, lastCenter.z);

          const lastStart = (rings.length - 1) * ringSize;
          for (let pointIndex = 0; pointIndex < ringSize; pointIndex += 1) {
            const nextPointIndex = (pointIndex + 1) % ringSize;
            indices.push(
              firstCenterIndex,
              nextPointIndex,
              pointIndex,
              lastCenterIndex,
              lastStart + pointIndex,
              lastStart + nextPointIndex,
            );
          }

          const geometry = new THREE.BufferGeometry();
          geometry.setAttribute(
            "position",
            new THREE.Float32BufferAttribute(positions, 3),
          );
          geometry.setIndex(indices);
          geometry.computeVertexNormals();
          const opacity = Math.min(numberOrDefault(item.opacity, 0.34), 0.44);
          const material = new THREE.MeshLambertMaterial({
            color: hexOrDefault(item.color, "#c62828"),
            transparent: true,
            opacity,
            side: THREE.DoubleSide,
            depthWrite: false,
            depthTest: true,
          });
          material.forceSinglePass = true;
          const mesh = new THREE.Mesh(geometry, material);
          mesh.renderOrder = 4;
          registerAntiCollisionVisualObject(mesh, item);
          scene.add(mesh);
        }

        function addMesh(item) {
          const role = String(item.role || "mesh");
          if (role === "overlap_volume") {
            addOverlapVolumeMesh(item);
            return;
          }
          const geometry = meshGeometryFromPayloadItem(item);
          if (!geometry) {
            return;
          }
          const baseColor = hexOrDefault(item.color, "#94a3b8");
          const opacity = numberOrDefault(item.opacity, 0.25);
          const isConeSurface =
            role === "cone" || role === "sidetrack_relative_cone";
          const isShadedSurface =
            isConeSurface || role === "overlap" || role === "pad_first_surface_arrow";
          const MaterialClass = isShadedSurface
            ? THREE.MeshLambertMaterial
            : THREE.MeshBasicMaterial;
          const material = new MaterialClass({
            color: baseColor,
            transparent: true,
            opacity:
              isConeSurface
                ? Math.min(opacity, 0.10)
                : opacity,
            side: isConeSurface ? THREE.FrontSide : THREE.DoubleSide,
            depthWrite: false,
            depthTest: true,
            polygonOffset: isConeSurface,
            polygonOffsetFactor: isConeSurface ? 1.0 : 0.0,
            polygonOffsetUnits: isConeSurface ? 1.0 : 0.0,
          });
          material.forceSinglePass = true;
          const mesh = new THREE.Mesh(geometry, material);
          mesh.renderOrder = role === "overlap" ? 4 : isConeSurface ? 1 : 2;
          if (role === "overlap") {
            material.opacity = Math.min(opacity, 0.42);
          }
          if (isConeSurface) {
            addMiniMapConeOverlay(item, geometry);
          }
          if (isConeSurface) {
            const wireGeometry = new THREE.WireframeGeometry(geometry);
            const wireMaterial = new THREE.LineBasicMaterial({
              color: baseColor,
              transparent: true,
              opacity: 0.07,
              depthWrite: false,
              depthTest: true,
            });
            const wireframe = new THREE.LineSegments(wireGeometry, wireMaterial);
            wireframe.renderOrder = mesh.renderOrder + 0.05;
            registerMiniMapHiddenContourObject(wireframe);
            mesh.add(wireframe);
          }
          registerAntiCollisionVisualObject(mesh, item);
          scene.add(mesh);
        }

        function addVisibleCrossMarker(point, item) {
          const centerPoint = displayPoint(point);
          const half = Math.max(
            worldMarkerSize * Number(item.size || 6) / 16.0,
            4.0,
          );
          const positions = [
            centerPoint.x - half, centerPoint.y, centerPoint.z,
            centerPoint.x + half, centerPoint.y, centerPoint.z,
            centerPoint.x, centerPoint.y - half, centerPoint.z,
            centerPoint.x, centerPoint.y + half, centerPoint.z,
            centerPoint.x, centerPoint.y, centerPoint.z - half,
            centerPoint.x, centerPoint.y, centerPoint.z + half,
          ];
          const geometry = new THREE.BufferGeometry();
          geometry.setAttribute(
            "position",
            new THREE.Float32BufferAttribute(positions, 3),
          );
          const material = new THREE.LineBasicMaterial({
            color: hexOrDefault(item.color, "#0f172a"),
            transparent: Number(item.opacity || 1.0) < 0.999,
            opacity: Number(item.opacity || 1.0),
          });
          registerEditableBaseMaterial(
            material,
            hexOrDefault(item.color, "#0f172a"),
            item.name,
          );
          scene.add(
            new THREE.LineSegments(
              geometry,
              material,
            ),
          );
        }

        function addHoverSphere(point, item, hoverData) {
          const markerScale = Math.max(
            worldMarkerSize * Number(item.size || 6) / 8.0,
            5.0,
          );
          const mesh = new THREE.Mesh(hoverSphereGeometry, hoverSphereMaterial);
          mesh.scale.setScalar(markerScale * 0.52);
          mesh.position.copy(displayPoint(point));
          mesh.userData.lockViewerZGeometryScale = true;
          mesh.userData.hover = Object.assign(
            {
              color: hexOrDefault(item.color, "#64748b"),
            },
            hoverData || {},
          );
          hoverTargets.push(mesh);
          registerAntiCollisionVisualObject(mesh, item);
          scene.add(mesh);
        }

        function addHoverPointCloud(points, item, hoverItems) {
          const positions = [];
          const itemHoverData = [];
          const defaultHoverColor = hexOrDefault(item.color, "#64748b");
          points.forEach((point, index) => {
            const vector = displayPoint(point);
            if (
              Number.isFinite(vector.x) &&
              Number.isFinite(vector.y) &&
              Number.isFinite(vector.z)
            ) {
              positions.push(vector.x, vector.y, vector.z);
              const hoverItem = hoverItems[index] || {};
              itemHoverData.push(
                Object.assign(
                  { color: defaultHoverColor },
                  hoverItem && typeof hoverItem === "object" ? hoverItem : {},
                ),
              );
            }
          });
          if (!positions.length) {
            return;
          }
          const markerScale = Math.max(
            worldMarkerSize * Number(item.size || 6) / 8.0,
            5.0,
          );
          const geometry = new THREE.BufferGeometry();
          geometry.setAttribute(
            "position",
            new THREE.Float32BufferAttribute(positions, 3),
          );
          const material = new THREE.PointsMaterial({
            color: hexOrDefault(item.color, "#64748b"),
            transparent: true,
            opacity: 0.0,
            size: markerScale,
            sizeAttenuation: true,
            depthWrite: false,
            depthTest: false,
          });
          material.colorWrite = false;
          const pointCloud = new THREE.Points(geometry, material);
          pointCloud.userData.hover = { color: defaultHoverColor };
          pointCloud.userData.hoverItems = itemHoverData;
          hoverTargets.push(pointCloud);
          registerAntiCollisionVisualObject(pointCloud, item);
          scene.add(pointCloud);
        }

        function miniMapTrajectoryOverlayWidth() {
          return Math.min(Math.max(maxSpan * 0.0032, 7.0), 24.0);
        }

        function miniMapOverlayEligibleLine(item) {
          const role = String((item && item.role) || "line");
          return role === "line" || role === "conflict_segment";
        }

        function miniMapStripGeometryForSegment(segment, widthM) {
          const positions = [];
          const indices = [];
          let vertexIndex = 0;
          if (!Array.isArray(segment) || segment.length < 2) {
            return null;
          }
          for (let index = 1; index < segment.length; index += 1) {
            const start = displayPoint(segment[index - 1]);
            const end = displayPoint(segment[index]);
            if (
              !Number.isFinite(start.x) ||
              !Number.isFinite(start.y) ||
              !Number.isFinite(end.x) ||
              !Number.isFinite(end.y)
            ) {
              continue;
            }
            const dx = end.x - start.x;
            const dy = end.y - start.y;
            const length = Math.hypot(dx, dy);
            if (length <= 1e-6) {
              continue;
            }
            const nx = (-dy / length) * widthM * 0.5;
            const ny = (dx / length) * widthM * 0.5;
            positions.push(
              start.x - nx, start.y - ny, start.z,
              start.x + nx, start.y + ny, start.z,
              end.x - nx, end.y - ny, end.z,
              end.x + nx, end.y + ny, end.z,
            );
            indices.push(
              vertexIndex,
              vertexIndex + 2,
              vertexIndex + 1,
              vertexIndex + 1,
              vertexIndex + 2,
              vertexIndex + 3,
            );
            vertexIndex += 4;
          }
          if (positions.length === 0) {
            return null;
          }
          const geometry = new THREE.BufferGeometry();
          geometry.setAttribute(
            "position",
            new THREE.Float32BufferAttribute(new Float32Array(positions), 3),
          );
          geometry.setIndex(indices);
          return geometry;
        }

        function addMiniMapTrajectoryOverlay(item) {
          if (!miniMapOverlayBuilt) {
            return;
          }
          if (!miniMapOverlayEligibleLine(item)) {
            return;
          }
          const isConflictSegment =
            String((item && item.role) || "") === "conflict_segment";
          const segments = Array.isArray(item.segments) ? item.segments : [];
          const opacity = isConflictSegment
            ? 1.0
            : Math.min(Math.max(Number(item.opacity || 1.0), 0.42), 0.95);
          const dashKind = String((item && item.dash) || "solid").toLowerCase();
          const dashed = dashKind !== "solid";
          const dashPattern = dashed ? lineDashPattern(item) : null;
          if (dashed) {
            segments.forEach((segment) => {
              if (!Array.isArray(segment) || segment.length < 2) {
                return;
              }
              const points = segment.map(displayPoint);
              const geometry = new THREE.BufferGeometry().setFromPoints(points);
              const material = new THREE.LineDashedMaterial({
                color: hexOrDefault(item.color, "#0f172a"),
                transparent: true,
                opacity: opacity,
                depthTest: false,
                depthWrite: false,
                dashSize: dashPattern.dashSize,
                gapSize: dashPattern.gapSize,
              });
              const line = new THREE.Line(geometry, material);
              line.computeLineDistances();
              if (isConflictSegment) {
                line.renderOrder = 12;
                registerAntiCollisionVisualObject(line, item);
              }
              miniMapOverlayScene.add(line);
            });
            return;
          }
          const material = new THREE.MeshBasicMaterial({
            color: hexOrDefault(item.color, "#0f172a"),
            transparent: true,
            opacity: opacity,
            side: THREE.DoubleSide,
            depthTest: false,
            depthWrite: false,
          });
          const widthM = isConflictSegment
            ? miniMapTrajectoryOverlayWidth() * 1.2
            : miniMapTrajectoryOverlayWidth();
          segments.forEach((segment) => {
            const geometry = miniMapStripGeometryForSegment(segment, widthM);
            if (!geometry) {
              return;
            }
            const mesh = new THREE.Mesh(geometry, material);
            if (isConflictSegment) {
              mesh.renderOrder = 12;
              registerAntiCollisionVisualObject(mesh, item);
            }
            miniMapOverlayScene.add(mesh);
          });
        }

        function addMiniMapConeOverlay(item, sourceGeometry) {
          if (!miniMapOverlayBuilt) {
            return;
          }
          if (String((item && item.role) || "") !== "cone" || !sourceGeometry) {
            return;
          }
          const geometry = sourceGeometry.clone();
          const material = new THREE.MeshBasicMaterial({
            color: hexOrDefault(item.color, "#94a3b8"),
            transparent: true,
            opacity: Math.min(
              Math.max(numberOrDefault(item.opacity, 0.18), 0.12),
              0.22,
            ),
            side: THREE.DoubleSide,
            depthTest: false,
            depthWrite: false,
          });
          material.forceSinglePass = true;
          const mesh = new THREE.Mesh(geometry, material);
          mesh.renderOrder = -10;
          registerAntiCollisionVisualObject(mesh, item);
          miniMapOverlayScene.add(mesh);
        }

        function addMarkers(item) {
          const points = Array.isArray(item.points) ? item.points : [];
          if (points.length === 0) {
            return;
          }
          const hoverItems = Array.isArray(item.hover) ? item.hover : [];
          const hoverOnly = Boolean(item.hover_only);
          const symbol = String(item.symbol || "circle");
          if (hoverOnly) {
            addHoverPointCloud(points, item, hoverItems);
            return;
          }
          addMiniMapMarkerOverlay(item);
          if (symbol === "cross") {
            points.forEach((point, index) => {
              addVisibleCrossMarker(point, item);
              if (hoverItems[index]) {
                addHoverSphere(point, item, hoverItems[index]);
              }
            });
            return;
          }
          const markerSize = Math.max(
            Number(item.size || 6) * 1.85,
            7.0,
          );
          const positions = [];
          points.forEach((point) => {
            const vector = displayPoint(point);
            positions.push(vector.x, vector.y, vector.z);
          });
          const geometry = new THREE.BufferGeometry();
          geometry.setAttribute(
            "position",
            new THREE.Float32BufferAttribute(positions, 3),
          );
          const material = new THREE.PointsMaterial({
            color: hexOrDefault(item.color, "#0f172a"),
            transparent: Number(item.opacity || 1.0) < 0.999,
            opacity: Number(item.opacity || 1.0),
            size: markerSize,
            sizeAttenuation: false,
            map: ensureCircleMarkerTexture(),
            alphaTest: 0.35,
            depthWrite: Number(item.opacity || 1.0) >= 0.999,
          });
          registerEditableBaseMaterial(
            material,
            hexOrDefault(item.color, "#0f172a"),
            item.name,
          );
          scene.add(new THREE.Points(geometry, material));
          points.forEach((point, index) => {
            if (hoverItems[index]) {
              addHoverSphere(point, item, hoverItems[index]);
            }
          });
        }

        function addMiniMapMarkerOverlay(item) {
          if (!miniMapOverlayBuilt) {
            return;
          }
          if (String(item.role || "") !== "marker") {
            return;
          }
          const points = Array.isArray(item.points) ? item.points : [];
          if (!points.length) {
            return;
          }
          const markerSize = Math.max(Number(item.size || 6) * 2.35, 10.0);
          const positions = [];
          points.forEach((point) => {
            const vector = displayPoint(point);
            if (
              Number.isFinite(vector.x) &&
              Number.isFinite(vector.y) &&
              Number.isFinite(vector.z)
            ) {
              positions.push(vector.x, vector.y, vector.z);
            }
          });
          if (!positions.length) {
            return;
          }
          const geometry = new THREE.BufferGeometry();
          geometry.setAttribute(
            "position",
            new THREE.Float32BufferAttribute(positions, 3),
          );
          const material = new THREE.PointsMaterial({
            color: hexOrDefault(item.color, "#0f172a"),
            transparent: true,
            opacity: 1.0,
            size: markerSize,
            sizeAttenuation: false,
            map: ensureCircleMarkerTexture(),
            alphaTest: 0.35,
            depthTest: false,
            depthWrite: false,
          });
          miniMapOverlayScene.add(new THREE.Points(geometry, material));
        }

        function meshGeometryFromPayloadItem(item) {
          const vertices = Array.isArray(item && item.vertices) ? item.vertices : [];
          const faces = Array.isArray(item && item.faces) ? item.faces : [];
          if (vertices.length === 0 || faces.length === 0) {
            return null;
          }
          const positions = new Float32Array(vertices.length * 3);
          vertices.forEach((vertex, index) => {
            const [xValue, yValue, zValue] = displayXYZ(vertex[0], vertex[1], vertex[2]);
            positions[index * 3 + 0] = xValue;
            positions[index * 3 + 1] = yValue;
            positions[index * 3 + 2] = zValue;
          });
          const indices = new Uint32Array(faces.length * 3);
          faces.forEach((face, index) => {
            indices[index * 3 + 0] = Number(face[0] || 0);
            indices[index * 3 + 1] = Number(face[1] || 0);
            indices[index * 3 + 2] = Number(face[2] || 0);
          });
          const geometry = new THREE.BufferGeometry();
          geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
          geometry.setIndex(new THREE.BufferAttribute(indices, 1));
          geometry.computeVertexNormals();
          return geometry;
        }

        function buildMiniMapOverlaysFromPayload() {
          if (miniMapOverlayBuilt) {
            return;
          }
          miniMapOverlayBuilt = true;
          (payload.lines || []).forEach((item) => addMiniMapTrajectoryOverlay(item));
          (payload.points || []).forEach((item) => addMiniMapMarkerOverlay(item));
          (payload.meshes || []).forEach((item) => {
            const role = String((item && item.role) || "");
            if (role !== "cone" && role !== "sidetrack_relative_cone") {
              return;
            }
            const geometry = meshGeometryFromPayloadItem(item);
            if (geometry) {
              addMiniMapConeOverlay(item, geometry);
            }
          });
        }

        function addLabel(item) {
          const role = String(item.role || "label");
          const position = displayPoint(item.position || [0, 0, 0]);
          const offsetY =
            role === "well_label" ||
            role === "pilot_point_label" ||
            role === "reference_label" ||
            role === "reference_label_optional"
              ? 14
              : role === "reference_pad_label"
              ? 12
              : role === "target_label" || role === "control_point_label"
              ? 10
              : 0;
          addSceneLabel(
            String(item.text || ""),
            position,
            String(item.color || "#0f172a"),
            "",
            { offsetY: offsetY, role: role },
          );
        }

        function escapeHtml(value) {
          return String(value || "")
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll("\"", "&quot;");
        }

        function formatTooltip(hover) {
          const lines = [];
          const swatchColor = hexOrDefault(hover.color, "#64748b");
          if (typeof hover.name === "string" && hover.name.trim() !== "") {
            lines.push(
              '<div class="tooltip-head">' +
                `<div class="tooltip-swatch" style="background:${swatchColor}"></div>` +
                `<div class="tooltip-title">${escapeHtml(hover.name)}</div>` +
              "</div>",
            );
          }
          if (typeof hover.point === "string" && hover.point.trim() !== "") {
            lines.push(
              `<div class="tooltip-kv"><strong>Точка:</strong> ${escapeHtml(hover.point)}</div>`,
            );
          }
          if (typeof hover.segment === "string" && hover.segment.trim() !== "") {
            lines.push(
              `<div class="tooltip-kv"><strong>Сегмент:</strong> ${escapeHtml(hover.segment)}</div>`,
            );
          }
          if (Number.isFinite(hover.x)) {
            lines.push(
              `<div class="tooltip-kv"><strong>X:</strong> <span class="tooltip-mono">${Number(hover.x).toFixed(2)} м</span></div>`,
            );
          }
          if (Number.isFinite(hover.y)) {
            lines.push(
              `<div class="tooltip-kv"><strong>Y:</strong> <span class="tooltip-mono">${Number(hover.y).toFixed(2)} м</span></div>`,
            );
          }
          if (Number.isFinite(hover.z)) {
            lines.push(
              `<div class="tooltip-kv"><strong>Z:</strong> <span class="tooltip-mono">${Number(hover.z).toFixed(2)} м</span></div>`,
            );
          }
          if (Number.isFinite(hover.md)) {
            lines.push(
              `<div class="tooltip-kv"><strong>MD:</strong> <span class="tooltip-mono">${Number(hover.md).toFixed(1)} м</span></div>`,
            );
          }
          if (Number.isFinite(hover.dls)) {
            lines.push(
              `<div class="tooltip-kv"><strong>DLS:</strong> <span class="tooltip-mono">${Number(hover.dls).toFixed(2)} deg/30м</span></div>`,
            );
          }
          if (Number.isFinite(hover.inc)) {
            lines.push(
              `<div class="tooltip-kv"><strong>INC:</strong> <span class="tooltip-mono">${Number(hover.inc).toFixed(2)} deg</span></div>`,
            );
          }
          return lines.join("");
        }

        const raycaster = new THREE.Raycaster();
        raycaster.params.Points.threshold = Math.max(worldMarkerSize * 0.55, 3.0);
        const pointer = new THREE.Vector2();

        function hideTooltip() {
          tooltipElement.style.display = "none";
        }

        function editHandleHoverData(handle) {
          if (!handle) {
            return {};
          }
          const well = editWells[handle.wellIndex] || {};
          const point = Array.isArray(handle.dataPos) ? handle.dataPos : [];
          const hover = {
            name: String(well.name || ""),
            point: String(handle.pointType || ""),
            color: hexOrDefault(well.color, "#2563eb"),
          };
          if (Number.isFinite(point[0])) {
            hover.x = Number(point[0]);
          }
          if (Number.isFinite(point[1])) {
            hover.y = Number(point[1]);
          }
          if (Number.isFinite(point[2])) {
            hover.z = Number(point[2]);
          }
          return hover;
        }

        function updateTooltip(event) {
          if (interactionActive || !pointerScreen.inside || hoverTargets.length === 0) {
            hideTooltip();
            return;
          }
          const rect = renderer.domElement.getBoundingClientRect();
          pointer.x = ((pointerScreen.x - rect.left) / rect.width) * 2 - 1;
          pointer.y = -((pointerScreen.y - rect.top) / rect.height) * 2 + 1;
          raycaster.setFromCamera(pointer, camera);
          const visibleHoverTargets = hoverTargets.filter(
            (target) => target && target.visible !== false,
          );
          const intersections = raycaster.intersectObjects(visibleHoverTargets, false);
          if (!intersections.length) {
            hideTooltip();
            return;
          }
          const hoverObject = intersections[0].object;
          const editHandleIndex = Number(hoverObject.userData.editHandleIndex);
          const indexedHoverItems = Array.isArray(hoverObject.userData.hoverItems)
            ? hoverObject.userData.hoverItems
            : null;
          const hoverData =
            Number.isInteger(editHandleIndex) && editHandleIndex >= 0
              ? editHandleHoverData(editHandles[editHandleIndex])
              : Object.assign(
                  {},
                  indexedHoverItems && Number.isInteger(intersections[0].index)
                    ? indexedHoverItems[intersections[0].index] || {}
                    : hoverObject.userData.hover || {},
                );
          hoverData.color = hexOrDefault(hoverData.color, "#64748b");
          const html = formatTooltip(hoverData);
          if (!html) {
            hideTooltip();
            return;
          }
          tooltipElement.innerHTML = html;
          tooltipElement.style.display = "block";
          const offsetX = 14;
          const offsetY = 12;
          const rootRect = root.getBoundingClientRect();
          const tooltipRect = tooltipElement.getBoundingClientRect();
          const left = Math.min(
            Math.max(pointerScreen.x - rootRect.left + offsetX, 10),
            Math.max(rootRect.width - tooltipRect.width - 10, 10),
          );
          const top = Math.min(
            Math.max(pointerScreen.y - rootRect.top + offsetY, 10),
            Math.max(rootRect.height - tooltipRect.height - 10, 10),
          );
          tooltipElement.style.left = `${left}px`;
          tooltipElement.style.top = `${top}px`;
        }

        function render() {
          const canvasWidth = Math.max(renderer.domElement.clientWidth || 1, 1);
          const canvasHeight = Math.max(renderer.domElement.clientHeight || 1, 1);
          updateHandleScales();
          updateWorldAxisOverlay();
          renderer.setViewport(0, 0, canvasWidth, canvasHeight);
          renderer.setScissorTest(false);
          renderer.clear(true, true, true);
          renderer.render(scene, camera);
          if (miniMapState.expanded) {
            buildMiniMapOverlaysFromPayload();
            const miniMapRect = miniMapCanvasRect();
            miniMapState.rect = miniMapRect;
            updateMiniMapCamera(miniMapRect);
            renderer.setViewport(
              miniMapRect.x,
              miniMapRect.y,
              miniMapRect.width,
              miniMapRect.height,
            );
            renderer.setScissor(
              miniMapRect.x,
              miniMapRect.y,
              miniMapRect.width,
              miniMapRect.height,
            );
            renderer.setScissorTest(true);
            renderer.clear(true, true, true);
            renderMiniMapScene();
            renderer.setScissorTest(false);
            renderer.setViewport(0, 0, canvasWidth, canvasHeight);
          }
          updateAxesGizmo();
          updateLabels();
          updateMiniMapLabels();
          updateMiniMapRulerOverlay();
          updateTooltip();
        }

        function updateLabels() {
          const canvasRect = renderer.domElement.getBoundingClientRect();
          const labelRect = labelLayerElement.getBoundingClientRect();
          const width = Math.max(canvasRect.width || 1, 1);
          const height = Math.max(canvasRect.height || 1, 1);
          const offsetLeft = canvasRect.left - labelRect.left;
          const offsetTop = canvasRect.top - labelRect.top;
          sceneLabels.forEach((item) => {
            if (item.visible === false) {
              item.element.style.display = "none";
              return;
            }
            const projected = item.position.clone().project(camera);
            if (
              projected.z < -1.0 ||
              projected.z > 1.0 ||
              projected.x < -1.25 ||
              projected.x > 1.25 ||
              projected.y < -1.25 ||
              projected.y > 1.25
            ) {
              item.element.style.display = "none";
              return;
            }
            const screenX =
              offsetLeft + (((projected.x + 1.0) * 0.5) * width) + item.offsetX;
            const screenY =
              offsetTop + (((-projected.y + 1.0) * 0.5) * height) - item.offsetY;
            if (miniMapState.expanded) {
              const miniMapRect = miniMapCanvasRect();
              const miniMapTop = offsetTop + miniMapRect.canvasHeight - miniMapRect.y - miniMapRect.height;
              const miniMapLeft = offsetLeft + miniMapRect.x;
              if (
                screenX >= miniMapLeft &&
                screenX <= miniMapLeft + miniMapRect.width &&
                screenY >= miniMapTop &&
                screenY <= miniMapTop + miniMapRect.height
              ) {
                item.element.style.display = "none";
                return;
              }
            }
            item.element.style.display = "block";
            item.element.style.left = `${Math.round(screenX)}px`;
            item.element.style.top = `${Math.round(screenY)}px`;
          });
          updateWorldAxisDragHandlePosition(
            canvasRect,
            labelRect,
            width,
            height,
            offsetLeft,
            offsetTop,
          );
        }

        function consumeMiniMapEvent(event) {
          event.preventDefault();
          event.stopPropagation();
          if (typeof event.stopImmediatePropagation === "function") {
            event.stopImmediatePropagation();
          }
        }

        function handleMiniMapResizePointerDown(event) {
          if (!miniMapState.expanded) {
            return;
          }
          miniMapState.resizing = true;
          miniMapState.resizeMoved = false;
          miniMapState.pointerStart = {
            x: Number(event.clientX || 0),
            y: Number(event.clientY || 0),
          };
          miniMapState.resizeStartRect = miniMapCanvasRect();
          miniMapState.resizeStartWorldPerPixel = miniMapWorldPerPixel();
          controls.enabled = false;
          interactionActive = true;
          hideTooltip();
          try {
            miniMapToggleBtn.setPointerCapture(event.pointerId);
          } catch (e) { /* ignore */ }
          consumeMiniMapEvent(event);
        }

        function handleMiniMapResizePointerMove(event) {
          if (!miniMapState.resizing || !miniMapState.resizeStartRect) {
            return;
          }
          const dx = Number(event.clientX || 0) - miniMapState.pointerStart.x;
          const dy = Number(event.clientY || 0) - miniMapState.pointerStart.y;
          if (Math.hypot(dx, dy) > 3.0) {
            miniMapState.resizeMoved = true;
          }
          miniMapState.customSize = resizedMiniMapSize(
            miniMapState.resizeStartRect,
            event,
          );
          const nextRect = miniMapCanvasRect();
          miniMapState.rect = nextRect;
          syncMiniMapResizeZoom(nextRect);
          updateMiniMapOverlay();
          requestRender();
          consumeMiniMapEvent(event);
        }

        function handleMiniMapResizePointerUp(event) {
          if (!miniMapState.resizing) {
            return;
          }
          miniMapState.resizing = false;
          miniMapState.resizeStartRect = null;
          controls.enabled = true;
          interactionActive = false;
          try {
            miniMapToggleBtn.releasePointerCapture(event.pointerId);
          } catch (e) { /* ignore */ }
          requestRender();
          consumeMiniMapEvent(event);
        }

        function handleMiniMapPointerDown(event) {
          if (miniMapState.resizing) {
            return;
          }
          if (!isPointerInMiniMap(event)) {
            return;
          }
          const forcePan = Number(event.button || 0) === 2;
          if (!forcePan && miniMapRulerState.enabled) {
            hideTooltip();
            consumeMiniMapEvent(event);
            return;
          }
          if (!forcePan && startMiniMapEditDrag(event)) {
            consumeMiniMapEvent(event);
            return;
          }
          miniMapState.dragging = true;
          miniMapState.pointerStart = {
            x: Number(event.clientX || 0),
            y: Number(event.clientY || 0),
          };
          miniMapState.targetStart.copy(miniMapState.target);
          controls.enabled = false;
          interactionActive = true;
          hideTooltip();
          try {
            renderer.domElement.setPointerCapture(event.pointerId);
          } catch (e) { /* ignore */ }
          consumeMiniMapEvent(event);
        }

        function handleMiniMapPointerMove(event) {
          if (editDragInputMode === "minimap") {
            return;
          }
          if (miniMapState.resizing) {
            return;
          }
          if (miniMapState.dragging) {
            const worldPerPixel = miniMapWorldPerPixel();
            const dx = Number(event.clientX || 0) - miniMapState.pointerStart.x;
            const dy = Number(event.clientY || 0) - miniMapState.pointerStart.y;
            miniMapState.target.set(
              miniMapState.targetStart.x - dx * worldPerPixel,
              miniMapState.targetStart.y + dy * worldPerPixel,
              miniMapState.targetStart.z,
            );
            requestRender();
            consumeMiniMapEvent(event);
            return;
          }
          if (miniMapRulerState.enabled) {
            if (
              miniMapRulerState.phase === "measuring" &&
              isPointerInMiniMap(event)
            ) {
              miniMapRulerState.previewRaw = miniMapRulerRawPointAtEvent(event);
              requestRender();
            }
            if (isPointerInMiniMap(event)) {
              hideTooltip();
              consumeMiniMapEvent(event);
            }
            return;
          }
          if (!isPointerInMiniMap(event)) {
            return;
          }
          hideTooltip();
          consumeMiniMapEvent(event);
        }

        function handleMiniMapPointerUp(event) {
          if (editDragInputMode === "minimap") {
            return;
          }
          if (miniMapState.dragging) {
            miniMapState.dragging = false;
            controls.enabled = true;
            interactionActive = false;
            try {
              renderer.domElement.releasePointerCapture(event.pointerId);
            } catch (e) { /* ignore */ }
            requestRender();
            consumeMiniMapEvent(event);
            return;
          }
          if (
            miniMapRulerState.enabled &&
            Number(event.button || 0) !== 2 &&
            isPointerInMiniMap(event)
          ) {
            handleMiniMapRulerClick(event);
          }
        }

        function handleMiniMapWheel(event) {
          if (!isPointerInMiniMap(event)) {
            return;
          }
          const before = miniMapWorldAtEvent(event);
          const zoomFactor = Number(event.deltaY || 0) > 0 ? 0.88 : 1.14;
          miniMapState.zoom = clampValue(
            miniMapState.zoom * zoomFactor,
            0.25,
            12.0,
          );
          const after = miniMapWorldAtEvent(event);
          miniMapState.target.add(before.sub(after));
          updateMiniMapOverlay();
          requestRender();
          consumeMiniMapEvent(event);
        }

        function handleMiniMapRulerClick(event) {
          if (
            !miniMapRulerState.enabled ||
            miniMapState.resizing ||
            !isPointerInMiniMap(event)
          ) {
            return;
          }
          const rawPoint = miniMapRulerRawPointAtEvent(event);
          if (
            miniMapRulerState.phase === "idle" ||
            miniMapRulerState.phase === "fixed"
          ) {
            miniMapRulerState.phase = "measuring";
            miniMapRulerState.startRaw = rawPoint;
            miniMapRulerState.endRaw = null;
            miniMapRulerState.previewRaw = rawPoint;
          } else {
            miniMapRulerState.phase = "fixed";
            miniMapRulerState.previewRaw = rawPoint;
            miniMapRulerState.endRaw = rawPoint;
          }
          hideTooltip();
          requestRender();
          consumeMiniMapEvent(event);
        }

        function animate() {
          const controlsChanged = controls.update();
          if (controlsChanged || needsRender) {
            needsRender = false;
            idleFrameCount = 0;
            render();
            animationFrameHandle = window.requestAnimationFrame(animate);
            return;
          }
          if (idleFrameCount < 2) {
            idleFrameCount += 1;
            animationFrameHandle = window.requestAnimationFrame(animate);
            return;
          }
          animationFrameHandle = 0;
        }

        function enterFullscreen() {
          if (document.fullscreenElement === root) {
            document.exitFullscreen().catch(() => {});
            return;
          }
          if (typeof root.requestFullscreen === "function") {
            root.requestFullscreen().catch(() => {});
          }
        }

        function startAnimationLoop() {
          if (animationFrameHandle !== 0) {
            return;
          }
          idleFrameCount = 0;
          animationFrameHandle = window.requestAnimationFrame(animate);
        }

        (payload.lines || []).forEach(addLine);
        (payload.meshes || []).forEach(addMesh);
        (payload.points || []).forEach(addMarkers);
        (payload.labels || []).forEach(addLabel);
        syncOptionalReferenceLabelsVisibility();
        initAntiCollisionControls();
        initWorldAxisControls();
        applyAntiCollisionLayerVisibility();
        if (miniMapToggleBtn) {
          miniMapToggleBtn.addEventListener("pointerdown", handleMiniMapResizePointerDown);
          miniMapToggleBtn.addEventListener("pointermove", handleMiniMapResizePointerMove);
          miniMapToggleBtn.addEventListener("pointerup", handleMiniMapResizePointerUp);
          miniMapToggleBtn.addEventListener("pointercancel", handleMiniMapResizePointerUp);
          miniMapToggleBtn.addEventListener("click", (event) => {
            if (miniMapState.resizeMoved) {
              miniMapState.resizeMoved = false;
              event.preventDefault();
              event.stopPropagation();
              return;
            }
            miniMapState.expanded = !miniMapState.expanded;
            if (!miniMapState.expanded) {
              miniMapState.dragging = false;
              miniMapState.resizing = false;
              setMiniMapRulerEnabled(false);
              controls.enabled = true;
              interactionActive = false;
            } else {
              buildMiniMapOverlaysFromPayload();
            }
            updateMiniMapOverlay();
            requestRender();
            event.preventDefault();
            event.stopPropagation();
          });
        }
        if (miniMapRulerBtn) {
          syncMiniMapRulerButton();
          miniMapRulerBtn.addEventListener("click", (event) => {
            setMiniMapRulerEnabled(!miniMapRulerState.enabled);
            hideTooltip();
            requestRender();
            event.preventDefault();
            event.stopPropagation();
          });
        }
        renderer.domElement.addEventListener("pointerdown", handleMiniMapPointerDown, true);
        renderer.domElement.addEventListener("pointermove", handleMiniMapPointerMove, true);
        renderer.domElement.addEventListener("pointerup", handleMiniMapPointerUp, true);
        renderer.domElement.addEventListener("pointercancel", handleMiniMapPointerUp, true);
        renderer.domElement.addEventListener("contextmenu", (event) => {
          if (!isPointerInMiniMap(event)) {
            return;
          }
          event.preventDefault();
          event.stopPropagation();
        }, true);
        renderer.domElement.addEventListener("wheel", handleMiniMapWheel, {
          capture: true,
          passive: false,
        });
        window.addEventListener("pointermove", handleWorldAxisDragPointerMove, true);
        window.addEventListener("pointerup", endWorldAxisDrag, true);
        window.addEventListener("pointercancel", endWorldAxisDrag, true);
        renderer.domElement.addEventListener("pointermove", (event) => {
          pointerScreen = {
            x: Number(event.clientX || 0),
            y: Number(event.clientY || 0),
            inside: true,
          };
          requestRender();
        });
        renderer.domElement.addEventListener("pointerleave", () => {
          pointerScreen.inside = false;
          hideTooltip();
          requestRender();
        });
        controls.addEventListener("start", () => {
          interactionActive = true;
          hideTooltip();
          requestRender();
        });
        controls.addEventListener("end", () => {
          interactionActive = false;
          requestRender();
        });
        controls.addEventListener("change", requestRender);
        window.addEventListener("resize", resize);
        document.addEventListener("fullscreenchange", () => {
          resize();
          requestRender();
        });
        if (typeof ResizeObserver !== "undefined") {
          const resizeObserver = new ResizeObserver(() => resize());
          resizeObserver.observe(root);
        }
        if (fitButton) {
          fitButton.addEventListener("click", fitCamera);
        }
        if (fullscreenButton) {
          fullscreenButton.addEventListener("click", enterFullscreen);
        }

        // =====================================================================
        // Interactive target editing
        // =====================================================================
        const editTargetsBtn = document.getElementById("edit-targets-btn");
        const editToolbox = document.getElementById("edit-toolbox");
        const editPlaneSelector = document.getElementById("edit-plane-selector");
        const editScopeSelector = document.getElementById("edit-scope-selector");
        const editOperationSelector = document.getElementById("edit-operation-selector");
        const editUndoBtn = document.getElementById("edit-undo-btn");

        const hasEditUiElements = Boolean(

        let canEditTargets = false;

        syncEditCapability();

        let editModeActive = false;

        let editTransformMode = "move"; // "move" | "rotate"
        const editHandles = []; // {mesh, pickMesh, previewMesh, originalMesh, wellIndex, pointType, pointIndex, dataPos[3], guide}
        const editReplanners = []; // FastReplan per well

        const editRotationControls = []; // ring controls per well for t1-anchored XY rotation
        const editRotationPickMeshes = [];
        const editOriginalPoints = []; // all editable target points per well

        const editOriginalT3 = []; // original t3 [x,y,z] per well
        const editCurrentT1 = []; // current (dragged) t1 per well
        const editCurrentT3 = []; // current (dragged) t3 per well

        if (editWarningHideBtn) {

        function formatDeltaMeters(value, signed = true) {
          const numericValue = Number(value) || 0;
          const absValue = Math.abs(numericValue);
          const sign =
            signed && numericValue > EDIT_DELTA_EPS_M
              ? "+"
              : signed && numericValue < -EDIT_DELTA_EPS_M
                ? "-"
                : "";
          return `${sign}${absValue.toFixed(1).replace(".", ",")} м`;
        }

        function formatLengthMeters(value) {
          return formatDeltaMeters(Math.max(0, Number(value) || 0), false);
        }

        function copyEditPoint(point) {
          return [
            Number((point && point[0]) || 0),
            Number((point && point[1]) || 0),
            Number((point && point[2]) || 0),
          ];
        }

        function addDeltaToPoint(point, delta) {
          return [
            Number((point && point[0]) || 0) + Number((delta && delta[0]) || 0),
            Number((point && point[1]) || 0) + Number((delta && delta[1]) || 0),
            Number((point && point[2]) || 0) + Number((delta && delta[2]) || 0),
          ];
        }

        function copyParentPathPoint(point) {
          return [
            Number((point && point[0]) || 0),
            Number((point && point[1]) || 0),
            Number((point && point[2]) || 0),
            Number((point && point[3]) || 0),
          ];
        }

        function copySidetrackWindowData(entry) {
          const parentPoints = Array.isArray(entry && entry.parent_points)
            ? entry.parent_points
            : Array.isArray(entry && entry.parentPoints)
              ? entry.parentPoints
              : [];
          const mdM = Number(
            (entry && entry.md_m) ||
            (entry && entry.mdM) ||
            (entry && entry.value_m) ||
            0,
          );
          return {
            kind: "md",
            valueM: mdM,
            parentName: String(
              (entry && entry.parent_name) ||
              (entry && entry.parentName) ||
              "",
            ),
            parentPoints: parentPoints
              .map(copyParentPathPoint)
              .filter((point) => point.every((value) => Number.isFinite(value))),
          };
        }

        function editPointDefinitionsForWell(well) {
          const rawPoints = Array.isArray(well && well.edit_points)
            ? well.edit_points
            : [];
          const points = rawPoints
            .map((entry, fallbackIndex) => {
              const position = copyEditPoint(entry && entry.position);
              const pointIndex = Number(entry && entry.index);
              return {
                index: Number.isInteger(pointIndex) ? pointIndex : fallbackIndex,
                label: String((entry && entry.label) || `P${fallbackIndex + 1}`),
                pointType: String((entry && entry.point_type) || "point"),
                position: position,
                sidetrackWindow:
                  String((entry && entry.point_type) || "") === "sidetrack_window"
                    ? copySidetrackWindowData(entry)
                    : null,
              };
            })
            .filter((entry) =>
              entry.position.every((value) => Number.isFinite(value)),
            );
          if (points.length > 0) {
            return points;
          }
          return [
            {
              index: 1,
              label: "t1",
              pointType: "t1",
              position: copyEditPoint(well && well.t1),
            },
            {
              index: 2,
              label: "t3",
              pointType: "t3",
              position: copyEditPoint(well && well.t3),
            },
          ];
        }

        function copyEditPointEntries(entries) {
          return (Array.isArray(entries) ? entries : []).map((entry) => ({
            index: Number(entry && entry.index) || 0,
            label: String((entry && entry.label) || ""),
            pointType: String((entry && entry.pointType) || "point"),
            position: copyEditPoint(entry && entry.position),
            sidetrackWindow: entry && entry.sidetrackWindow
              ? {
                  kind: "md",
                  valueM: Number(entry.sidetrackWindow.valueM) || 0,
                  parentName: String(entry.sidetrackWindow.parentName || ""),
                  parentPoints: Array.isArray(entry.sidetrackWindow.parentPoints)
                    ? entry.sidetrackWindow.parentPoints
                    : [],
                }
              : null,
          }));
        }

        function isSidetrackWindowEntry(entry) {
          return String(entry && entry.pointType) === "sidetrack_window";
        }

        function editEntryMovesWithPairScope(entry) {
          const pointType = String((entry && entry.pointType) || "");
          return pointType === "t1" || pointType === "t3";
        }

        function editPointByRole(points, role, fallbackIndex) {
          const roleText = String(role || "");
          const candidates = (Array.isArray(points) ? points : []).filter(
            (entry) => String(entry && entry.pointType) === roleText,
          );
          if (candidates.length > 0) {
            return candidates[Math.min(Math.max(fallbackIndex || 0, 0), candidates.length - 1)]
              .position;
          }
          return null;
        }

        function syncPrimaryEditTargetsFromPoints(wellIndex) {
          const points = editCurrentPoints[wellIndex] || [];
          const firstT1 = editPointByRole(points, "t1", 0);
          const lastT3Candidates = points.filter(
            (entry) => String(entry && entry.pointType) === "t3",
          );
          const lastT3 = lastT3Candidates.length
            ? lastT3Candidates[lastT3Candidates.length - 1].position
            : null;
          if (firstT1) {
            editCurrentT1[wellIndex] = copyEditPoint(firstT1);
          }
          if (lastT3) {
            editCurrentT3[wellIndex] = copyEditPoint(lastT3);
          }
        }

        function editWellHasExplicitPoints(wellIndex) {
          const well = editWells[wellIndex] || {};
          return Array.isArray(well.edit_points) && well.edit_points.length > 0;
        }

        function targetEditPointEntries(wellIndex) {
          return (editCurrentPoints[wellIndex] || [])
            .filter((entry) => !isSidetrackWindowEntry(entry));
        }

        function sidetrackWindowEntryForWell(wellIndex) {
          return (editCurrentPoints[wellIndex] || []).find(isSidetrackWindowEntry);
        }

        function editWellUsesSidetrackWindowPreview(wellIndex) {
          if (!sidetrackWindowEntryForWell(wellIndex)) {
            return false;
          }
          const targets = targetEditPointEntries(wellIndex);
          if (targets.length !== 2) {
            return false;
          }
          const roles = targets.map((entry) => String(entry && entry.pointType));
          return roles.includes("t1") && roles.includes("t3");
        }

        function editWellHasComplexExplicitPoints(wellIndex) {
          if (!editWellHasExplicitPoints(wellIndex)) {
            return false;
          }
          return !editWellUsesSidetrackWindowPreview(wellIndex);
        }

        function editWellSupportsRotation(wellIndex) {
          return (
            Number.isInteger(wellIndex) &&
            !sidetrackWindowEntryForWell(wellIndex) &&
            !editWellHasComplexExplicitPoints(wellIndex)
          );
        }

        function isValidEditWellIndex(index) {
          return (
            Number.isInteger(index) &&
            index >= 0 &&
            index < editWells.length
          );
        }

        function normalizedEditWellSelection(indices, fallbackIndex) {
          const unique = [];
          const seen = new Set();
          (Array.isArray(indices) ? indices : []).forEach((value) => {
            const index = Number(value);
            if (!isValidEditWellIndex(index) || seen.has(index)) {
              return;
            }
            seen.add(index);
            unique.push(index);
          });
          if (unique.length > 0) {
            return unique;
          }
          if (isValidEditWellIndex(fallbackIndex)) {
            return [Number(fallbackIndex)];
          }
          if (editWells.length > 0) {
            return [0];
          }
          return [];
        }

        function selectedEditWellIndexArray() {
          return normalizedEditWellSelection(
            Array.from(selectedEditWellIndices || []),
            selectedEditWellIndex,
          );
        }

        function legendEditableIndicesInOrder() {
          if (!legendElement) {
            return selectedEditWellIndexArray();
          }
          const indices = [];
          legendElement.querySelectorAll("[data-edit-well-index]").forEach((node) => {
            const index = Number(node.getAttribute("data-edit-well-index"));
            if (isValidEditWellIndex(index) && !indices.includes(index)) {
              indices.push(index);
            }
          });
          return indices.length > 0 ? indices : selectedEditWellIndexArray();
        }

        function legendEditableRangeIndices(anchorIndex, targetIndex) {
          if (!isValidEditWellIndex(targetIndex)) {
            return [];
          }
          if (!isValidEditWellIndex(anchorIndex)) {
            return [targetIndex];
          }
          const ordered = legendEditableIndicesInOrder();
          const anchorPosition = ordered.indexOf(anchorIndex);
          const targetPosition = ordered.indexOf(targetIndex);
          if (anchorPosition < 0 || targetPosition < 0) {
            return [targetIndex];
          }
          const start = Math.min(anchorPosition, targetPosition);
          const end = Math.max(anchorPosition, targetPosition);
          return ordered.slice(start, end + 1);
        }

        function editSelectionWellNameKeys(indices) {
          const keys = new Set();
          normalizedEditWellSelection(indices, null).forEach((wellIndex) => {
            const well = editWells[wellIndex] || {};
            const wellKey = normalizedWellNameKey(well.name);
            if (wellKey) {
              keys.add(wellKey);
            }
          });
          return keys;
        }

        function currentCollisionHighlightWellNameKeys() {
          if (editModeActive) {
            const editKeys = editSelectionWellNameKeys(selectedEditWellIndexArray());
            if (editKeys.size > 0) {
              return editKeys;
            }
          }
          return selectedLegendWellNameKeys;
        }

        function setSelectedEditWellSelection(indices, options) {
          const requestedPrimaryIndex = Number(options && options.primaryIndex);
          const fallbackIndex = isValidEditWellIndex(requestedPrimaryIndex)
            ? requestedPrimaryIndex
            : selectedEditWellIndex;
          const normalized = normalizedEditWellSelection(indices, fallbackIndex);
          selectedEditWellIndices = new Set(normalized);
          if (normalized.length === 0) {
            selectedEditWellIndex = null;
            editLegendSelectionAnchorIndex = null;
            selectedEditHandleIndex = null;
          } else {
            const nextPrimary = normalized.includes(requestedPrimaryIndex)
              ? requestedPrimaryIndex
              : normalized[normalized.length - 1];
            selectedEditWellIndex = nextPrimary;
            editLegendSelectionAnchorIndex = isValidEditWellIndex(
              Number(options && options.anchorIndex),
            )
              ? Number(options && options.anchorIndex)
              : nextPrimary;
          }
          syncSelectedEditHandle();
          syncEditVisibility();
          syncSelectedCollisionHighlights();
          if (!options || options.render !== false) {
            requestRender();
          }
        }

        function handleEditLegendSelection(editableIndex, event) {
          const index = Number(editableIndex);
          if (!isValidEditWellIndex(index)) {
            return;
          }
          const ctrlLike = Boolean(event && (event.ctrlKey || event.metaKey));
          const shiftLike = Boolean(event && event.shiftKey);
          if (!editModeActive || (!ctrlLike && !shiftLike)) {
            setSelectedEditWellSelection([index], {
              primaryIndex: index,
              anchorIndex: index,
              render: false,
            });
            return;
          }
          if (shiftLike) {
            const anchorIndex = isValidEditWellIndex(editLegendSelectionAnchorIndex)
              ? editLegendSelectionAnchorIndex
              : selectedEditWellIndex;
            const range = legendEditableRangeIndices(anchorIndex, index);
            const nextSelection = ctrlLike
              ? Array.from(new Set([...selectedEditWellIndexArray(), ...range]))
              : range;
            setSelectedEditWellSelection(nextSelection, {
              primaryIndex: index,
              anchorIndex: anchorIndex,
              render: false,
            });
            return;
          }
          const nextSelection = new Set(selectedEditWellIndexArray());
          if (nextSelection.has(index)) {
            nextSelection.delete(index);
          } else {
            nextSelection.add(index);
          }
          if (nextSelection.size === 0) {
            nextSelection.add(index);
          }
          const sortedSelection = Array.from(nextSelection).sort((left, right) => left - right);
          const nextPrimary = nextSelection.has(index)
            ? index
            : nextSelection.has(selectedEditWellIndex)
              ? selectedEditWellIndex
              : sortedSelection[sortedSelection.length - 1];
          setSelectedEditWellSelection(sortedSelection, {
            primaryIndex: nextPrimary,
            anchorIndex: index,
            render: false,
          });
        }

        function defaultEditHandleIndexForWell(wellIndex) {
          if (!Number.isInteger(wellIndex)) {
            return null;
          }
          let fallbackIndex = null;
          let t1Index = null;
          for (let index = 0; index < editHandles.length; index += 1) {
            const handle = editHandles[index];
            if (!handle || handle.wellIndex !== wellIndex) {
              continue;
            }
            if (handle.pointRole === "sidetrack_window") {
              continue;
            }
            if (fallbackIndex === null) {
              fallbackIndex = index;
            }
            if (handle.pointRole === "t1" && t1Index === null) {
              t1Index = index;
            }
            if (handle.pointRole === "t3") {
              return index;
            }
          }
          return t1Index !== null ? t1Index : fallbackIndex;
        }

        function selectedEditHandle() {
          if (!Number.isInteger(selectedEditHandleIndex)) {
            return null;
          }
          return editHandles[selectedEditHandleIndex] || null;
        }

        function syncSelectedEditHandle() {
          if (!Number.isInteger(selectedEditWellIndex)) {
            selectedEditHandleIndex = null;
            return;
          }
          const handle = selectedEditHandle();
          if (
            handle &&
            handle.wellIndex === selectedEditWellIndex &&
            handle.pointRole !== "sidetrack_window"
          ) {
            return;
          }
          selectedEditHandleIndex = defaultEditHandleIndexForWell(selectedEditWellIndex);
        }

        function cloneEditState(wellIndex) {
          return {
            points: copyEditPointEntries(editCurrentPoints[wellIndex]),
            t1: copyEditPoint(editCurrentT1[wellIndex]),
            t3: copyEditPoint(editCurrentT3[wellIndex]),
          };
        }

        function originalEditState(wellIndex) {
          return {
            points: copyEditPointEntries(editOriginalPoints[wellIndex]),
            t1: copyEditPoint(editOriginalT1[wellIndex]),
            t3: copyEditPoint(editOriginalT3[wellIndex]),
          };
        }

        function pointsNearlyEqual(left, right) {
          if (!left || !right) {
            return false;
          }
          return (
            Math.abs(Number(left[0]) - Number(right[0])) <= EDIT_DELTA_EPS_M &&
            Math.abs(Number(left[1]) - Number(right[1])) <= EDIT_DELTA_EPS_M &&
            Math.abs(Number(left[2]) - Number(right[2])) <= EDIT_DELTA_EPS_M
          );
        }

        function editStatesEqual(left, right) {
          const leftPoints = Array.isArray(left && left.points) ? left.points : [];
          const rightPoints = Array.isArray(right && right.points) ? right.points : [];
          if (leftPoints.length || rightPoints.length) {
            if (leftPoints.length !== rightPoints.length) {
              return false;
            }
            return leftPoints.every((entry, index) =>
              pointsNearlyEqual(entry.position, rightPoints[index].position),
            );
          }
          return (
            Boolean(left) &&
            Boolean(right) &&
            pointsNearlyEqual(left.t1, right.t1) &&
            pointsNearlyEqual(left.t3, right.t3)
          );
        }

        function isEditWellDirty(wellIndex) {
          return !editStatesEqual(cloneEditState(wellIndex), originalEditState(wellIndex));
        }

        function createUnitCircleGeometry(segments) {
          const positions = [];
          const safeSegments = Math.max(Number(segments) || 96, 16);
          for (let index = 0; index < safeSegments; index += 1) {
            const angle = (index / safeSegments) * Math.PI * 2.0;
            positions.push(Math.cos(angle), Math.sin(angle), 0);
          }
          const geometry = new THREE.BufferGeometry();
          geometry.setAttribute(
            "position",
            new THREE.Float32BufferAttribute(new Float32Array(positions), 3),
          );
          return geometry;
        }

        function createRotationArrowGeometry(angleRad, direction) {
          const radial = new THREE.Vector2(Math.cos(angleRad), Math.sin(angleRad));
          const turnDirection = Number(direction) < 0 ? -1.0 : 1.0;
          const tangent = new THREE.Vector2(
            -radial.y * turnDirection,
            radial.x * turnDirection,
          );
          const center = radial.clone().multiplyScalar(1.0);
          const tip = center.clone().add(tangent.clone().multiplyScalar(0.042));
          const baseCenter = center.clone().add(tangent.clone().multiplyScalar(-0.032));
          const wing = radial.clone().multiplyScalar(0.026);
          const positions = [
            tip.x,
            tip.y,
            0,
            baseCenter.x + wing.x,
            baseCenter.y + wing.y,
            0,
            baseCenter.x - wing.x,
            baseCenter.y - wing.y,
            0,
          ];
          const geometry = new THREE.BufferGeometry();
          geometry.setAttribute(
            "position",
            new THREE.Float32BufferAttribute(new Float32Array(positions), 3),
          );
          return geometry;
        }

        function editRotationControlLift() {
          return Math.max(maxSpan * 0.012, 10.0);
        }

        function editRotationModeEnabled() {
          return (
            editModeActive &&
            editMoveScope === "pair" &&
            editTransformMode === "rotate" &&
            Number.isInteger(selectedEditWellIndex) &&
            editWellSupportsRotation(selectedEditWellIndex)
          );
        }

        function editRotationCenterDisplay(wellIndex) {
          const t1 = editCurrentT1[wellIndex] || [0, 0, 0];
          const t3 = editCurrentT3[wellIndex] || [0, 0, 0];
          const center = displayPoint([t1[0], t1[1], t3[2]]);
          center.z += editRotationControlLift();
          return center;
        }

        function createEditRotationControl(wellIndex, color) {
          const group = new THREE.Group();
          group.visible = false;
          group.renderOrder = 13;
          const safeColor = hexOrDefault(color, "#2563eb");

          const ringMaterial = new THREE.LineBasicMaterial({
            color: safeColor,
            transparent: true,
            opacity: 0.52,
            depthTest: false,
            depthWrite: false,
          });
          const ring = new THREE.LineLoop(createUnitCircleGeometry(128), ringMaterial);
          ring.renderOrder = 13;
          group.add(ring);

          const arrowMaterial = new THREE.MeshBasicMaterial({
            color: safeColor,
            transparent: true,
            opacity: 0.68,
            side: THREE.DoubleSide,
            depthTest: false,
            depthWrite: false,
          });
          [
            [35, 1],
            [125, -1],
