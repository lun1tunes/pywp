          const dataPoint = dataPointFromDisplay(newPos);
          let dataX = dataPoint[0];
          let dataY = dataPoint[1];
          let dataZ = dataPoint[2];
          const wi = editDragHandle.wellIndex;
          let sidetrackWindowUpdate = null;
          if (editDragHandle.pointRole === "sidetrack_window") {
            sidetrackWindowUpdate = snappedSidetrackWindowEntry(
              editDragHandle,
              event,
              editDragInputMode,
              [dataX, dataY, dataZ],
            );
            dataX = sidetrackWindowUpdate.position[0];
            dataY = sidetrackWindowUpdate.position[1];
            dataZ = sidetrackWindowUpdate.position[2];
          }
          if (editDragMoveScope === "pair" && editDragHistoryStartState) {
            const historyPoints = copyEditPointEntries(editDragHistoryStartState.points);
            const startEntry = historyPoints[editDragHandle.pointIndex];
            const startPoint =
              startEntry && startEntry.position
                ? startEntry.position
                : editDragHandle.pointRole === "t1"
                  ? editDragHistoryStartState.t1
                  : editDragHistoryStartState.t3;
            if (!startPoint) {
              return;
            }
            const dx = dataX - startPoint[0];
            const dy = dataY - startPoint[1];
            const dz = dataZ - startPoint[2];
            const appliedIndices = applySynchronizedDeltaFromStates(
              editDragHistoryStatesByWell,
              wi,
              editDragHandle,
              [dx, dy, dz],
              editDragMoveScope,
            );
            finalizeEditUpdates(appliedIndices);
            return;
          } else {
            const currentEntries = copyEditPointEntries(editCurrentPoints[wi]);
            if (editWellHasExplicitPoints(wi)) {
              if (editDragHandle.pointRole === "sidetrack_window") {
                const nextPoints = currentEntries;
                const nextEntry = nextPoints[editDragHandle.pointIndex];
                if (!nextEntry) {
                  return;
                }
                nextEntry.position = [dataX, dataY, dataZ];
                if (sidetrackWindowUpdate) {
                  nextEntry.sidetrackWindow = sidetrackWindowUpdate.sidetrackWindow;
                }
                updateWellEditPoints(wi, nextPoints);
              } else {
                const baseState =
                  editDragHistoryStatesByWell instanceof Map &&
                  editDragHistoryStatesByWell.has(wi)
                    ? editDragHistoryStatesByWell.get(wi)
                    : editDragHistoryStartState;
                const startEntry = Array.isArray(baseState && baseState.points)
                  ? baseState.points[editDragHandle.pointIndex]
                  : null;
                const startPoint =
                  startEntry && startEntry.position
                    ? startEntry.position
                    : editDragHandle.pointRole === "t1"
                      ? copyEditPoint(baseState.t1)
                      : copyEditPoint(baseState.t3);
                const dx = dataX - startPoint[0];
                const dy = dataY - startPoint[1];
                const dz = dataZ - startPoint[2];
                const appliedIndices = applySynchronizedDeltaFromStates(
                  editDragHistoryStatesByWell,
                  wi,
                  editDragHandle,
                  [dx, dy, dz],
                  editDragMoveScope,
                );
                if (appliedIndices.length > 0) {
                  finalizeEditUpdates(appliedIndices);
                  return;
                }
              }
            } else {
              const baseState =
                editDragHistoryStatesByWell instanceof Map &&
                editDragHistoryStatesByWell.has(wi)
                  ? editDragHistoryStatesByWell.get(wi)
                  : editDragHistoryStartState;
              const startPoint =
                editDragHandle.pointRole === "t1"
                  ? copyEditPoint(baseState.t1)
                  : copyEditPoint(baseState.t3);
              const dx = dataX - startPoint[0];
              const dy = dataY - startPoint[1];
              const dz = dataZ - startPoint[2];
              const appliedIndices = applySynchronizedDeltaFromStates(
                editDragHistoryStatesByWell,
                wi,
                editDragHandle,
                [dx, dy, dz],
                editDragMoveScope,
              );
              if (appliedIndices.length > 0) {
                finalizeEditUpdates(appliedIndices);
                return;
              }
            }
          }
          editDirtyFlags[wi] = isEditWellDirty(wi);
          rebuildPreviewTrajectory(wi);
          resetEditSaveButtonState();
          syncEditVisibility();
          showEditFeedback();
          requestRender();
        }

        function onEditPointerUp(event) {
          if (endEditRotationDrag(event)) {
            return;
          }
          if (!editDragHandle) return;
          const previousStates = editDragHistoryStatesByWell;
          pushEditUndoStates(previousStates);
          controls.enabled = true;
          editDragHandle = null;
          editDragAxisOrigin = null;
          editDragAxisDirection = null;
          editDragStartPosition = null;
          editDragPlane = null;
          editDragMoveScope = "point";
          editDragPointerOffset = null;
          editDragHistoryStartState = null;
          editDragHistoryStatesByWell = null;
          editDragInputMode = "scene";
          interactionActive = false;
          try {
            renderer.domElement.releasePointerCapture(event.pointerId);
          } catch (e) { /* ignore */ }
          requestRender();
        }

        function sendEditTargetsToStreamlit(changes) {
          if (!editChannelName || typeof BroadcastChannel === "undefined") {
            return false;
          }
          try {
            if (!editBroadcastChannel) {
              editBroadcastChannel = new BroadcastChannel(editChannelName);
            }
            editBroadcastChannel.postMessage({
              type: "pywp:editTargets",
              changes: changes,
              nonce: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
            });
            return true;
          } catch (e) {
            return false;
          }
        }

        function onEditSave() {
          // Collect changes
          const changes = [];
          editWells.forEach((well, idx) => {
            if (!editDirtyFlags[idx]) return;
            if (editWellHasExplicitPoints(idx)) {
              const pointEntries = (editCurrentPoints[idx] || []);
              const originalEntries = editOriginalPoints[idx] || [];
              const targetPoints = pointEntries.filter((entry, pointIndex) => {
                if (isSidetrackWindowEntry(entry)) {
                  return false;
                }
                const originalEntry = originalEntries[pointIndex];
                return !(
                  originalEntry &&
                  pointsNearlyEqual(entry.position, originalEntry.position)
                );
              });
              const sidetrackWindowEntry = pointEntries.find(isSidetrackWindowEntry);
              const change = {
                name: well.name,
              };
              if (targetPoints.length > 0) {
                change.points = targetPoints.map((entry) => ({
                    index: Number(entry.index),
                    label: String(entry.label || ""),
                    point_type: String(entry.pointType || "point"),
                    position: entry.position.map((v) => Math.round(v * 100) / 100),
                  }));
              }
              const sidetrackWindowIndex = pointEntries.findIndex(isSidetrackWindowEntry);
              const sidetrackOriginalEntry =
                sidetrackWindowIndex >= 0 ? originalEntries[sidetrackWindowIndex] : null;
              const sidetrackWindowChanged =
                sidetrackWindowEntry &&
                sidetrackWindowEntry.sidetrackWindow &&
                (
                  !sidetrackOriginalEntry ||
                  !pointsNearlyEqual(
                    sidetrackWindowEntry.position,
                    sidetrackOriginalEntry.position,
                  ) ||
                  Math.abs(
                    Number(sidetrackWindowEntry.sidetrackWindow.valueM || 0) -
                      Number(
                        (sidetrackOriginalEntry.sidetrackWindow || {}).valueM || 0,
                      ),
                  ) > EDIT_DELTA_EPS_M
                );
              if (sidetrackWindowChanged) {
                change.sidetrack_window = {
                  kind: "md",
                  value_m:
                    Math.round(
                      Number(sidetrackWindowEntry.sidetrackWindow.valueM || 0) *
                        100,
                    ) / 100,
                  parent_name: String(
                    sidetrackWindowEntry.sidetrackWindow.parentName || "",
                  ),
                  position: sidetrackWindowEntry.position.map(
                    (v) => Math.round(v * 100) / 100,
                  ),
                };
              }
              if (change.points || change.sidetrack_window) {
                changes.push(change);
              }
            } else {
              changes.push({
                name: well.name,
                t1: editCurrentT1[idx].map((v) => Math.round(v * 100) / 100),
                t3: editCurrentT3[idx].map((v) => Math.round(v * 100) / 100),
              });
            }
          });
          if (changes.length === 0) return;
          // Visual feedback
          editSaveBtn.disabled = true;
          editSaveBtn.textContent = "Применяем...";
          editSaveBtn.classList.add("is-pending");
          if (!sendEditTargetsToStreamlit(changes)) {
            editSaveBtn.disabled = false;
            editSaveBtn.classList.remove("is-pending");
            editSaveBtn.classList.add("is-error");
            editSaveBtn.textContent = "Не удалось применить";
          }
        }

        function disposeObjectMaterial(material) {
          if (!material) {
            return;
          }
          if (Array.isArray(material)) {
            material.forEach(disposeObjectMaterial);
            return;
          }
          if (typeof material.dispose === "function") {
            material.dispose();
          }
        }

        function disposeObjectTree(object) {
          if (!object || typeof object.traverse !== "function") {
            return;
          }
          object.traverse((child) => {
            if (child.geometry && typeof child.geometry.dispose === "function") {
              child.geometry.dispose();
            }
            disposeObjectMaterial(child.material);
          });
        }

        function clearThreeGroup(group) {
          if (!group) {
            return;
          }
          const children = Array.from(group.children || []);
          children.forEach((child) => {
            group.remove(child);
            disposeObjectTree(child);
          });
        }

        function clearSceneLabels() {
          sceneLabels.forEach((item) => {
            if (item && item.element && item.element.parentNode) {
              item.element.parentNode.removeChild(item.element);
            }
          });
          sceneLabels.length = 0;
          miniMapLabels.forEach((item) => {
            if (item && item.element && item.element.parentNode) {
              item.element.parentNode.removeChild(item.element);
            }
          });
          miniMapLabels.length = 0;
          worldAxisOverlay.labels.length = 0;
          worldAxisOverlay.labelSpecs = [];
        }

        function clearSceneLabelsByRoles(roleValues) {
          const roleSet = new Set(
            Array.isArray(roleValues) ? roleValues.map((value) => String(value)) : [],
          );
          if (roleSet.size === 0) {
            return;
          }
          for (let index = sceneLabels.length - 1; index >= 0; index -= 1) {
            const item = sceneLabels[index];
            if (!item || !roleSet.has(String(item.role || ""))) {
              continue;
            }
            if (item.element && item.element.parentNode) {
              item.element.parentNode.removeChild(item.element);
            }
            sceneLabels.splice(index, 1);
          }
          for (let index = miniMapLabels.length - 1; index >= 0; index -= 1) {
            const item = miniMapLabels[index];
            const itemRole = String(
              (item && item.role) ||
              (item && item.sourceLabel && item.sourceLabel.role) ||
              "",
            );
            if (!item || !roleSet.has(itemRole)) {
              continue;
            }
            if (item.element && item.element.parentNode) {
              item.element.parentNode.removeChild(item.element);
            }
            miniMapLabels.splice(index, 1);
          }
        }

        function syncOptionalReferenceLabelsVisibility() {
          clearSceneLabelsByRoles(["reference_label_optional"]);
          if (!showAllReferenceLabels || !Array.isArray(optionalReferenceLabels)) {
            return;
          }
          optionalReferenceLabels.forEach((item) => addLabel(item));
        }

        function removeTrackedObjectFromCollections(object) {
          const hoverIndex = hoverTargets.indexOf(object);
          if (hoverIndex >= 0) {
            hoverTargets.splice(hoverIndex, 1);
          }
          const hiddenContourIndex = miniMapHiddenContourObjects.indexOf(object);
          if (hiddenContourIndex >= 0) {
            miniMapHiddenContourObjects.splice(hiddenContourIndex, 1);
          }
        }

        function removeTrackedObject(object) {
          if (!object) {
            return;
          }
          removeTrackedObjectFromCollections(object);
          if (object.parent) {
            object.parent.remove(object);
          }
          disposeObjectTree(object);
        }

        function clearAntiCollisionVisualPayload() {
          Object.keys(antiCollisionVisualObjects).forEach((layer) => {
            const trackedObjects = Array.from(antiCollisionVisualObjects[layer] || []);
            trackedObjects.forEach(removeTrackedObject);
            antiCollisionVisualObjects[layer].length = 0;
          });
          clearSceneLabelsByRoles([
            "reference_label",
            "reference_label_optional",
            "reference_pad_label",
          ]);
        }

        function resetEditRuntimeState() {
          editModeActive = false;
          controls.enabled = true;
          interactionActive = false;
          editDragHandle = null;
          editDragAxisOrigin = null;
          editDragAxisDirection = null;
          editDragStartPosition = null;
          editDragStartAxisT = 0.0;
          editDragPlane = null;
          editDragMoveScope = "point";
          editDragPlaneZ = 0.0;
          editDragPointerOffset = null;
          editDragHistoryStartState = null;
          editDragHistoryStatesByWell = null;
          editDragInputMode = "scene";
          editRotateWellIndex = null;
          editRotateStartAngle = 0.0;
          editRotatePlaneZ = 0.0;
          editRotateCenterDisplay = null;
          editRotateHistoryStartState = null;
          editRotateStartVector = null;
          editRotateStartPreviewPoints = null;
          editHasAnyChange = false;
          editWarningDismissed = false;
          selectedEditWellIndex = editWells.length > 0 ? 0 : null;
          selectedEditWellIndices = new Set(
            Number.isInteger(selectedEditWellIndex) ? [selectedEditWellIndex] : [],
          );
          editLegendSelectionAnchorIndex = selectedEditWellIndex;
          selectedEditHandleIndex = null;
          editHandles.length = 0;
          editReplanners.length = 0;
          editLineObjects.length = 0;
          editLateralLabels.length = 0;
          editRotationControls.length = 0;
          editRotationPickMeshes.length = 0;
          editOriginalPoints.length = 0;
          editCurrentPoints.length = 0;
          editOriginalT1.length = 0;
          editOriginalT3.length = 0;
          editCurrentT1.length = 0;
          editCurrentT3.length = 0;
          editDirtyFlags.length = 0;
          editUndoStacks.length = 0;
          editRedoStacks.length = 0;
          if (editTargetsBtn) {
            editTargetsBtn.classList.remove("is-active");
            editTargetsBtn.textContent = "Редактировать точки";
          }
          if (editToolbox) {
            editToolbox.classList.remove("is-visible");
          }
          if (editSaveBtn) {
            editSaveBtn.classList.remove("is-visible", "is-pending", "is-error");
          }
          if (editWarningToast) {
            editWarningToast.classList.remove("is-visible");
          }
          resetEditSaveButtonState();
        }

        function clearViewerDataObjects() {
          hideTooltip();
          clearWorldAxisGeometry();
          worldAxisOverlay.signature = "";
          worldAxisOverlay.dragging = false;
          worldAxisOverlay.dragStartRaw = null;
          const preservedSceneObjects = new Set([
            ambientLight,
            surfaceShadeLight,
            worldAxisOverlay.group,
          ]);
          Array.from(scene.children || []).forEach((child) => {
            if (preservedSceneObjects.has(child)) {
              return;
            }
            scene.remove(child);
            disposeObjectTree(child);
          });
          clearThreeGroup(miniMapOverlayScene);
          miniMapOverlayBuilt = false;
          hoverTargets.length = 0;
          editableBaseMaterials.length = 0;
          Object.keys(antiCollisionVisualObjects).forEach((layer) => {
            antiCollisionVisualObjects[layer].length = 0;
          });
          miniMapHiddenContourObjects.length = 0;
          clearSceneLabels();
          if (legendElement) {
            legendElement.innerHTML = "";
          }
          if (collisionsPanelElement) {
            collisionsPanelElement.innerHTML = "";
          }
          if (worldAxisDragHandle) {
            worldAxisDragHandle.style.display = "none";
            worldAxisDragHandle.classList.remove("is-dragging");
          }
          resetEditRuntimeState();
        }

        function updateCameraClippingFromBounds() {
          const localMaxSpan = Math.max(span.x, span.y, span.z, 1);
          camera.near = Math.max(localMaxSpan / 1200.0, 0.1);
          camera.far = Math.max(localMaxSpan * 40.0, 5000.0);
          camera.updateProjectionMatrix();
        }

        function updateViewerBackground() {
          scene.background = new THREE.Color(backgroundColor);
          renderer.setClearColor(backgroundColor, 1.0);
          renderer.domElement.style.background = backgroundColor;
          root.style.background = backgroundColor;
        }

        function applyViewerPayload(nextPayload, options) {
          const resolvedPayload =
            nextPayload && typeof nextPayload === "object" ? nextPayload : {};
          const preserveView = Boolean(options && options.preserveView);
          const oldSceneOrigin = {
            x: Number(sceneOrigin && sceneOrigin.x) || 0,
            y: Number(sceneOrigin && sceneOrigin.y) || 0,
            z: Number(sceneOrigin && sceneOrigin.z) || 0,
          };
          const previousEditChannelName = editChannelName;
          payload = resolvedPayload;
          backgroundColor = String(payload.background || "#ffffff");
          sceneComplexity = payloadSceneComplexity(payload);
          maxPixelRatio = payloadMaxPixelRatio(sceneComplexity);
          syncPayloadCollections();
          syncWorldAxisActivePadFocus({ resetOffset: false });
          syncEditCapability();
          const nextSceneOrigin = rawBoundsCenter(payload.bounds || {});
          const originDelta = new THREE.Vector3(
            oldSceneOrigin.x - (Number(nextSceneOrigin.x) || 0),
            oldSceneOrigin.y - (Number(nextSceneOrigin.y) || 0),
            ((oldSceneOrigin.z - (Number(nextSceneOrigin.z) || 0)) * Z_DISPLAY_SIGN) /
              Math.max(worldAxisZScaleFactor(), 1.0),
          );
          clearViewerDataObjects();
          updateViewerBackground();
          renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, maxPixelRatio));
          recomputeSceneMetrics({ resetMiniMap: !preserveView });
          if (preserveView) {
            camera.position.add(originDelta);
            controls.target.add(originDelta);
            miniMapState.target.add(originDelta);
            updateCameraClippingFromBounds();
          } else {
            fitCameraToRawBounds(payload.bounds || {});
          }
          (payload.lines || []).forEach(addLine);
          (payload.meshes || []).forEach(addMesh);
          (payload.points || []).forEach(addMarkers);
          (payload.labels || []).forEach(addLabel);
          syncOptionalReferenceLabelsVisibility();
          initAntiCollisionControls();
          applyAntiCollisionLayerVisibility();
          if (previousEditChannelName !== editChannelName && editBroadcastChannel) {
            editBroadcastChannel.close();
            editBroadcastChannel = null;
          }
          if (canEditTargets) {
            initEditHandles();
            syncEditVisibility();
            syncEditToolboxState();
          }
          syncLegendVisibility();
          renderCollisions();
          updateMiniMapOverlay();
          updateHandleScales();
          requestRender();
        }

        function applyAntiCollisionOverlayPayload(nextPayload) {
          const resolvedPayload =
            nextPayload && typeof nextPayload === "object" ? nextPayload : {};
          payload = Object.assign({}, payload, resolvedPayload);
          syncPayloadCollections();
          syncWorldAxisActivePadFocus({ resetOffset: false });
          syncEditCapability();
          clearAntiCollisionVisualPayload();
          (resolvedPayload.lines || [])
            .filter((item) => Boolean(antiCollisionLayerForItem(item)))
            .forEach(addLine);
          (resolvedPayload.meshes || [])
            .filter((item) => Boolean(antiCollisionLayerForItem(item)))
            .forEach(addMesh);
          (resolvedPayload.points || [])
            .filter((item) => Boolean(antiCollisionLayerForItem(item)))
            .forEach(addMarkers);
          (resolvedPayload.labels || [])
            .filter((item) => {
              const role = String((item && item.role) || "");
              return (
                role === "reference_label" ||
                role === "reference_label_optional" ||
                role === "reference_pad_label"
              );
            })
            .forEach(addLabel);
          syncOptionalReferenceLabelsVisibility();
          const nextLayerState =
            resolvedPayload.anti_collision_layer_state &&
            typeof resolvedPayload.anti_collision_layer_state === "object"
              ? resolvedPayload.anti_collision_layer_state
              : {};
          Object.keys(antiCollisionLayerState).forEach((layer) => {
            antiCollisionLayerState[layer] = Boolean(
              Object.prototype.hasOwnProperty.call(nextLayerState, layer)
                ? nextLayerState[layer]
                : antiCollisionLayerState[layer],
            );
          });
          initAntiCollisionControls();
          applyAntiCollisionLayerVisibility();
          syncLegendVisibility();
          renderCollisions();
          requestRender();
        }

        if (hasEditUiElements) {
          if (canEditTargets) {
            initEditHandles();
          }
          initEditToolboxDrag();
          syncEditToolboxState();
          editTargetsBtn.addEventListener("click", () => {
            setEditMode(!editModeActive);
          });
          editPlaneSelector.querySelectorAll(".plane-btn").forEach((btn) => {
            btn.addEventListener("click", () => {
              setEditPlane(btn.dataset.plane);
            });
          });
          editScopeSelector.querySelectorAll(".scope-btn").forEach((btn) => {
            btn.addEventListener("click", () => {
              setEditMoveScope(btn.dataset.scope);
            });
          });
          editOperationSelector.querySelectorAll(".operation-btn").forEach((btn) => {
            btn.addEventListener("click", () => {
              setEditTransformMode(btn.dataset.operation);
            });
          });
          editUndoBtn.addEventListener("click", undoSelectedEdit);
          editRedoBtn.addEventListener("click", redoSelectedEdit);
          editResetBtn.addEventListener("click", resetSelectedEdit);
          editSaveBtn.addEventListener("click", onEditSave);
          renderer.domElement.addEventListener("pointerdown", onEditPointerDown, true);
          renderer.domElement.addEventListener("pointermove", onEditPointerMove, true);
          renderer.domElement.addEventListener("pointerup", onEditPointerUp, true);
          renderer.domElement.addEventListener("pointercancel", onEditPointerUp, true);
          window.addEventListener("keydown", onEditKeyDown, true);
          window.addEventListener("beforeunload", () => {
            if (editBroadcastChannel) {
              editBroadcastChannel.close();
              editBroadcastChannel = null;
            }
          });
        }

        resize();
        fitCamera();
        syncLegendVisibility();
        renderCollisions();
        startAnimationLoop();
        window.__PYWP_VIEWER_UPDATE__ = function (nextPayloadJson, nextPayloadDigest) {
          const resolvedDigest = String(nextPayloadDigest || "");
          if (resolvedDigest && resolvedDigest === payloadDigest) {
            return true;
          }
          const nextPayload = JSON.parse(String(nextPayloadJson || "{}"));
          applyViewerPayload(nextPayload, { preserveView: true });
          payloadDigest = resolvedDigest;
          return true;
        };
        window.__PYWP_VIEWER_APPLY_ANTICOLLISION_OVERLAY__ = function (
          nextPayloadJson,
          nextPayloadDigest
        ) {
          const resolvedDigest = String(nextPayloadDigest || "");
          if (resolvedDigest && resolvedDigest === payloadDigest) {
            return true;
          }
          const nextPayload = JSON.parse(String(nextPayloadJson || "{}"));
          applyAntiCollisionOverlayPayload(nextPayload);
          payloadDigest = resolvedDigest;
          return true;
        };
        window.__PYWP_VIEWER_READY__ = true;
      })();
    </script>
  </body>
</html>
